  const prevM=()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);};
  const nextM=()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);};

  const [weekStart,setWeekStart]=useState(()=>{
    const d=new Date(TODAY+"T00:00:00");
    const dow=d.getDay()===0?6:d.getDay()-1;
    d.setDate(d.getDate()-dow);
    return d.toISOString().split("T")[0];
  });
  const weekDays=Array.from({length:7},(_,i)=>{
    const d=new Date(weekStart+"T00:00:00");
    d.setDate(d.getDate()+i);
    return d.toISOString().split("T")[0];
  });
  const prevW=()=>{const d=new Date(weekStart+"T00:00:00");d.setDate(d.getDate()-7);setWeekStart(d.toISOString().split("T")[0]);};
  const nextW=()=>{const d=new Date(weekStart+"T00:00:00");d.setDate(d.getDate()+7);setWeekStart(d.toISOString().split("T")[0]);};
  const prevD=()=>{const d=new Date(selectedDay+"T00:00:00");d.setDate(d.getDate()-1);setSelectedDay(d.toISOString().split("T")[0]);};
  const nextD=()=>{const d=new Date(selectedDay+"T00:00:00");d.setDate(d.getDate()+1);setSelectedDay(d.toISOString().split("T")[0]);};

  async function save(){
    if(!form.title||!form.date)return;
    setSaving(true);
    try{
      if(editing){
        await sheet.update(editing,form);
      } else {
        // Créer les occurrences (récurrence hebdo ou événement unique)
        const dates=[];
        if(recurrence.active&&recurrence.jusqu&&recurrence.jusqu>form.date){
          // Générer toutes les dates hebdomadaires jusqu'à la date de fin
          let cur=new Date(form.date+"T00:00:00");
          const fin=new Date(recurrence.jusqu+"T00:00:00");
          while(cur<=fin){
            const iso=`${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,"0")}-${String(cur.getDate()).padStart(2,"0")}`;
            dates.push(iso);
            cur.setDate(cur.getDate()+7);
          }
        } else {
          dates.push(form.date);
        }
        for(const d of dates){
          await sheet.add({...form,date:d});
        }
        // Sync mission chantier uniquement pour la première occurrence
        if(form.type==="chantier"&&atelierChantier){
          const existe=atelierChantier.rows.some(m=>
            m.type==="chantier"&&m.description===form.title&&toISO(m.dateDebut)===toISO(form.date)
          );
          if(!existe){
            await atelierChantier.add({
              type:"chantier",projet:form.projet||"",description:form.title,
              membres:"",stockRef:"",stockQty:0,
              dateDebut:form.date,dateFin:form.dateFin||form.date,
              statut:"planifié",note:"Créé automatiquement depuis le calendrier",
            });
          }
        }
      }
      setOpen(false);
      setRecurrence({active:false,jusqu:""});
    }catch(e){}setSaving(false);
  }

  function openNew(date=""){
    setEditing(null);
    setForm({title:"",date:date||TODAY,heure:"",type:"rdv",projet:"",note:"",dateFin:""});
    setRecurrence({active:false,jusqu:""});
    setOpen(true);
  }

  // Événements d'un jour donné — comparaison robuste multi-format
  const eventsForDay=(day)=>sheet.rows.filter(e=>{
    if(e.date===undefined||e.date===null||e.date==="")return false;
    return toISO(e.date)===day;
  }).sort((a,b)=>(a.heure||"").localeCompare(b.heure||""));

  // ── Vue MOIS ──
  const firstDow=(()=>{let d=new Date(year,month,1).getDay();return d===0?6:d-1;})();
  const dim=new Date(year,month+1,0).getDate();
  const prevDim=new Date(year,month,0).getDate();
  function ds(d){return year+"-"+String(month+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");}
  const cells=[];
  for(let i=firstDow-1;i>=0;i--)cells.push({day:prevDim-i,cur:false});
  for(let d=1;d<=dim;d++)cells.push({day:d,cur:true});
  while(cells.length%7!==0)cells.push({day:cells.length-firstDow-dim+1,cur:false});

  const panel=open&&<SidePanel title={editing?"Modifier l'événement":"Nouvel événement"} onClose={()=>setOpen(false)}>
    <FG label="Titre *"><Inp value={form.title} onChange={e=>f("title",e.target.value)} placeholder="Ex: RDV maître d'ouvrage"/></FG>
    <FG label="Date début *"><Inp type="date" value={form.date} onChange={e=>f("date",e.target.value)}/></FG>
    <FG label="Heure"><Inp type="time" value={form.heure||""} onChange={e=>f("heure",e.target.value)}/></FG>
    <FG label="Type"><Sel value={form.type} onChange={e=>f("type",e.target.value)}>
      <option value="rdv">Rendez-vous</option>
      <option value="deadline">Deadline</option>
      <option value="chantier">Chantier</option>
      <option value="prestation">Prestation</option>
      <option value="livraison">Livraison</option>
      <option value="deplacement">Déplacement</option>
    </Sel></FG>
    {["chantier","prestation"].includes(form.type)&&
      <FG label="Date fin (optionnel — pour affichage multi-jours)"><Inp type="date" value={form.dateFin||""} onChange={e=>f("dateFin",e.target.value)}/></FG>}
    <FG label="Projet"><Sel value={form.projet} onChange={e=>f("projet",e.target.value)}>
      <option value="">— Aucun —</option>
      {projects.rows.map(p=><option key={p.id}>{p.name}</option>)}
    </Sel></FG>
    <FG label="Note"><Inp value={form.note} onChange={e=>f("note",e.target.value)} placeholder="Optionnel"/></FG>

    {/* Récurrence — uniquement à la création */}
    {!editing&&<div style={{background:"#F9F9F9",borderRadius:6,padding:"10px 12px",marginBottom:8,border:"0.5px solid #EEEEEE"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:recurrence.active?8:0}}>
        <input type="checkbox" checked={recurrence.active} onChange={e=>setRecurrence(r=>({...r,active:e.target.checked}))} id="recur-check" style={{accentColor:"#CC2222",cursor:"pointer"}}/>
        <label htmlFor="recur-check" style={{fontSize:12,fontWeight:600,color:"#1C1C1C",cursor:"pointer"}}>Répéter chaque semaine</label>
      </div>
      {recurrence.active&&<>
        <FG label="Jusqu'au">
          <Inp type="date" value={recurrence.jusqu} onChange={e=>setRecurrence(r=>({...r,jusqu:e.target.value}))}/>
        </FG>
        {recurrence.jusqu&&recurrence.jusqu>form.date&&(()=>{
          let n=0,cur=new Date(form.date+"T00:00:00"),fin=new Date(recurrence.jusqu+"T00:00:00");
          while(cur<=fin){n++;cur.setDate(cur.getDate()+7);}
          return<div style={{fontSize:11,color:"#CC6600",marginTop:4}}>→ {n} occurrence{n>1?"s":""} seront créées</div>;
        })()}
      </>}
    </div>}
    <PanelBtns onCancel={()=>setOpen(false)} onSave={save} saving={saving} saveLabel={editing?"Mettre à jour":"Enregistrer"}/>
  </SidePanel>;

  // Barre de navigation commune
  const NavBar=()=>(
    <div style={{marginBottom:14}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
        <div style={{display:"flex",gap:4}}>
          {["mois","semaine","jour"].map(v=>(
            <button key={v} onClick={()=>setView(v)} style={{padding:"5px 12px",borderRadius:4,fontSize:12,cursor:"pointer",border:"1px solid #DDDDDD",background:view===v?"#CC2222":"#fff",color:view===v?"#fff":"#3A3A3A",fontFamily:"'DM Sans',sans-serif",fontWeight:view===v?700:400,textTransform:"capitalize"}}>{v}</button>
          ))}
        </div>
        <Btn primary onClick={()=>openNew()}>+ Ajouter</Btn>
      </div>
      {/* Légende couleurs */}
      <div style={{display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}}>
        {Object.entries(EV_LABELS).map(([k,lbl])=>(
          <div key={k} style={{display:"flex",alignItems:"center",gap:4}}>
            <span style={{width:10,height:10,borderRadius:2,background:EV_COLORS[k]||"#7A7A7A",display:"inline-block",flexShrink:0}}/>
            <span style={{fontSize:11,color:"#7A7A7A"}}>{lbl}</span>
          </div>
        ))}
        <div style={{marginLeft:8,display:"flex",alignItems:"center",gap:4}}>
          <span style={{width:10,height:10,borderRadius:2,background:"#F7F7F7",border:"1px solid #EEEEEE",display:"inline-block"}}/>
          <span style={{fontSize:11,color:"#AAAAAA"}}>Weekend</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4}}>
          <span style={{fontSize:9,color:"#CC8800"}}>●</span>
          <span style={{fontSize:11,color:"#CC8800"}}>Férié</span>
        </div>
      </div>
    </div>
  );

  // Composant événement inline
  const EvChip=({ev,span=1})=>{
    const color=EV_COLORS[ev.type]||"#CC2222"; // fallback rouge HP au lieu de gris
    const isMulti=span>1;
    return(
      <div onClick={()=>{setEditing(ev.id);setForm({title:ev.title,date:toISO(ev.date),heure:ev.heure||"",type:ev.type||"rdv",projet:ev.projet||"",note:ev.note||"",dateFin:ev.dateFin?toISO(ev.dateFin):"",});setOpen(true);}}
        style={{background:color,color:"#fff",borderRadius:3,padding:"2px 5px",fontSize:11,marginBottom:2,cursor:"pointer",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis",
          ...(isMulti?{borderRadius:"3px 3px 3px 3px",borderRight:`2px solid rgba(0,0,0,.15)`}:{})}}>
        {ev.heure&&<span style={{opacity:.8,marginRight:4}}>{ev.heure}</span>}{ev.title}{isMulti&&<span style={{opacity:.6,marginLeft:3,fontSize:10}}>{span}j</span>}
      </div>
    );
  };

  return <WithPanel panel={panel}>
    <NavBar/>

    {/* ── VUE MOIS ── */}
    {view==="mois"&&<>
      <Bd style={{marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,paddingBottom:10,borderBottom:"0.5px solid #EEEEEE"}}>
          <button onClick={prevM} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#7A7A7A",padding:"0 8px"}}>‹</button>
          <span style={{fontSize:14,fontWeight:700,color:"#1C1C1C"}}>{MONTHS[month]} {year}</span>
          <button onClick={nextM} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#7A7A7A",padding:"0 8px"}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
          {["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:11,fontWeight:700,color:"#7A7A7A",padding:"4px 0"}}>{d}</div>)}
          {cells.map((c,i)=>{
            const dStr=c.cur?ds(c.day):null;
            const dow=dStr?new Date(dStr+"T00:00:00").getDay():null; // 0=dim,6=sam
            const isWeekend=dow===0||dow===6;
            const isFerie=dStr&&!isWeekend&&joursFeries(year).has(dStr);
            const evs=(!dStr||isWeekend||isFerie)?[]:sheet.rows.filter(e=>{
              if(!e.date||!toISO(e.date))return false;
              const start=toISO(e.date);
              const end=e.dateFin?toISO(e.dateFin):start;
              return dStr>=start&&dStr<=end;
            }).map(e=>{
              const start=toISO(e.date);
              const end=e.dateFin?toISO(e.dateFin):start;
              const span=Math.round((new Date(end+"T00:00:00")-new Date(start+"T00:00:00"))/(86400000))+1;
              return{...e,_span:span};
            });
            const isT=dStr===TODAY;
            return(
              <div key={i} onClick={()=>{if(c.cur&&!isWeekend&&!isFerie){setSelectedDay(dStr);setView("jour");}}}
                style={{minHeight:100,borderRadius:6,padding:"4px 5px",fontSize:12,
                  color:c.cur?"#1C1C1C":"#CCCCCC",
                  background:isT?"#FFF0F0":isWeekend&&c.cur?"#F7F7F7":isFerie?"#FFF8EC":"#fff",
                  border:isT?"1px solid #CC2222":"1px solid #EEEEEE",
                  cursor:(c.cur&&!isWeekend&&!isFerie)?"pointer":"default",
                  opacity:isWeekend&&c.cur?0.5:1,
                }}>
                <div style={{fontWeight:isT?700:500,color:isT?"#CC2222":isWeekend?"#AAAAAA":isFerie?"#CC8800":"#1C1C1C",marginBottom:2,fontSize:isWeekend?10:12}}>
                  {c.day}{isFerie&&<span style={{fontSize:9,color:"#CC8800",marginLeft:2}}>●</span>}
                </div>
                {!isWeekend&&!isFerie&&evs.slice(0,5).map(ev=><EvChip key={ev.id+dStr} ev={ev} span={ev._span}/>)}
                {!isWeekend&&!isFerie&&evs.length>5&&<div style={{fontSize:9,color:"#7A7A7A"}}>+{evs.length-5}</div>}
              </div>
            );
          })}
        </div>
      </Bd>
    </>}

    {/* ── VUE SEMAINE ── */}
    {view==="semaine"&&<Bd>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,paddingBottom:10,borderBottom:"0.5px solid #EEEEEE"}}>

            if(!e.date||!toISO(e.date))return false;
            const start=toISO(e.date);
            const end=e.dateFin?toISO(e.dateFin):start;
            return day>=start&&day<=end;
          }).map(e=>{
            const start=toISO(e.date);
            const end=e.dateFin?toISO(e.dateFin):start;
            const span=Math.round((new Date(end+"T00:00:00")-new Date(start+"T00:00:00"))/(86400000))+1;
            return{...e,_span:span};
          });

              {evs.map(ev=><EvChip key={ev.id+day} ev={ev} span={ev._span}/>)}

    {/* ── VUE JOUR ── */}

        <span style={{fontSize:14,fontWeight:700,color:selectedDay===TODAY?"#CC2222":"#1C1C1C"}}>
          {selectedDay===TODAY?"Aujourd'hui — ":""}{fmt(selectedDay)}

        <button onClick={nextD} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#7A7A7A",padding:"0 8px"}}>›</button>
      </div>
      {sheet.rows.filter(e=>{
        if(!e.date||!toISO(e.date))return false;
        const start=toISO(e.date);
        const end=e.dateFin?toISO(e.dateFin):start;
        return selectedDay>=start&&selectedDay<=end;
      }).length===0&&<div style={{fontSize:13,color:"#7A7A7A",padding:"10px 0"}}>Aucun événement ce jour.</div>}
      {sheet.rows.filter(e=>{
        if(!e.date||!toISO(e.date))return false;
        const start=toISO(e.date);
        const end=e.dateFin?toISO(e.dateFin):start;
        return selectedDay>=start&&selectedDay<=end;
      }).map(ev=>{
        const color=EV_COLORS[ev.type]||"#CC2222";
        const start=toISO(ev.date);
        const end=ev.dateFin?toISO(ev.dateFin):start;
        const span=Math.round((new Date(end+"T00:00:00")-new Date(start+"T00:00:00"))/(86400000))+1;
        return(
          <div key={ev.id} style={{display:"flex",gap:10,padding:"10px 12px",borderRadius:6,background:"#F9F9F9",marginBottom:8,border:"0.5px solid #EEEEEE",borderLeft:`3px solid ${color}`}}>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3,flexWrap:"wrap"}}>
                {ev.heure&&<span style={{fontSize:12,fontWeight:700,color,fontFamily:"'DM Mono',monospace"}}>{ev.heure}</span>}

              </div>

// ══ FOURNISSEURS ══
const EF={nom:"",specialite:"",note:3,contact:"",delai:"",tel:"",adresse:""};
function Fournisseurs({sheet}){
  const [open,setOpen]=useState(false);
  const [form,setForm]=useState(EF);
  const [editing,setEditing]=useState(null);
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");
  const [partageId,setPartageId]=useState(null); // id fournisseur dont on affiche la fiche
  const [copied,setCopied]=useState(false);
  const f=(k,v)=>setForm(x=>({...x,[k]:v}));
  async function save(){if(!form.nom.trim()){setErr("Nom obligatoire.");return;}setSaving(true);setErr("");try{const item={...form,note:+form.note||3};if(editing){await sheet.update(editing,item);}else{await sheet.add(item);}setOpen(false);}catch(e){setErr(e.message);}setSaving(false);}

  function textPartage(x){
    const lines=[
      `📦 ${x.nom}`,
      x.specialite&&`Spécialité : ${x.specialite}`,
      x.contact&&`Email : ${x.contact}`,
      x.tel&&`Tél : ${x.tel}`,
      x.adresse&&`Adresse : ${x.adresse}`,
      x.delai&&`Délai livraison : ${x.delai}`,
      x.note&&`Évaluation : ${"★".repeat(x.note)}`,
    ].filter(Boolean);
    return lines.join("\n");
  }

  const partageItem=partageId?sheet.rows.find(x=>x.id===partageId):null;
  const panel=open&&<SidePanel title={editing?"Modifier le fournisseur":"Nouveau fournisseur"} onClose={()=>setOpen(false)}>
    <FG label="Nom *"><Inp value={form.nom} onChange={e=>f("nom",e.target.value)} placeholder="Ex: Nowofol GmbH"/></FG>
    <FG label="Spécialité"><Inp value={form.specialite} onChange={e=>f("specialite",e.target.value)} placeholder="Ex: Films ETFE"/></FG>
    <FG label="Délai de livraison"><Inp value={form.delai} onChange={e=>f("delai",e.target.value)} placeholder="Ex: 3-5 jours"/></FG>
    <FG label="Email / contact"><Inp value={form.contact} onChange={e=>f("contact",e.target.value)} placeholder="info@..."/></FG>
    <FG label="Téléphone"><Inp value={form.tel||""} onChange={e=>f("tel",e.target.value)}/></FG>
    <FG label="Adresse"><Inp value={form.adresse||""} onChange={e=>f("adresse",e.target.value)} placeholder="Optionnel"/></FG>
    <FG label={`Évaluation : ${"★".repeat(+form.note||0)+"☆".repeat(5-(+form.note||0))}`}><input type="range" min="1" max="5" value={form.note} onChange={e=>f("note",e.target.value)} style={{width:"100%",accentColor:"#CC2222"}}/></FG>
    <ErrMsg msg={err}/><PanelBtns onCancel={()=>setOpen(false)} onSave={save} saving={saving} saveLabel={editing?"Mettre à jour":"Ajouter"}/>
  </SidePanel>;
  return <WithPanel panel={panel}>
    {/* Modal partage */}
    {partageItem&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.4)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget){setPartageId(null);setCopied(false);}}}>
      <div style={{background:"#fff",borderRadius:12,padding:24,width:400,maxWidth:"90vw",boxShadow:"0 8px 32px rgba(0,0,0,0.18)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
          <div style={{fontSize:14,fontWeight:700,color:"#1C1C1C"}}>Partager le contact</div>
          <button onClick={()=>{setPartageId(null);setCopied(false);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:"#7A7A7A"}}>✕</button>
        </div>
        <pre style={{background:"#F9F9F9",border:"1px solid #EEEEEE",borderRadius:8,padding:14,fontSize:12,fontFamily:"'DM Mono',monospace",whiteSpace:"pre-wrap",marginBottom:14,color:"#1C1C1C",lineHeight:1.7}}>{textPartage(partageItem)}</pre>
        <button onClick={()=>{navigator.clipboard.writeText(textPartage(partageItem));setCopied(true);setTimeout(()=>setCopied(false),2000);}}
          style={{width:"100%",padding:"9px",borderRadius:6,border:"none",background:copied?"#2A7A2A":"#CC2222",cursor:"pointer",fontSize:13,fontFamily:"'DM Sans',sans-serif",color:"#fff",fontWeight:700,transition:"background .2s"}}>
          {copied?"✓ Copié !":"📋 Copier le contact"}
        </button>
      </div>
    </div>}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div style={{fontSize:15,fontWeight:700,color:"#1C1C1C",borderLeft:"3px solid #CC2222",paddingLeft:8}}>Fournisseurs ({sheet.rows.length})</div>
      <Btn primary onClick={()=>{setEditing(null);setForm(EF);setErr("");setOpen(true);}}>+ Ajouter</Btn>
    </div>
    {!sheet.rows.length&&<Bd style={{textAlign:"center",padding:24,color:"#7A7A7A",fontSize:13}}>Aucun fournisseur enregistré.</Bd>}
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      {sheet.rows.map(x=>(
        <Bd key={x.id} style={{padding:12}}>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700,color:"#1C1C1C"}}>{x.nom}</div>
              {x.specialite&&<div style={{fontSize:12,color:"#7A7A7A"}}>{x.specialite}</div>}
              <div style={{fontSize:12,color:"#CC2222",marginTop:3,letterSpacing:"0.05em"}}>{"★".repeat(x.note)}<span style={{color:"#DDDDDD"}}>{"★".repeat(5-x.note)}</span></div>
              {x.delai&&<div style={{fontSize:12,color:"#7A7A7A"}}>Délai : {x.delai}</div>}
              {x.contact&&<div style={{fontSize:12,color:"#7A7A7A"}}>{x.contact}</div>}

              <button onClick={()=>{setEditing(x.id);setForm({...x});setErr("");setOpen(true);}} style={{background:"none",border:"1px solid #DDDDDD",borderRadius:4,cursor:"pointer",fontSize:11,padding:"2px 8px",color:"#3A3A3A",fontFamily:"'DM Sans',sans-serif"}}>Modifier</button>
              <button onClick={()=>sheet.remove(x.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#7A7A7A"}}>✕</button>
            </div>
          </div>
        </Bd>
      ))}
    </div>
  </WithPanel>;
}

// ══ STOCKS ══
const ES={ref:"",cat:"",fourn:"",qty:"",min:"",unit:"pcs",prix:"",loc:"",note:"",tags:"",origine:"",projet:""};
function Stocks({sheet,fournisseurs,projects,orders,atelierChantier,prestMissions}){
  const [filterProjet,setFilterProjet]=useState("");
  const [recalculating,setRecalculating]=useState(false);

  const isBoolS=v=>v===true||String(v).toUpperCase()==="TRUE";
  async function recalculerStock(){
    if(!confirm("Recalculer le stock depuis les commandes et missions ?\n\nTotal reçu (commandes reçues) − Total utilisé (missions terminées) = Stock corrigé\nCoût de revient recalculé automatiquement pour les articles produits\n\nContinuer ?"))return;
    setRecalculating(true);
    try{
      const map={};

      // ── Entrées : commandes reçues ──
      for(const o of (orders?.rows||[])){
        if(!isBoolS(o.recue))continue;
        for(const l of getLignes(o)){
          if(!l.article||!l.qty)continue;
          const k=normRef(l.article);
          if(!map[k])map[k]={recu:0,utilise:0,coutRevient:null};
          map[k].recu+=Number(l.qty)||0;
        }
      }

      // ── Sorties : missions atelier/chantier terminées ──
      for(const m of (atelierChantier?.rows||[])){
        if(m.statut!=="terminé")continue;
        for(const it of getMissionStockItems(m)){
          if(!it.ref||!it.qty)continue;
          const k=normRef(it.ref);
          if(!map[k])map[k]={recu:0,utilise:0,coutRevient:null};
          map[k].utilise+=Number(it.qty)||0;
        }
      }

      // ── Sorties : prestations terminées ──
      for(const m of (prestMissions?.rows||[])){
        if(m.statut!=="terminé")continue;
        for(const it of getMissionStockItems(m)){
          if(!it.ref||!it.qty)continue;
          const k=normRef(it.ref);
          if(!map[k])map[k]={recu:0,utilise:0,coutRevient:null};
          map[k].utilise+=Number(it.qty)||0;
        }
      }

      // ── Coût de revient : pour chaque article, trouver les missions qui l'ont PRODUIT ──
      // Un article est "produit" par une mission si sa ref correspond à la description de la mission
      // (logique du modal ModalStockTerminaison qui pré-remplit ref = mission.description)
      const coutMap={}; // norm(ref) → {coutTotal, qtyProduite}

      for(const m of (atelierChantier?.rows||[])){
        if(m.statut!=="terminé")continue;
        const k=normRef(m.description);
        if(!coutMap[k])coutMap[k]={coutTotal:0,qtyProduite:0};
        // Coût matières : pièces utilisées × leur prix stock
        for(const it of getMissionStockItems(m)){
          if(!it.ref||!it.qty)continue;
          const s=sheet.rows.find(x=>normRef(x.ref)===normRef(it.ref));
          coutMap[k].coutTotal+=(Number(s?.prix)||0)*Number(it.qty);
        }
        // Pas de coût MO direct pour atelier/chantier (salaires non trackés ici)
      }

      for(const m of (prestMissions?.rows||[])){
        if(m.statut!=="terminé")continue;
        const k=normRef(m.description);
        if(!coutMap[k])coutMap[k]={coutTotal:0,qtyProduite:0};
        // Coût matières
        for(const it of getMissionStockItems(m)){
          if(!it.ref||!it.qty)continue;
          const s=sheet.rows.find(x=>normRef(x.ref)===normRef(it.ref));
          coutMap[k].coutTotal+=(Number(s?.prix)||0)*Number(it.qty);
        }
        // Coût MO = prix de la prestation
        coutMap[k].coutTotal+=Number(m.prix)||0;
      }

      // ── Mise à jour de chaque article du stock ──
      let updated=0;
      for(const s of sheet.rows){
        const k=normRef(s.ref);
        const changed={};

        // Quantité
        if(map[k]!==undefined){
          const newQty=Math.max(0,map[k].recu-map[k].utilise);
          if(Number(s.qty)!==newQty)changed.qty=newQty;
        }

        // Coût de revient : si cet article a été produit par des missions
        if(coutMap[k]&&coutMap[k].coutTotal>0){
          // qty produite = ce qui a été ajouté au stock depuis des missions
          // On prend la qty actuelle corrigée comme base, sinon qty existante
          const qtyRef=changed.qty!==undefined?changed.qty:Number(s.qty);
          if(qtyRef>0){
            const newPrixRevient=Math.round((coutMap[k].coutTotal/qtyRef)*100)/100;
            if(Number(s.prixRevient||0)!==newPrixRevient)changed.prixRevient=newPrixRevient;
          }
        }

        if(Object.keys(changed).length>0){
          await sheet.update(s.id,{...s,...changed});
          updated++;
        }
      }

      alert(`Recalcul terminé — ${updated} article${updated!==1?"s":""} mis à jour (quantités + coûts de revient).`);
    }catch(e){alert("Erreur : "+e.message);}
    setRecalculating(false);

// ── Fonction centralisée de mise à jour du stock ──
// stocksSheet : le useSheet("stocks")
// snap : snapshot des rows AVANT toutes mutations de cette session
// ref : ref article à modifier
// delta : +N entrée, -N sortie
// meta : {type, label, projet, prestataire} pour l'historique
async function updateStockQty(stocksSheet, snap, ref, delta, meta){
  if(!ref||!delta||delta===0)return;
  const s=snap.find(x=>normRef(x.ref)===normRef(ref));
  if(!s)return;
  const newQty=Math.max(0,Number(s.qty)+delta);
  const hist=parseStockHistorique(s);
  hist.unshift({
    date:meta?.date||TODAY,
    type:meta?.type||"manuel",
    label:meta?.label||"",
    projet:meta?.projet||"",
    prestataire:meta?.prestataire||"",
    qty:delta,
    qtyApres:newQty,
  });
  await stocksSheet.update(s.id,{...s,qty:newQty,historique:JSON.stringify(hist.slice(0,100))});
}

// ── Vérifier disponibilité stock (avant mutation) ──
function checkStockDispo(snap, ref, qtyDemandee){
  if(!ref||!qtyDemandee)return{ok:true,dispo:0};
  const s=snap.find(x=>normRef(x.ref)===normRef(ref));
  if(!s)return{ok:false,dispo:0,msg:`Article "${ref}" introuvable dans le stock`};
  const dispo=Number(s.qty)||0;
  if(dispo<Number(qtyDemandee))return{ok:false,dispo,msg:`Stock insuffisant pour "${ref}" : ${dispo} disponible, ${qtyDemandee} demandé`};
  return{ok:true,dispo};
}

// Helpers commandes globaux (utilisés par Commandes ET Stocks)
function getLignes(o){
  if(o.lignes){try{const p=JSON.parse(o.lignes);if(Array.isArray(p)&&p.length)return p;}catch(e){}}
  return [{article:o.article||"",qty:String(o.qty||""),unit:o.unit||"pcs",prix:String(o.prix||""),cat:o.cat||""}];
}
function totalCommande(o){
  return getLignes(o).reduce((s,l)=>s+(+l.prix||0)*(+l.qty||0),0);
}

// Ajoute une entrée dans l'historique d'un article stock
function parseStockHistorique(s){
  if(!s.historique||s.historique===true)return[];
  try{return JSON.parse(s.historique)||[];}catch(e){return[];}
}
async function addStockHistorique(stocks,ref,entry){
  const s=stocks.rows.find(x=>normRef(x.ref)===normRef(ref));
  if(!s)return;
  const hist=parseStockHistorique(s);
  hist.unshift({...entry,date:entry.date||TODAY}); // plus récent en premier
  await stocks.update(s.id,{...s,qty:s.qty,historique:JSON.stringify(hist.slice(0,100))}); // max 100 entrées
}

// MODULE DEVIS
// ═══════════════════════════════════════════════
function ModuleDevis({devis,fournisseurs,projects,onAccepter}){
  const [groupeOpen,setGroupeOpen]=useState(null); // id du groupe ouvert
  const [formOpen,setFormOpen]=useState(false);
  const [form,setForm]=useState(ED);
  const [lignesForm,setLignesForm]=useState([{...EL}]);
  const [editing,setEditing]=useState(null);
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");
  const [aiOpen,setAiOpen]=useState(false);
  const [aiText,setAiText]=useState("");
  const [aiPreview,setAiPreview]=useState(null);
  const [aiErr,setAiErr]=useState("");
  const [titreGroupe,setTitreGroupe]=useState(""); // pour créer un nouveau groupe
  const [titreOpen,setTitreOpen]=useState(false);
  const f=(k,v)=>setForm(x=>({...x,[k]:v}));
  const fl=(i,k,v)=>setLignesForm(ls=>ls.map((l,j)=>j===i?{...l,[k]:v}:l));
  const addLigne=()=>setLignesForm(ls=>[...ls,{...EL}]);
  const removeLigne=i=>setLignesForm(ls=>ls.length>1?ls.filter((_,j)=>j!==i):ls);

  // Grouper les devis par titre
  const actifs=devis.rows.filter(d=>d.statut!=="refusé");
  const archives=devis.rows.filter(d=>d.statut==="refusé");
  const groupes=[...new Set(actifs.map(d=>d.titre).filter(Boolean))];

  function openNew(titre){
    setForm({...ED,titre,date:TODAY});
    setLignesForm([{...EL}]);
    setEditing(null);setErr("");setFormOpen(true);
  }

  function openEdit(d){
    let ligs=[];
    try{ligs=d.lignes?JSON.parse(d.lignes):[];}catch(e){}
    if(!ligs.length) ligs=[{article:d.description||"",qty:d.prix?"":1,unit:"pcs",prix:d.prix||"",cat:""}];
    setForm({...ED,...d});
    setLignesForm(ligs.length?ligs:[{...EL}]);
    setEditing(d.id);setErr("");setFormOpen(true);
  }

  async function save(){
    if(!form.titre){setErr("Titre du groupe requis");return;}
    if(!form.fourn){setErr("Fournisseur requis");return;}
    setSaving(true);
    const item={...form,lignes:JSON.stringify(lignesForm.filter(l=>l.article)),prix:lignesForm.reduce((s,l)=>(+l.prix||0)*(+l.qty||1)+s,0)||form.prix||0};
    if(editing) await devis.update(editing,item);
    else await devis.add(item);
    setFormOpen(false);setSaving(false);
  }

  async function accepter(d){
    if(!confirm(`Accepter le devis de "${d.fourn}" et le convertir en commande ?`))return;
    // Archiver les autres devis du même groupe
    for(const other of devis.rows.filter(x=>x.titre===d.titre&&x.id!==d.id)){
      await devis.update(other.id,{...other,statut:"refusé"});
    }
    await devis.update(d.id,{...d,statut:"accepté"});
    // Callback → crée la commande dans Commandes
    onAccepter(d,lignesFrom(d));
  }

  function lignesFrom(d){
    try{const l=JSON.parse(d.lignes||"[]");if(l.length)return l;}catch(e){}
    return [{article:d.description||"",qty:1,unit:"pcs",prix:d.prix||0,cat:""}];
  }

  // Import IA
  function parseDevisIA(txt){
    const lines=txt.split("\n").map(s=>s.trim()).filter(Boolean);
    const get=(k)=>{const l=lines.find(x=>x.toUpperCase().startsWith(k+":"));return l?l.slice(k.length+1).trim():"";}
    const formData={titre:get("TITRE")||get("OBJET")||"",fourn:get("FOURNISSEUR")||get("FOURN")||"",projet:get("PROJET")||"",date:get("DATE")||TODAY,delai:get("DELAI")||"",note:get("NOTE")||"",tags:get("TAGS")||""};
    const articles=[];
    let cur=null;
    for(const line of lines){
      const u=line.toUpperCase();
      if(u.startsWith("ARTICLE:")){cur={article:line.slice(8).trim(),qty:"1",unit:"pcs",prix:"",cat:""};articles.push(cur);}
      else if(cur){
        if(u.startsWith("QTE:")||u.startsWith("QTÉ:"))cur.qty=line.split(":")[1].trim();
        else if(u.startsWith("UNITE:")||u.startsWith("UNITÉ:"))cur.unit=line.split(":")[1].trim();
        else if(u.startsWith("PRIX:"))cur.prix=line.split(":")[1].trim();
        else if(u.startsWith("CAT:"))cur.cat=line.split(":")[1].trim();
      }
    }
    if(!articles.length){setAiErr("Aucun article détecté. Vérifiez le format.");return;}
    setAiPreview({formData,articles});
  }

  function validerIA(){
    if(!aiPreview)return;
    setForm(x=>({...x,...aiPreview.formData}));
    setLignesForm(aiPreview.articles);
    setAiOpen(false);setAiPreview(null);setAiText("");setAiErr("");
    setFormOpen(true);
  }

  const totalDevis=(d)=>{
    try{const l=JSON.parse(d.lignes||"[]");if(l.length)return l.reduce((s,x)=>(+x.prix||0)*(+x.qty||1)+s,0);}catch(e){}
    return +d.prix||0;
  };

  return(
    <div>
      {/* ── En-tête ── */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div style={{fontSize:15,fontWeight:700,color:"#1C1C1C",borderLeft:"3px solid #CC2222",paddingLeft:8}}>
          Comparaison de devis ({groupes.length} groupe{groupes.length!==1?"s":""})
        </div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setAiOpen(true)} style={{padding:"7px 14px",borderRadius:4,border:"1px solid #CC2222",background:"#fff",cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif",color:"#CC2222",fontWeight:600}}>🤖 Import IA</button>
          <button onClick={()=>setTitreOpen(true)} style={{padding:"7px 14px",borderRadius:4,border:"none",background:"#CC2222",cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif",color:"#fff",fontWeight:700}}>+ Nouveau groupe</button>
        </div>
      </div>

      {/* ── Modal titre nouveau groupe ── */}
      {titreOpen&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.4)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{background:"#fff",borderRadius:10,padding:24,width:400,boxShadow:"0 8px 32px rgba(0,0,0,0.18)"}}>
          <div style={{fontSize:14,fontWeight:700,marginBottom:12}}>Nouveau groupe de devis</div>
          <FG label="Titre du besoin (ex: Scotch étanchéité ALCOV)">
            <Inp value={titreGroupe} onChange={e=>setTitreGroupe(e.target.value)} placeholder="Désignation du besoin à comparer"/>
          </FG>
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:12}}>
            <button onClick={()=>{setTitreOpen(false);setTitreGroupe("");}} style={{padding:"7px 14px",borderRadius:4,border:"1px solid #DDD",background:"#fff",cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif"}}>Annuler</button>
            <button onClick={()=>{if(!titreGroupe.trim())return;openNew(titreGroupe.trim());setTitreOpen(false);setTitreGroupe("");}} style={{padding:"7px 16px",borderRadius:4,border:"none",background:"#CC2222",cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif",color:"#fff",fontWeight:700}}>Créer →</button>
          </div>
        </div>
      </div>}

      {/* ── Modal Import IA ── */}
      {aiOpen&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.4)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{background:"#fff",borderRadius:12,padding:24,width:520,maxWidth:"94vw",maxHeight:"90vh",overflow:"auto",boxShadow:"0 8px 32px rgba(0,0,0,0.18)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontSize:14,fontWeight:700}}>🤖 Import IA — Devis fournisseur</div>
            <button onClick={()=>{setAiOpen(false);setAiPreview(null);setAiErr("");setAiText("");}} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:"#7A7A7A"}}>✕</button>
          </div>
          {!aiPreview&&<>
            <div style={{background:"#EBF3FF",borderRadius:8,padding:"10px 14px",marginBottom:12,fontSize:12,color:"#1A5DAB",lineHeight:1.7}}>
              <div style={{fontWeight:700,marginBottom:4}}>Format attendu :</div>
              TITRE: Scotch étanchéité ALCOV<br/>
              FOURNISSEUR: Rubans du Sud Ouest<br/>
              PROJET: ALCOV<br/>
              DELAI: 5 jours<br/>
              ARTICLE: S.F. étanchéité blanc ionomère<br/>
              QTE: 12<br/>
              UNITE: pcs<br/>
              PRIX: 93.05
            </div>
            <textarea value={aiText||""} onChange={e=>setAiText(e.target.value)} placeholder="Colle ici le texte du devis..." style={{width:"100%",height:200,padding:"10px 12px",borderRadius:6,border:"1px solid #DDD",fontSize:11,fontFamily:"'DM Mono',monospace",resize:"vertical",boxSizing:"border-box"}}/>
            {aiErr&&<div style={{marginTop:8,fontSize:12,color:"#CC2222",padding:"8px 12px",background:"#FFF0F0",borderRadius:6}}>{aiErr}</div>}
            <div style={{display:"flex",justifyContent:"flex-end",marginTop:10}}>
              <button onClick={()=>parseDevisIA(aiText)} style={{padding:"8px 20px",borderRadius:4,border:"none",background:"#CC2222",cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif",color:"#fff",fontWeight:600}}>Analyser →</button>
            </div>
          </>}
          {aiPreview&&<>
            <div style={{fontSize:13,fontWeight:700,color:"#2A7A2A",marginBottom:12}}>✓ {aiPreview.articles.length} article{aiPreview.articles.length>1?"s":""} détecté{aiPreview.articles.length>1?"s":""}</div>
            <div style={{background:"#F9F9F9",borderRadius:6,padding:"10px 12px",marginBottom:12,fontSize:12}}>
              <div><b>Titre :</b> {aiPreview.formData.titre||"—"}</div>
              <div><b>Fournisseur :</b> {aiPreview.formData.fourn||"—"}</div>
              {aiPreview.formData.delai&&<div><b>Délai :</b> {aiPreview.formData.delai}</div>}
            </div>
            {aiPreview.articles.map((a,i)=>(
              <div key={i} style={{display:"flex",gap:8,padding:"4px 0",borderBottom:"0.5px solid #EEE",fontSize:12}}>
                <span style={{flex:1}}>{a.article}</span>
                <span style={{color:"#7A7A7A"}}>{a.qty} {a.unit}</span>
                <span style={{fontFamily:"'DM Mono',monospace"}}>{(+a.prix*(+a.qty||1)).toLocaleString("fr-FR")} €</span>
              </div>
            ))}
            <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:12}}>
              <button onClick={()=>setAiPreview(null)} style={{padding:"7px 14px",borderRadius:4,border:"1px solid #DDD",background:"#fff",cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif"}}>← Modifier</button>
              <button onClick={validerIA} style={{padding:"7px 16px",borderRadius:4,border:"none",background:"#2A7A2A",cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif",color:"#fff",fontWeight:700}}>Ouvrir dans le formulaire →</button>
            </div>
          </>}
        </div>
      </div>}

      {/* ── Groupes de devis ── */}
      {groupes.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:"#7A7A7A",fontSize:13}}>
        Aucun groupe de devis actif.<br/>Crée un groupe pour comparer des fournisseurs.
      </div>}

      {groupes.map(titre=>{
        const items=actifs.filter(d=>d.titre===titre);
        const isOpen=groupeOpen===titre;
        const best=items.reduce((a,b)=>totalDevis(a)<=totalDevis(b)?a:b,items[0]);
        return(
          <div key={titre} style={{background:"#fff",border:"0.5px solid #EEEEEE",borderRadius:8,marginBottom:12,overflow:"hidden"}}>
            {/* En-tête groupe */}
            <div onClick={()=>setGroupeOpen(isOpen?null:titre)} style={{padding:"12px 16px",cursor:"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",background:isOpen?"#F9F9F9":"#fff"}}>
              <div>
                <div style={{fontSize:14,fontWeight:700,color:"#1C1C1C"}}>{titre}</div>
                <div style={{fontSize:11,color:"#7A7A7A",marginTop:2}}>{items.length} devis · meilleur prix : {totalDevis(best).toLocaleString("fr-FR")} € ({best.fourn})</div>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                <button onClick={e=>{e.stopPropagation();openNew(titre);}} style={{padding:"5px 10px",borderRadius:4,border:"1px solid #DDD",background:"#fff",cursor:"pointer",fontSize:11,fontFamily:"'DM Sans',sans-serif",color:"#3A3A3A"}}>+ Devis</button>
                <span style={{color:"#7A7A7A",fontSize:12}}>{isOpen?"▲":"▼"}</span>
              </div>
            </div>

            {/* Tableau comparatif */}
            {isOpen&&<div style={{padding:"0 16px 16px"}}>
              {/* Headers */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 80px 100px 80px 1fr",gap:8,padding:"8px 0",borderBottom:"1px solid #EEE",fontSize:11,fontWeight:700,color:"#7A7A7A"}}>
                <span>Fournisseur</span><span>Délai</span><span style={{textAlign:"right"}}>Total HT</span><span>Statut</span><span>Articles</span>
              </div>
              {items.sort((a,b)=>totalDevis(a)-totalDevis(b)).map((d,idx)=>{
                const isBest=idx===0;
                const ligs=lignesFrom(d);
                return(
                  <div key={d.id} style={{display:"grid",gridTemplateColumns:"1fr 80px 100px 80px 1fr",gap:8,padding:"10px 0",borderBottom:"0.5px solid #F5F5F5",alignItems:"start",background:isBest?"#F0FFF4":"#fff",borderRadius:isBest?4:0}}>
                    <div>
                      <div style={{fontSize:13,fontWeight:600,color:"#1C1C1C",display:"flex",alignItems:"center",gap:6}}>
                        {isBest&&<span style={{fontSize:10,background:"#2A7A2A",color:"#fff",padding:"1px 5px",borderRadius:3}}>Mieux-disant</span>}
                        {d.fourn}
                      </div>
                      {d.note&&<div style={{fontSize:11,color:"#7A7A7A",marginTop:2}}>{d.note}</div>}
                    </div>
                    <div style={{fontSize:12,color:"#3A3A3A"}}>{d.delai||"—"}</div>
                    <div style={{fontSize:13,fontWeight:700,color:isBest?"#2A7A2A":"#1C1C1C",textAlign:"right",fontFamily:"'DM Mono',monospace"}}>{totalDevis(d).toLocaleString("fr-FR")} €</div>
                    <div style={{fontSize:11}}>
                      {d.statut==="accepté"?<span style={{color:"#2A7A2A",fontWeight:700}}>✓ Accepté</span>:<span style={{color:"#7A7A7A"}}>En attente</span>}
                    </div>
                    <div style={{fontSize:11,color:"#3A3A3A"}}>
                      {ligs.map((l,i)=><div key={i}>{l.article} · {l.qty} {l.unit}{l.prix?` · ${(+l.prix*(+l.qty||1)).toLocaleString("fr-FR")} €`:""}</div>)}
                    </div>
                  </div>
                );
              })}
              {/* Actions */}
              <div style={{display:"flex",gap:8,marginTop:12,justifyContent:"flex-end"}}>
                {items.map(d=>(
                  <div key={d.id} style={{display:"flex",gap:6}}>
                    <button onClick={()=>openEdit(d)} style={{padding:"5px 10px",borderRadius:4,border:"1px solid #DDD",background:"#fff",cursor:"pointer",fontSize:11,fontFamily:"'DM Sans',sans-serif"}}>Modifier ({d.fourn})</button>
                    <button onClick={()=>accepter(d)} style={{padding:"5px 12px",borderRadius:4,border:"none",background:"#2A7A2A",cursor:"pointer",fontSize:11,fontFamily:"'DM Sans',sans-serif",color:"#fff",fontWeight:700}}>✓ Accepter ({d.fourn})</button>
                  </div>
                ))}
              </div>
            </div>}
          </div>
        );
      })}

      {/* ── Archives ── */}
      {archives.length>0&&<details style={{marginTop:16}}>
        <summary style={{fontSize:12,color:"#7A7A7A",cursor:"pointer",padding:"8px 0"}}>Devis archivés ({archives.length})</summary>
        {archives.map(d=>(
          <div key={d.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"0.5px solid #EEE",fontSize:12,color:"#7A7A7A"}}>
            <span>{d.titre} — {d.fourn}</span>
            <span style={{fontFamily:"'DM Mono',monospace"}}>{totalDevis(d).toLocaleString("fr-FR")} €</span>
            <span style={{color:"#CC2222"}}>Refusé</span>
          </div>
        ))}
      </details>}

      {/* ── Panel formulaire devis ── */}
      {formOpen&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.4)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget)setFormOpen(false);}}>
        <div style={{background:"#fff",borderRadius:12,padding:24,width:560,maxWidth:"94vw",maxHeight:"92vh",overflow:"auto",boxShadow:"0 8px 32px rgba(0,0,0,0.2)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div style={{fontSize:14,fontWeight:700,color:"#1C1C1C"}}>{editing?"Modifier le devis":"Nouveau devis"}</div>
            <button onClick={()=>setFormOpen(false)} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:"#7A7A7A"}}>✕</button>
          </div>
          <FG label="Groupe / besoin"><Inp value={form.titre||""} onChange={e=>f("titre",e.target.value)} placeholder="Ex: Scotch étanchéité ALCOV"/></FG>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <FG label="Fournisseur"><Sel value={form.fourn||""} onChange={e=>f("fourn",e.target.value)}>
              <option value="">— Choisir —</option>
              {(fournisseurs?.rows||[]).map(fo=><option key={fo.id}>{fo.nom}</option>)}
            </Sel></FG>
            <FG label="Projet"><Sel value={form.projet||""} onChange={e=>f("projet",e.target.value)}>
              <option value="">— Aucun —</option>
              {(projects?.rows||[]).map(p=><option key={p.id}>{p.name}</option>)}
            </Sel></FG>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <FG label="Date du devis"><Inp type="date" value={form.date||TODAY} onChange={e=>f("date",e.target.value)}/></FG>
            <FG label="Délai annoncé"><Inp value={form.delai||""} onChange={e=>f("delai",e.target.value)} placeholder="Ex: 5 jours ouvrés"/></FG>
          </div>
          <FG label="Articles proposés">
            {lignesForm.map((l,i)=>(
              <div key={i} style={{display:"grid",gridTemplateColumns:"2fr 60px 60px 80px 80px 24px",gap:4,marginBottom:4,alignItems:"center"}}>
                <Inp value={l.article||""} onChange={e=>fl(i,"article",e.target.value)} placeholder="Désignation"/>
                <Inp type="number" value={l.qty||""} onChange={e=>fl(i,"qty",e.target.value)} placeholder="Qté"/>
                <Sel value={l.unit||"pcs"} onChange={e=>fl(i,"unit",e.target.value)}>{UNITS.map(u=><option key={u}>{u}</option>)}</Sel>
                <Inp type="number" value={l.prix||""} onChange={e=>fl(i,"prix",e.target.value)} placeholder="Prix/u"/>
                <Sel value={l.cat||""} onChange={e=>fl(i,"cat",e.target.value)}><option value="">Catégorie</option>{CATS.map(cat=><option key={cat}>{cat}</option>)}</Sel>
                <button onClick={()=>removeLigne(i)} style={{background:"none",border:"none",cursor:"pointer",fontSize:14,color:"#CC2222"}}>✕</button>
              </div>
            ))}
            <button onClick={addLigne} style={{padding:"5px 12px",borderRadius:4,border:"1px dashed #DDD",background:"#F9F9F9",cursor:"pointer",fontSize:11,fontFamily:"'DM Sans',sans-serif",color:"#3A3A3A",marginTop:4}}>+ Ajouter un article</button>
          </FG>
          <div style={{background:"#F9F9F9",borderRadius:6,padding:"8px 12px",marginBottom:12,textAlign:"right",fontSize:13,fontWeight:700,fontFamily:"'DM Mono',monospace"}}>
            Total : {lignesForm.reduce((s,l)=>(+l.prix||0)*(+l.qty||1)+s,0).toLocaleString("fr-FR")} €
          </div>
          <FG label="Note / conditions"><Inp value={form.note||""} onChange={e=>f("note",e.target.value)} placeholder="Conditions de paiement, remarques..."/></FG>
          <FG label="Tags"><TagSelector tags={form.tags||""} onChange={v=>f("tags",v)} projetNom={form.projet||""} projects={projects}/></FG>
          {err&&<div style={{fontSize:12,color:"#CC2222",marginBottom:8,padding:"6px 10px",background:"#FFF0F0",borderRadius:4}}>{err}</div>}
          <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:8}}>
            <button onClick={()=>setFormOpen(false)} style={{padding:"8px 16px",borderRadius:4,border:"1px solid #DDD",background:"#fff",cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif"}}>Annuler</button>
            <button onClick={save} disabled={saving} style={{padding:"8px 20px",borderRadius:4,border:"none",background:"#CC2222",cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif",color:"#fff",fontWeight:700}}>
              {saving?"...":editing?"Mettre à jour":"Enregistrer"}
            </button>
          </div>
        </div>
      </div>}
    </div>
  );
}

const EO={ref:"",fourn:"",article:"",qty:"",unit:"pcs",prix:"",cat:"",loc:"",date:TODAY,dateLivraison:"",lieuLivraison:"La Rochelle",projet:"",lignes:"",tags:""};
const ED={titre:"",fourn:"",projet:"",description:"",lignes:"",prix:"",delai:"",statut:"en attente",date:TODAY,note:"",tags:""};
// Ligne d'article vide
const EL={article:"",qty:"",unit:"pcs",prix:"",cat:""};
function Commandes({sheet,stocks,fournisseurs,projects,events,devis}){
  const [onglet,setOnglet]=useState("commandes"); // "commandes" | "devis"
  const [filterProjet,setFilterProjet]=useState("");
  const [filterTag,setFilterTag]=useState("");
  const [showAllHisto,setShowAllHisto]=useState(false);
  const [open,setOpen]=useState(false);
  const [form,setForm]=useState(EO);
  const [lignesForm,setLignesForm]=useState([{...EL}]); // au moins 1 ligne
  const [editing,setEditing]=useState(null);
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");
  // ── Import IA (format texte structuré généré par Claude) ──
  const [aiOpen,setAiOpen]=useState(false);
  const [aiErr,setAiErr]=useState("");
  const [aiPreview,setAiPreview]=useState(null); // {form, lignes}

  // Parse les lignes depuis une commande existante


  // Marquer comme reçue
  async function toggleRecue(o){
    const wasRecue=isBool(o.recue);
    const next={...o,recue:!wasRecue};
    if(!wasRecue){
      await addToStock(o);
    } else {
      if(!isBool(o.factureCompta)){
        const snap=[...stocks.rows];
        const lignes=getLignes(o);
        for(const l of lignes){
          if(!l.article)continue;
          await updateStockQty(stocks,snap,l.article,-(+l.qty||0),{type:"commande",label:`Annulation réception : ${o.ref||o.fourn||""}`,projet:o.projet||""});
        }
      }
      next.factureCompta=false;
    }
    await sheet.update(o.id,next);
  }

  async function toggleFacture(o){
    await sheet.update(o.id,{...o,factureCompta:!isBool(o.factureCompta)});
  }

  // ── Extraction IA depuis texte collé ──
  // Correspondance approximative entre une catégorie texte et les CATS existantes
  function matchCat(catTexte){
    if(!catTexte)return"";
    const n=s=>s.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    const nc=n(catTexte);
    // Match exact
    const exact=CATS.find(c=>n(c)===nc);
    if(exact)return exact;
    // Match partiel — chercher si le texte contient un mot clé de la catégorie
    const partial=CATS.find(c=>nc.includes(n(c))||n(c).includes(nc));
    if(partial)return partial;
    // Mots clés spéciaux
    if(nc.includes("isolant")||nc.includes("acous")||nc.includes("phoniq"))return"Matériaux isolants";
    if(nc.includes("etfe")||nc.includes("membrane")||nc.includes("textile"))return"Membranes ETFE";
    if(nc.includes("alum")||nc.includes("profi"))return"Profilés aluminium";
    if(nc.includes("acier")||nc.includes("steel")||nc.includes("struct"))return"Acier structure";
    if(nc.includes("bois")||nc.includes("wood")||nc.includes("osb"))return"Structure bois";
    if(nc.includes("vis")||nc.includes("fixat")||nc.includes("boulon"))return"Visserie & fixations";
    if(nc.includes("joint")||nc.includes("etanch")||nc.includes("seal"))return"Étanchéité & joints";
    if(nc.includes("outil")||nc.includes("tool")||nc.includes("decoup"))return"Outillage";
    if(nc.includes("transport")||nc.includes("livr")||nc.includes("logist"))return"Transport & logistique";
    if(nc.includes("epi")||nc.includes("securit")||nc.includes("protect"))return"EPI & sécurité";
    if(nc.includes("cable")||nc.includes("electr"))return"Câblerie & électricité";
    return"Autre";
  }

  // Parser le texte structuré généré par Claude
  // Format attendu : lignes clé:valeur + blocs ARTICLE répétables
  function parseTexteIA(texte){
    const lines=texte.split("\n").map(l=>l.trim()).filter(Boolean);
    const get=(key)=>{
      const l=lines.find(x=>x.toUpperCase().startsWith(key.toUpperCase()+":"));
      return l?l.slice(key.length+1).trim():"";
    };
    // Convertir date FR (JJ/MM/AAAA) ou texte en YYYY-MM-DD
    const parseDate=(s)=>{
      if(!s)return"";
      if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
      if(/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(s)){
        const[d,m,y]=s.split("/");
        return`${y}-${m.padStart(2,"0")}-${d.padStart(2,"0")}`;
      }
      return"";
    };
    const formData={
      ref:get("REF"),
      fourn:get("FOURNISSEUR"),
      date:parseDate(get("DATE"))||TODAY,
      dateLivraison:parseDate(get("DATE_LIVRAISON")),
      lieuLivraison:get("LIEU_LIVRAISON")||"La Rochelle",
      projet:get("PROJET"),
      loc:"",cat:"",article:"",qty:"",unit:"pcs",prix:"",lignes:"",
    };
    // Extraire les blocs ARTICLE
    const lignes=[];
    let cur=null;
    for(const line of lines){
      if(line.toUpperCase().startsWith("ARTICLE:")){
        if(cur)lignes.push(cur);
        cur={article:line.slice(8).trim(),qty:"",unit:"pcs",prix:"",cat:""};
      } else if(cur){
        if(line.toUpperCase().startsWith("QTE:"))cur.qty=line.slice(4).trim().replace(",",".");
        else if(line.toUpperCase().startsWith("UNITE:"))cur.unit=line.slice(6).trim();
        else if(line.toUpperCase().startsWith("PRIX:"))cur.prix=line.slice(5).trim().replace(",",".");
        else if(line.toUpperCase().startsWith("CAT:"))cur.cat=matchCat(line.slice(4).trim());
      }
    }
    if(cur)lignes.push(cur);
    if(!lignes.length)return null;
    return{formData,lignes};
  }

  function parseAndPreview(){
    setAiErr("");setAiPreview(null);
    const texte=aiText.trim();
    if(texte.length<10){setAiErr("Colle d'abord le texte généré par Claude.");return;}
    const result=parseTexteIA(texte);
    if(!result||!result.lignes.length){setAiErr("Format non reconnu. Vérifie que le texte suit le format indiqué.");return;}
    setAiPreview(result);
  }

  async function applyAiPreview(){
    if(!aiPreview)return;
    // Créer le fournisseur s'il n'existe pas et si l'utilisateur a coché
    if(newFourn&&aiPreview.formData.fourn){
      const existe=fournisseurs.rows.some(f=>f.nom.trim().toLowerCase()===aiPreview.formData.fourn.trim().toLowerCase());
      if(!existe){
        await fournisseurs.add({nom:aiPreview.formData.fourn,specialite:"",contact:"",tel:"",adresse:"",note:"Créé automatiquement depuis l'import IA"});
      }
    }
    setForm({...EO,...aiPreview.formData});
    setLignesForm(aiPreview.lignes.map(l=>({...EL,...l})));
    setAiOpen(false);setAiPreview(null);setAiText("");setNewFourn(false);setErr("");setEditing(null);setOpen(true);
  }

  async function addToStock(ord){
    const lignes=getLignes(ord);
    // SNAPSHOT avant les updates séquentiels
    const snap=[...stocks.rows];
    for(const l of lignes){
      if(!l.article)continue;
      const existing=snap.find(s=>normRef(s.ref)===normRef(l.article));
      if(existing){
        const tagsExist=(existing.tags||"").split(",").filter(Boolean);
        const tagsNew=(ord.tags||"").split(",").filter(Boolean);
        const tagsMerge=[...new Set([...tagsExist,...tagsNew])].join(",");
        await updateStockQty(stocks,snap,l.article,+l.qty||0,{type:"commande",label:ord.ref||ord.fourn||"",projet:ord.projet||"",date:ord.date||TODAY});
        // Mettre à jour tags ET projet
        const sUpdated=stocks.rows.find(s=>normRef(s.ref)===normRef(l.article));
        if(sUpdated){
          const needsUpdate=(tagsMerge!==existing.tags)||(ord.projet&&!existing.projet);
          if(needsUpdate)await stocks.update(sUpdated.id,{...sUpdated,tags:tagsMerge,projet:sUpdated.projet||ord.projet||""});
        }
      } else {
        const initHist=JSON.stringify([{date:ord.date||TODAY,type:"commande",label:ord.ref||ord.fourn||"",projet:ord.projet||"",fourn:ord.fourn||"",qty:+l.qty||0,qtyApres:+l.qty||0}]);
        await stocks.add({ref:l.article,cat:l.cat||ord.cat||"",qty:+l.qty||0,min:0,unit:l.unit||"pcs",prix:+l.prix||0,loc:ord.loc||"",fourn:ord.fourn||"",tags:ord.tags||"",projet:ord.projet||"",historique:initHist});
      }
    }
  }

  async function syncEvenementLivraison(cmd,dateLiv){
    if(!events||!dateLiv)return;
    const lieu=cmd.lieuLivraison||"La Rochelle";
    const lieuLabel=lieu==="Chantier"?"Chantier":"La Rochelle";
    const titre=`Livraison — ${cmd.article} (${lieuLabel})`;
    const evExist=events.rows.find(e=>e.type==="livraison"&&(e.title===titre||e.title===`Livraison — ${cmd.article}`||e.title===`Livraison — ${cmd.article} (La Rochelle)`||e.title===`Livraison — ${cmd.article} (Chantier)`));
    const evData={title:titre,date:dateLiv,heure:"",type:"livraison",projet:cmd.projet||"",note:`${cmd.fourn}${cmd.ref?` · ${cmd.ref}`:""}${cmd.projet?` · ${cmd.projet}`:""}`,dateFin:""};
    if(evExist){await events.update(evExist.id,{...evExist,...evData});}
    else{await events.add(evData);}
  }

  async function save(){
    if(!lignesForm[0].article.trim()){setErr("Article obligatoire sur la 1ère ligne.");return;}
    if(!form.fourn.trim()){setErr("Fournisseur obligatoire.");return;}
    setSaving(true);setErr("");
    try{
      // 1ère ligne → champs legacy pour compatibilité
      const l0=lignesForm[0];
      const lignesJSON=lignesForm.length>1?JSON.stringify(lignesForm):"";
      const data={...form,
        article:l0.article,qty:+l0.qty||0,unit:l0.unit||"pcs",prix:+l0.prix||0,cat:l0.cat||form.cat||"",
        lignes:lignesJSON,
      };
      if(editing){await sheet.update(editing,data);}
      else{await sheet.add({...data,recue:false,factureCompta:false});}
      if(form.dateLivraison){await syncEvenementLivraison({...form,article:l0.article},form.dateLivraison);}
      setOpen(false);setEditing(null);setForm(EO);setLignesForm([{...EL}]);
    }catch(e){setErr(e.message);}setSaving(false);
  }

  // Règle finances : exclure projets terminés
  const normC=s=>String(s||"").trim().toLowerCase();
  const projTermines=new Set((projects?.rows||[]).filter(p=>p.statut==="terminé").map(p=>normC(p.name)));
  const isProjetTermine=o=>o.projet&&projTermines.has(normC(o.projet));

  // Livraisons en retard — projets non terminés uniquement
  const applyFiltre=o=>{
    if(filterProjet&&normC(o.projet)!==normC(filterProjet))return false;
    if(filterTag){const t=(o.tags||"").split(",").map(x=>x.trim());if(!t.includes(filterTag))return false;}
    return true;
  };
  const livraisonsRetard=sheet.rows.filter(o=>!isBool(o.recue)&&o.dateLivraison&&toISO(o.dateLivraison)<TODAY&&!isProjetTermine(o)&&applyFiltre(o));
  const encours=sheet.rows.filter(o=>!isBool(o.recue)&&!isProjetTermine(o)&&applyFiltre(o));
  const attenteFacture=sheet.rows.filter(o=>isBool(o.recue)&&!isBool(o.factureCompta)&&!isProjetTermine(o)&&applyFiltre(o)).sort((a,b)=>toISO(b.date||"").localeCompare(toISO(a.date||"")));
  const historique=sheet.rows.filter(o=>isBool(o.recue)&&isBool(o.factureCompta)&&applyFiltre(o)).sort((a,b)=>toISO(b.date||"").localeCompare(toISO(a.date||"")));

  const panel=open&&<SidePanel title={editing?"Modifier la commande":"Nouvelle commande"} onClose={()=>{setOpen(false);setEditing(null);setForm(EO);setLignesForm([{...EL}]);}}>    <FG label="Référence commande"><Inp value={form.ref} onChange={e=>f("ref",e.target.value)} placeholder="CMD-001"/></FG>

    {/* ── Articles ── */}
    <div style={{marginTop:8,marginBottom:4}}>

          <div style={{fontSize:11,color:"#7A7A7A",marginBottom:6,fontWeight:600}}>Article {i+1}</div>
          <FG label="Désignation *"><Inp value={l.article} onChange={e=>fl(i,"article",e.target.value)} placeholder="Ex: Profilés keder 2m"/></FG>
          <div style={{display:"grid",gridTemplateColumns:"1fr 80px 1fr",gap:6}}>
            <FG label="Quantité"><Inp type="number" value={l.qty} onChange={e=>fl(i,"qty",e.target.value)} placeholder="0"/></FG>
            <FG label="Unité"><Sel value={l.unit} onChange={e=>fl(i,"unit",e.target.value)}>{UNITS.map(u=><option key={u}>{u}</option>)}</Sel></FG>

          {l.qty>0&&l.prix>0&&<div style={{fontSize:11,color:"#2A7A2A",textAlign:"right",marginTop:2,fontWeight:600}}>

          </div>}
        </div>
      ))}
      <button onClick={addLigne} style={{width:"100%",padding:"7px",borderRadius:4,border:"1px dashed #CC2222",background:"#FFF0F0",cursor:"pointer",fontSize:12,color:"#CC2222",fontFamily:"'DM Sans',sans-serif",fontWeight:600}}>
        + Ajouter un article
      </button>
      {lignesForm.filter(l=>l.qty>0&&l.prix>0).length>1&&(
        <div style={{textAlign:"right",marginTop:6,fontSize:12,fontWeight:700,color:"#1C1C1C"}}>
          Total commande : {lignesForm.reduce((s,l)=>s+(+l.prix||0)*(+l.qty||0),0).toLocaleString("fr-FR")} €
        </div>
      )}
    </div>

    <FG label="Projet lié"><Sel value={form.projet||""} onChange={e=>f("projet",e.target.value)}>
      <option value="">— Aucun —</option>{(projects?.rows||[]).map(p=><option key={p.id} value={p.name}>{p.name}</option>)}
    </Sel></FG>
    <FG label="Emplacement"><Inp value={form.loc} onChange={e=>f("loc",e.target.value)} placeholder="Ex: Rack B2"/></FG>
    <FG label="Tags"><TagSelector tags={form.tags||""} onChange={v=>f("tags",v)} projetNom={form.projet} projects={projects}/></FG>
    <ErrMsg msg={err}/><PanelBtns onCancel={()=>{setOpen(false);setEditing(null);setForm(EO);}} onSave={save} saving={saving} saveLabel={editing?"Mettre à jour":"Créer la commande"}/>
  </SidePanel>;

    {aiOpen&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.4)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget){setAiOpen(false);setAiPreview(null);setAiErr("");setAiText("");setNewFourn(false);}}}>      <div style={{background:"#fff",borderRadius:12,padding:24,width:560,maxWidth:"94vw",maxHeight:"90vh",overflow:"auto",boxShadow:"0 8px 32px rgba(0,0,0,0.18)"}}>

        </div>
