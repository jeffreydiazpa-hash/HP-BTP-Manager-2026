// ── Système d'authentification ──
// Token stocké en mémoire uniquement, expire toutes les 5 minutes
let _authEmail = null;
let _authToken = null;
let _tokenExpiry = 0;

async function ensureAuth() {
  const now = Date.now();
  if (_authToken && _authEmail && now < _tokenExpiry - 30000) {
    return { email: _authEmail, token: _authToken };
  }
  if (!_authEmail) {
    const email = window.prompt("Entrez votre email Google autorisé :");
    if (!email) throw new Error("Authentification annulée");
    _authEmail = email.trim().toLowerCase();
  }
  const token = await jsonp({ action: "auth", email: _authEmail });
  if (!token.ok) {
    _authEmail = null;
    throw new Error(token.msg || "Authentification échouée — vérifiez votre email");
  }
  _authToken = token.token;
  _tokenExpiry = now + 5 * 60 * 1000;
  return { email: _authEmail, token: _authToken };
}

// ── API via JSONP ──
function jsonp(params) {
  return new Promise((resolve, reject) => {
    const cb = "cb_" + Math.random().toString(36).slice(2);
    const script = document.createElement("script");
    script.async = true;
    const url = GAS_URL + "?" + new URLSearchParams({...params, callback: cb}).toString();
    const cleanup = () => { if(window[cb])delete window[cb]; if(script.parentNode)script.parentNode.removeChild(script); };
    const timer = window.setTimeout(() => { cleanup(); reject(new Error("Délai d'attente dépassé")); }, 20000);
    window[cb] = (data) => { window.clearTimeout(timer); cleanup(); resolve(data); };
    script.onerror = () => { window.clearTimeout(timer); cleanup(); reject(new Error("Erreur réseau")); };
    script.src = url;
    document.head.appendChild(script);
  });
}

async function gasGet(key){
  const auth = await ensureAuth();
  const r = await jsonp({action:"get", key, email:auth.email, token:auth.token});
  if(!r.ok) throw new Error(r.msg);
  return r.data;
}

async function gasAction(action,key,data,id){
  const auth = await ensureAuth();
  const p = {action, key, email:auth.email, token:auth.token};
  if(data!==undefined&&data!==null) p.data=JSON.stringify(data);
  if(id!==undefined) p.id=id;
  const r = await jsonp(p);
  if(!r.ok){
    if(r.msg&&r.msg.includes("Token")){ _authToken=null; _tokenExpiry=0; }
    throw new Error(r.msg);
  }
  return r.data??r;
}

const todayDate=new Date(TODAY+"T00:00:00");

// Formate une date quelle que soit sa forme (ISO, DD/MM/YYYY, timestamp Google Sheets)
function fmt(d){
  if(!d||d==="—")return"—";
  // Déjà au format JJ/MM/AAAA
  if(typeof d==="string"&&/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(d)){
    const[day,m,y]=d.split("/");
    if(parseInt(y)<2000)return"—";
    return d;
  }
  // Format ISO YYYY-MM-DD
  if(typeof d==="string"&&/^\d{4}-\d{2}-\d{2}/.test(d)){
    const[y,m,day]=d.split("T")[0].split("-");
    if(parseInt(y)<2000)return"—";
    return`${parseInt(day)}/${parseInt(m)}/${y}`;
  }
  // Timestamp numérique (Google Sheets serial date)
  if(!isNaN(d)&&Number(d)>0){
    const x=new Date(Math.round((Number(d)-25569)*86400000));
    if(x.getUTCFullYear()<2000)return"—";
    return`${x.getUTCDate()}/${x.getUTCMonth()+1}/${x.getUTCFullYear()}`;
  }
  return"—";
}
// Normalise une date en YYYY-MM-DD pour les comparaisons
function toISO(d){
  if(!d)return"";
  if(typeof d==="string"&&/^\d{4}-\d{2}-\d{2}/.test(d)){
    const iso=d.split("T")[0];
    if(parseInt(iso.slice(0,4))<2000)return"";
    return iso;
  }
  if(typeof d==="string"&&/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(d)){
    const[day,m,y]=d.split("/");
    if(parseInt(y)<2000)return"";
    return`${y}-${m.padStart(2,"0")}-${day.padStart(2,"0")}`;
  }
  if(!isNaN(d)&&Number(d)>0){
    const x=new Date(Math.round((Number(d)-25569)*86400000));
    if(x.getUTCFullYear()<2000)return"";
    return x.toISOString().split("T")[0];
  }
  return"";
}
// ── Jours fériés français (fixes + Pâques mobile) ──
function joursFeries(year){
  // Pâques (algorithme de Butcher)
  const a=year%19,b=Math.floor(year/100),c=year%100;
  const d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25);
  const g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30;
  const i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7;
  const m=Math.floor((a+11*h+22*l)/451);
  const month=Math.floor((h+l-7*m+114)/31);
  const day=((h+l-7*m+114)%31)+1;
  const paques=new Date(year,month-1,day);
  const lundi=new Date(paques);lundi.setDate(lundi.getDate()+1);
  const ascension=new Date(paques);ascension.setDate(ascension.getDate()+39);
  const pentecote=new Date(paques);pentecote.setDate(pentecote.getDate()+50);
  const fmt2=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  return new Set([
    `${year}-01-01`,`${year}-05-01`,`${year}-05-08`,`${year}-07-14`,
    `${year}-08-15`,`${year}-11-01`,`${year}-11-11`,`${year}-12-25`,
    fmt2(lundi),fmt2(ascension),fmt2(pentecote),
  ]);
}
function isWorkDay(iso){
  if(!iso)return false;
  const d=new Date(iso+"T00:00:00");
  const dow=d.getDay();
  if(dow===0||dow===6)return false;
  // Utiliser la date locale pour vérifier le férié
  const localISO=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  return!joursFeries(d.getFullYear()).has(localISO);
}
// Nombre de jours ouvrés entre aujourd'hui et une date cible (négatif = retard)
function diffWorkDays(d){
  const iso=toISO(d);
  if(!iso)return 999;
  // Utiliser des dates locales strictement (pas UTC) pour éviter le décalage +2h
  const localISO=d2=>`${d2.getFullYear()}-${String(d2.getMonth()+1).padStart(2,"0")}-${String(d2.getDate()).padStart(2,"0")}`;
  const todayISO=localISO(todayDate);
  if(iso===todayISO)return 0;
  const target=new Date(iso+"T00:00:00");
  const sign=target>todayDate?1:-1;
  let cur=new Date(sign>0?todayDate:target);
  const end=new Date(sign>0?target:todayDate);
  let count=0;
  while(cur<end){
    if(isWorkDay(localISO(cur)))count++;
    cur.setDate(cur.getDate()+1);
  }
  return sign*count;
}
function diffDays(d){return diffWorkDays(d);}

// Urgence automatique selon échéance (en jours ouvrés)
function autoUrgence(due, done){
  if(done===true||done==="TRUE")return"low";
  const d=diffWorkDays(due);
  if(isNaN(d)||d===999)return"med";
  if(d<0)return"critique";
  if(d<=2)return"high";
  if(d<=5)return"med";
  return"low";
}

// ── Hook générique ──
function useSheet(key){
  const [rows,setRows]=useState([]);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const load=useCallback(async()=>{
    setLoading(true);
    try{setRows(await gasGet(key));setError(null);}
    catch(e){setError(e.message||"Erreur de chargement");}
    finally{setLoading(false);}
  },[key]);
  useEffect(()=>{load();},[load]);
  const add=async(data)=>{try{const c=await gasAdd(key,data);setRows(r=>[...r,c]);setError(null);return c;}catch(e){setError(e.message||"Erreur d'ajout");throw e;}};
  const update=async(id,data)=>{try{await gasUpdate(key,id,data);setRows(r=>r.map(x=>Number(x.id)===Number(id)?{...x,...data}:x));setError(null);}catch(e){setError(e.message||"Erreur de mise à jour");throw e;}};
  const remove=async(id)=>{try{await gasDelete(key,id);setRows(r=>r.filter(x=>Number(x.id)!==Number(id)));setError(null);}catch(e){setError(e.message||"Erreur de suppression");throw e;}};
  return{rows,setRows,loading,error,reload:load,add,update,remove};
}

// ── Calcul avancement composite ──
function calcAvancement(p, atelierChantier){
  const missions=(atelierChantier?.rows||[]).filter(m=>m.projet===p.name);
  const missAtelier=missions.filter(m=>m.type==="atelier");
  const missChantier=missions.filter(m=>m.type==="chantier");
  const avEtudes=Math.min(100,Math.max(0,Number(p.avancement)||0));
  let avAtelier=null;
  if(missAtelier.length>0){
    avAtelier=Math.round(missAtelier.filter(m=>m.statut==="terminé").length/missAtelier.length*100);
  }
  let avChantier=null;
  if(missChantier.length>0){
    const totalPoids=missChantier.reduce((s,m)=>s+Math.max(1,Number(m.importance)||1),0);
    const donePoids=missChantier.filter(m=>m.statut==="terminé").reduce((s,m)=>s+Math.max(1,Number(m.importance)||1),0);
    avChantier=Math.round(donePoids/totalPoids*100);
  }
  const facteurs=[{val:avEtudes,lbl:"Études"}];
  if(avAtelier!==null)facteurs.push({val:avAtelier,lbl:"Atelier"});
  if(avChantier!==null)facteurs.push({val:avChantier,lbl:"Chantier"});
  const poids=100/facteurs.length;
  const global=Math.round(facteurs.reduce((s,f)=>s+f.val*poids/100,0));
  return{global,facteurs};
}
// ── Calcul dépenses projet — fonction globale (utilisée par Dashboard ET Projets) ──
// Compte TOUTES les commandes et prestations assignées au projet
// Ne PAS filtrer ici par statut projet — chaque appelant applique sa propre règle
function calcDepensesProjet(p, orders, prestMissions){
  const isBool=v=>v===true||String(v).toUpperCase()==="TRUE";
  const normP=s=>String(s||"").trim().toLowerCase();
  const projCmd=(orders?.rows||[]).filter(o=>normP(o.projet)===normP(p.name)||o.projet===String(p.id));
  const cmdEngagees=projCmd.reduce((s,o)=>s+(+o.prix||0)*(+o.qty||0),0);
  const cmdRecues=projCmd.filter(o=>isBool(o.recue)).reduce((s,o)=>s+(+o.prix||0)*(+o.qty||0),0);
  const projPrest=(prestMissions?.rows||[]).filter(m=>normP(m.projet)===normP(p.name)||m.projet===String(p.id));
  const prestTotal=projPrest.reduce((s,m)=>s+Number(m.prix||0),0);
  const prestTerminees=projPrest.filter(m=>m.statut==="terminé").reduce((s,m)=>s+Number(m.prix||0),0);
  return{engagees:cmdEngagees,recues:cmdRecues,prest:prestTotal,prestTerminees,total:cmdEngagees+prestTotal};
}

// ══ DASHBOARD ══
function Dashboard({sheets}){
  const {projects,tasks,stocks,orders,events,prestMissions,atelierChantier}=sheets;
  const pending=tasks.rows.filter(t=>!t.done&&t.done!=="TRUE");
  const isDone=t=>t.done===true||t.done==="TRUE";
  const isBool=v=>v===true||String(v).toUpperCase()==="TRUE";
  async function toggleTask(t){await tasks.update(t.id,{...t,done:!isDone(t)});}

  // Séparation claire retard / urgent
  const tachesRetard=[...pending].filter(t=>autoUrgence(t.due,t.done)==="critique")
    .sort((a,b)=>toISO(a.due).localeCompare(toISO(b.due)));
  const tachesUrgent=[...pending].filter(t=>autoUrgence(t.due,t.done)==="high")
    .sort((a,b)=>toISO(a.due).localeCompare(toISO(b.due)));

  const stockAlerts=stocks.rows.filter(s=>Number(s.qty)<Number(s.min));
  const retardsProjets=projects.rows.filter(p=>p.statut==="retard");
  const upcoming=[...events.rows].sort((a,b)=>toISO(a.date).localeCompare(toISO(b.date))).filter(e=>toISO(e.date)>=TODAY).slice(0,5);
  const loading=Object.values(sheets).some(s=>s.loading);
  const [showFinances,setShowFinances]=useState(false);

  // ── Finances globales — projets non terminés uniquement ──
  const projetsActifsFinance=projects.rows.filter(p=>p.statut!=="terminé");
  const totalCA=projetsActifsFinance.reduce((s,p)=>s+Number(p.budget||0),0);
  const allDep=projetsActifsFinance.map(p=>calcDepensesProjet(p,orders,prestMissions));
  const totalEngagees=allDep.reduce((s,d)=>s+d.engagees,0);
  const totalRecues=allDep.reduce((s,d)=>s+d.recues,0);
  const totalPrest=allDep.reduce((s,d)=>s+d.prest,0);

  if(loading)return <Bd style={{textAlign:"center",padding:48}}><div style={{fontSize:22,marginBottom:8}} className="spin">⟳</div><div style={{fontSize:13,color:"#7A7A7A"}}>Chargement depuis Google Sheets...</div></Bd>;
  const empty=!projects.rows.length&&!tasks.rows.length&&!events.rows.length;
  if(empty)return(
    <Bd style={{textAlign:"center",padding:48}}>
      <HPLogo/>
      <div style={{fontSize:16,fontWeight:700,marginTop:16,marginBottom:6,color:"#1C1C1C"}}>BTP Manager — High Point Structures</div>
      <div style={{fontSize:13,color:"#7A7A7A"}}>Connecté à Google Sheets. Commence par ajouter tes projets.</div>
    </Bd>
  );
  return(
    <div>
      {/* Bandeau alertes — tâches en retard */}
      {(tachesRetard.length>0||retardsProjets.length>0)&&(
        <div style={{background:"#FFF0F0",border:"1px solid #FFCCCC",borderLeft:"4px solid #CC2222",borderRadius:8,padding:"12px 16px",marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:tachesRetard.length>0?10:0}}>
            <span style={{fontSize:13,fontWeight:700,color:"#CC2222"}}>
              {tachesRetard.length>0&&`${tachesRetard.length} tâche${tachesRetard.length>1?"s":""} en retard`}
              {tachesRetard.length>0&&retardsProjets.length>0&&" · "}
              {retardsProjets.length>0&&`${retardsProjets.length} projet${retardsProjets.length>1?"s":""} en retard`}
            </span>
          </div>
          {tachesRetard.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {tachesRetard.slice(0,4).map(t=>(
              <span key={t.id} style={{background:"#fff",border:"1px solid #FFAAAA",color:"#CC2222",fontSize:11,padding:"3px 10px",borderRadius:20,fontWeight:600,display:"flex",alignItems:"center",gap:5}}>
                <span style={{width:6,height:6,borderRadius:"50%",background:"#CC2222",display:"inline-block",flexShrink:0}}/>
                {t.text}{t.due&&<span style={{color:"#AA0000",fontWeight:700}}> · {Math.abs(diffDays(t.due))}j</span>}
              </span>
            ))}
          </div>}
        </div>
      )}

      {/* KPIs activité */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
        {[
          {val:projects.rows.filter(p=>p.statut!=="terminé").length,lbl:"Projets actifs"},
          {val:pending.length,lbl:"Tâches en attente"},
          {val:tachesRetard.length,lbl:"Tâches en retard",alert:tachesRetard.length>0},
          {val:orders.rows.filter(o=>!isBool(o.recue)).length,lbl:"Commandes en cours"},
        ].map((m,i)=>(
          <div key={i} style={{
            background:"#fff",
            border:m.alert?"1px solid #FFCCCC":"0.5px solid #DDDDDD",
            borderTop:m.alert?"3px solid #CC2222":"3px solid #F2F0ED",
            borderRadius:8,padding:"12px 14px"
          }}>
            <div style={{fontSize:22,fontWeight:700,color:m.alert?"#CC2222":"#1C1C1C"}}>{m.val}</div>
            <div style={{fontSize:12,color:"#7A7A7A",marginTop:2}}>{m.lbl}</div>
          </div>
        ))}
      </div>

      {/* ── BLOC FINANCES CLIQUABLE ── */}
      {(()=>{
        const totalDepenses=totalEngagees+totalPrest;
        const solde=totalCA-totalDepenses;
        const pctDep=totalCA>0?Math.min(Math.round(totalDepenses/totalCA*100),100):0;
        const soldeColor=solde<0?"#CC2222":solde<totalCA*0.1?"#CC8800":"#2A7A2A";

        // ── Vue détaillée finances ──
        if(showFinances){
          // Données par projet pour graphique
          const projData=projetsActifsFinance.map(p=>{
            const d=calcDepensesProjet(p,orders,prestMissions);
            return{name:p.name,ca:Number(p.budget)||0,dep:d.engagees+d.prest,cmd:d.engagees,prest:d.prest};
          }).filter(x=>x.ca>0||x.dep>0).sort((a,b)=>b.ca-a.ca);

          // Graphique barres horizontales par projet
          const maxVal=Math.max(...projData.map(x=>Math.max(x.ca,x.dep)),1);
          const barW=420;

          // Répartition dépenses
          const partCmd=totalDepenses>0?Math.round(totalEngagees/totalDepenses*100):0;
          const partPrest=totalDepenses>0?Math.round(totalPrest/totalDepenses*100):0;

          // Top commandes par montant
          const topCmd=[...orders.rows]
            .filter(o=>{if(!o.projet)return true;const p=projetsActifsFinance.find(x=>x.name===o.projet);return!!p;})
            .map(o=>({...o,total:(+o.prix||0)*(+o.qty||0)}))
            .filter(x=>x.total>0)
            .sort((a,b)=>b.total-a.total).slice(0,5);

          // Top prestations par montant
          const topPrest=[...(prestMissions?.rows||[])]
            .filter(m=>{if(!m.projet)return true;const p=projetsActifsFinance.find(x=>x.name===m.projet);return!!p;})
            .filter(m=>Number(m.prix)>0)
            .sort((a,b)=>Number(b.prix)-Number(a.prix)).slice(0,5);

          return(
            <div style={{marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                <button onClick={()=>setShowFinances(false)} style={{background:"none",border:"1px solid #DDDDDD",borderRadius:4,cursor:"pointer",fontSize:12,padding:"4px 10px",color:"#3A3A3A",fontFamily:"'DM Sans',sans-serif"}}>← Résumé</button>
                <div style={{fontSize:15,fontWeight:700,color:"#1C1C1C",borderLeft:"3px solid #CC2222",paddingLeft:8}}>Analyse financière — projets actifs</div>
              </div>

              {/* KPIs synthèse */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
                {[
                  {lbl:"Chiffre d'affaires",val:totalCA.toLocaleString("fr-FR")+" €",sub:`${projetsActifsFinance.length} projet${projetsActifsFinance.length>1?"s":""}`,color:"#1C1C1C"},
                  {lbl:"Dépenses totales",val:totalDepenses.toLocaleString("fr-FR")+" €",sub:`${pctDep}% du CA`,color:pctDep>90?"#CC2222":pctDep>60?"#CC8800":"#3A3A3A"},
                  {lbl:"Solde CA − Dépenses",val:(solde>=0?"+":"")+solde.toLocaleString("fr-FR")+" €",sub:solde>=0?"Positif":"Déficit",color:soldeColor},
                ].map((m,i)=>(
                  <div key={i} style={{background:"#fff",border:"0.5px solid #DDDDDD",borderRadius:8,padding:"14px 16px"}}>
                    <div style={{fontSize:11,color:"#7A7A7A",marginBottom:4}}>{m.lbl}</div>
                    <div style={{fontSize:20,fontWeight:700,color:m.color}}>{m.val}</div>
                    <div style={{fontSize:11,color:"#7A7A7A",marginTop:3}}>{m.sub}</div>
                  </div>
                ))}
              </div>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>

                {/* Graphique CA vs Dépenses par projet */}
                <Bd>
                  <SecTitle>CA vs Dépenses par projet</SecTitle>
                  {!projData.length&&<div style={{fontSize:13,color:"#7A7A7A"}}>Aucun projet avec budget défini.</div>}
                  {projData.map((p,i)=>{
                    const pct=p.ca>0?Math.round(p.dep/p.ca*100):0;
                    return(
                      <div key={i} style={{marginBottom:12}}>
                        <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                          <span style={{fontSize:12,fontWeight:500,color:"#1C1C1C",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"60%"}}>{p.name}</span>
                          <span style={{fontSize:11,color:pct>90?"#CC2222":"#7A7A7A",flexShrink:0}}>{pct}%</span>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
                          <span style={{fontSize:10,color:"#7A7A7A",width:28,flexShrink:0}}>CA</span>
                          <div style={{flex:1,height:8,background:"#EEEEEE",borderRadius:4,overflow:"hidden"}}>
                            <div style={{height:"100%",width:`${p.ca/maxVal*100}%`,background:"#1A5DAB",borderRadius:4}}/>
                          </div>
                          <span style={{fontSize:10,color:"#7A7A7A",width:64,textAlign:"right",flexShrink:0}}>{p.ca.toLocaleString("fr-FR")} €</span>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <span style={{fontSize:10,color:"#7A7A7A",width:28,flexShrink:0}}>Dep.</span>
                          <div style={{flex:1,height:8,background:"#EEEEEE",borderRadius:4,overflow:"hidden"}}>
                            <div style={{height:"100%",width:`${p.dep/maxVal*100}%`,background:pct>90?"#CC2222":pct>60?"#CC8800":"#2A7A2A",borderRadius:4}}/>
                          </div>
                          <span style={{fontSize:10,color:"#7A7A7A",width:64,textAlign:"right",flexShrink:0}}>{p.dep.toLocaleString("fr-FR")} €</span>
                        </div>
                      </div>
                    );
                  })}
                </Bd>

                {/* Donut répartition dépenses — corrigé */}
                <Bd>
                  <SecTitle>Répartition des dépenses</SecTitle>
                  {totalDepenses>0?(()=>{
                    // Donut SVG — formule correcte
                    // SVG circle commence à 3h, on veut démarrer à 12h → offset = circ/4
                    // Arc 1 (commandes) : offset = circ/4 (recule de 25% pour démarrer à 12h)
                    // Arc 2 (prest) : offset = circ/4 - cmdArc (décalé après le 1er)
                    const r=52,cx=68,cy=68,circ=2*Math.PI*r;
                    const cmdArc=totalEngagees/totalDepenses*circ;
                    const prestArc=totalPrest/totalDepenses*circ;
                    return(
                      <div style={{display:"flex",alignItems:"center",gap:16}}>
                        <svg width="136" height="136" viewBox="0 0 136 136" style={{flexShrink:0}}>
                          <circle cx={cx} cy={cy} r={r} fill="none" stroke="#EEEEEE" strokeWidth="20"/>
                          <circle cx={cx} cy={cy} r={r} fill="none" stroke="#CC2222" strokeWidth="20"
                            strokeDasharray={`${cmdArc} ${circ-cmdArc}`}
                            strokeDashoffset={circ/4}
                            style={{transformOrigin:"68px 68px"}}/>
                          <circle cx={cx} cy={cy} r={r} fill="none" stroke="#CC8800" strokeWidth="20"
                            strokeDasharray={`${prestArc} ${circ-prestArc}`}
                            strokeDashoffset={circ/4-cmdArc}
                            style={{transformOrigin:"68px 68px"}}/>
                          <text x={cx} y={cy-5} textAnchor="middle" fontSize="14" fontWeight="700" fill="#1C1C1C" fontFamily="DM Sans,sans-serif">{pctDep}%</text>
                          <text x={cx} y={cx+12} textAnchor="middle" fontSize="9" fill="#7A7A7A" fontFamily="DM Sans,sans-serif">consommé</text>
                        </svg>
                        <div style={{flex:1}}>
                          {[
                            {color:"#CC2222",lbl:"Commandes",val:totalEngagees,pct:partCmd},
                            {color:"#CC8800",lbl:"Prestations",val:totalPrest,pct:partPrest},
                          ].map((x,i)=>(
                            <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                              <div style={{width:10,height:10,borderRadius:2,background:x.color,flexShrink:0}}/>
                              <div>
                                <div style={{fontSize:12,fontWeight:600,color:"#1C1C1C"}}>{x.lbl}</div>
                                <div style={{fontSize:11,color:"#7A7A7A"}}>{x.val.toLocaleString("fr-FR")} € · {x.pct}%</div>
                              </div>
                            </div>
                          ))}
                          <div style={{borderTop:"0.5px solid #EEEEEE",paddingTop:8}}>
                            <div style={{fontSize:10,color:"#7A7A7A"}}>Total dépenses</div>
                            <div style={{fontSize:14,fontWeight:700,color:"#1C1C1C"}}>{totalDepenses.toLocaleString("fr-FR")} €</div>
                          </div>
                        </div>
                      </div>
                    );
                  })():<div style={{fontSize:13,color:"#7A7A7A"}}>Aucune dépense enregistrée.</div>}
                </Bd>
              </div>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>

                {/* CA brut par projet — camembert horizontal */}
                <Bd>
                  <SecTitle>CA brut par projet</SecTitle>
                  {!projData.filter(p=>p.ca>0).length&&<div style={{fontSize:13,color:"#7A7A7A"}}>Aucun CA défini.</div>}
                  {(()=>{
                    const colors=["#1A5DAB","#CC2222","#2A7A2A","#CC8800","#7A2A7A","#3A3A3A","#CC6600","#2A7A7A"];
                    const projCA=projData.filter(p=>p.ca>0);
                    return projCA.map((p,i)=>{
                      const pct=totalCA>0?Math.round(p.ca/totalCA*100):0;
                      return(
                        <div key={i} style={{marginBottom:8}}>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                            <div style={{display:"flex",alignItems:"center",gap:6}}>
                              <div style={{width:8,height:8,borderRadius:"50%",background:colors[i%colors.length],flexShrink:0}}/>
                              <span style={{fontSize:12,fontWeight:500,color:"#1C1C1C",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:140}}>{p.name}</span>
                            </div>
                            <span style={{fontSize:11,color:"#7A7A7A",flexShrink:0}}>{pct}% · {p.ca.toLocaleString("fr-FR")} €</span>
                          </div>
                          <div style={{height:6,background:"#EEEEEE",borderRadius:3,overflow:"hidden"}}>
                            <div style={{height:"100%",width:pct+"%",background:colors[i%colors.length],borderRadius:3}}/>
                          </div>
                        </div>
                      );
                    });
                  })()}
                  <div style={{borderTop:"0.5px solid #EEEEEE",paddingTop:8,marginTop:4,display:"flex",justifyContent:"space-between"}}>
                    <span style={{fontSize:11,color:"#7A7A7A"}}>CA total</span>
                    <span style={{fontSize:13,fontWeight:700,color:"#1C1C1C"}}>{totalCA.toLocaleString("fr-FR")} €</span>
                  </div>
                </Bd>

                {/* CA net par projet (CA - dépenses) */}
                <Bd>
                  <SecTitle>CA net par projet (CA − dépenses)</SecTitle>
                  {!projData.filter(p=>p.ca>0).length&&<div style={{fontSize:13,color:"#7A7A7A"}}>Aucun CA défini.</div>}
                  {(()=>{
                    const projNet=projData.filter(p=>p.ca>0).map(p=>({...p,net:p.ca-p.dep})).sort((a,b)=>b.net-a.net);
                    const maxAbs=Math.max(...projNet.map(p=>Math.abs(p.net)),1);
                    return projNet.map((p,i)=>{
                      const pct=Math.round(p.net/p.ca*100);
                      const isNeg=p.net<0;
                      const barW=Math.round(Math.abs(p.net)/maxAbs*100);
                      return(
                        <div key={i} style={{marginBottom:8}}>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                            <span style={{fontSize:12,fontWeight:500,color:"#1C1C1C",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:"55%"}}>{p.name}</span>
                            <span style={{fontSize:11,color:isNeg?"#CC2222":"#2A7A2A",fontWeight:600,flexShrink:0}}>
                              {isNeg?"-":"+"}
                              {Math.abs(p.net).toLocaleString("fr-FR")} € ({Math.abs(pct)}%)
                            </span>
                          </div>
                          <div style={{height:6,background:"#EEEEEE",borderRadius:3,overflow:"hidden"}}>
                            <div style={{height:"100%",width:barW+"%",background:isNeg?"#CC2222":"#2A7A2A",borderRadius:3}}/>
                          </div>
                        </div>
                      );
                    });
                  })()}
                  <div style={{borderTop:"0.5px solid #EEEEEE",paddingTop:8,marginTop:4,display:"flex",justifyContent:"space-between"}}>
                    <span style={{fontSize:11,color:"#7A7A7A"}}>Solde global</span>
                    <span style={{fontSize:13,fontWeight:700,color:solde>=0?"#2A7A2A":"#CC2222"}}>
                      {solde>=0?"+":""}{solde.toLocaleString("fr-FR")} €
                    </span>
                  </div>
                </Bd>
              </div>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                {/* Top commandes */}
                <Bd>
                  <SecTitle>Top commandes</SecTitle>
                  {!topCmd.length&&<div style={{fontSize:13,color:"#7A7A7A"}}>Aucune commande.</div>}
                  {topCmd.map((o,i)=>(
                    <div key={o.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:"0.5px solid #EEEEEE"}}>
                      <span style={{fontSize:11,fontWeight:700,color:"#AAAAAA",width:16,flexShrink:0}}>{i+1}</span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,fontWeight:500,color:"#1C1C1C",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.article}</div>
                        <div style={{fontSize:11,color:"#7A7A7A"}}>{o.fourn}{o.projet&&` · ${o.projet}`}</div>
                      </div>
                      <span style={{fontSize:12,fontWeight:700,color:isBool(o.recue)?"#2A7A2A":"#3A3A3A",flexShrink:0}}>{o.total.toLocaleString("fr-FR")} €</span>
                    </div>
                  ))}
                </Bd>

                {/* Top prestations */}
                <Bd>
                  <SecTitle>Top prestations</SecTitle>
                  {!topPrest.length&&<div style={{fontSize:13,color:"#7A7A7A"}}>Aucune prestation.</div>}
                  {topPrest.map((m,i)=>(
                    <div key={m.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:"0.5px solid #EEEEEE"}}>
                      <span style={{fontSize:11,fontWeight:700,color:"#AAAAAA",width:16,flexShrink:0}}>{i+1}</span>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,fontWeight:500,color:"#1C1C1C",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.description}</div>
                        <div style={{fontSize:11,color:"#7A7A7A"}}>{m.prestataire&&`${m.prestataire} · `}{m.projet}</div>
                      </div>
                      <span style={{fontSize:12,fontWeight:700,color:m.statut==="terminé"?"#2A7A2A":"#3A3A3A",flexShrink:0}}>{Number(m.prix).toLocaleString("fr-FR")} €</span>
                    </div>
                  ))}
                </Bd>
              </div>
            </div>
          );
        }

        // ── Bloc résumé cliquable ──
        return(
          <div onClick={()=>setShowFinances(true)} style={{
            background:"#fff",border:"0.5px solid #DDDDDD",borderRadius:10,padding:"14px 18px",
            marginBottom:14,cursor:"pointer",transition:"box-shadow .15s"
          }}
          onMouseEnter={e=>e.currentTarget.style.boxShadow="0 2px 8px rgba(0,0,0,0.08)"}
          onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <span style={{fontSize:13,fontWeight:700,color:"#1C1C1C",borderLeft:"3px solid #CC2222",paddingLeft:8}}>Finances — projets actifs</span>
              <span style={{fontSize:11,color:"#CC2222",fontWeight:600}}>Voir l'analyse détaillée →</span>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:0}}>
              {[
                {lbl:"Chiffre d'affaires",val:totalCA.toLocaleString("fr-FR")+" €",color:"#1C1C1C",border:true},
                {lbl:"Dépenses totales",val:(totalEngagees+totalPrest).toLocaleString("fr-FR")+" €",sub:`cmd ${totalEngagees.toLocaleString("fr-FR")} + prest ${totalPrest.toLocaleString("fr-FR")}`,color:pctDep>90?"#CC2222":pctDep>60?"#CC8800":"#3A3A3A",border:true},
                {lbl:"CA − Dépenses",val:(solde>=0?"+":"")+solde.toLocaleString("fr-FR")+" €",color:soldeColor,border:false},
              ].map((m,i)=>(
                <div key={i} style={{padding:"4px 16px",borderRight:m.border?"1px solid #EEEEEE":"none"}}>
                  <div style={{fontSize:10,color:"#7A7A7A",marginBottom:4,textTransform:"uppercase",letterSpacing:"0.04em"}}>{m.lbl}</div>
                  <div style={{fontSize:18,fontWeight:700,color:m.color}}>{m.val}</div>

                    </div>
                    <Badge label={`${Math.abs(diffWorkDays(o.dateLivraison))}j retard`} bg="#FFF0F0" color="#CC2222"/>

                {prochaines.slice(0,4).map(o=>{

// Composant champ tag avec état local
function TagInput({tags,onChange}){
  const [val,setVal]=useState("");
  function addTag(){
    const v=val.trim();
    if(!v)return;
    const cur=tags.split(",").filter(Boolean).map(t=>t.trim());
    if(!cur.includes(v))onChange([...cur,v].join(","));
    setVal("");
  }
  return(
    <div>
      <div style={{marginBottom:6,display:"flex",flexWrap:"wrap",gap:4}}>
        {tags.split(",").filter(Boolean).map((tag,i)=>(
          <span key={i} style={{display:"inline-flex",alignItems:"center",gap:3,background:"#EBF3FF",color:"#1A5DAB",fontSize:11,fontWeight:600,padding:"2px 8px",borderRadius:12}}>
            {tag.trim()}
            <button onClick={()=>{const t=tags.split(",").filter(Boolean).filter((_,j)=>j!==i).join(",");onChange(t);}} style={{background:"none",border:"none",cursor:"pointer",color:"#1A5DAB",fontSize:12,padding:0,lineHeight:1}}>×</button>
          </span>
        ))}
      </div>
      <div style={{display:"flex",gap:6}}>
        <Inp value={val} onChange={e=>setVal(e.target.value)} placeholder="Nouveau tag..."
          onKeyDown={e=>{if(e.key==="Enter"){addTag();e.preventDefault();}}}/>
        <button onClick={addTag} style={{padding:"6px 12px",borderRadius:4,border:"1px solid #1A5DAB",background:"#EBF3FF",cursor:"pointer",fontSize:12,color:"#1A5DAB",fontFamily:"'DM Sans',sans-serif",flexShrink:0,fontWeight:600}}>+</button>
      </div>
      <div style={{fontSize:10,color:"#7A7A7A",marginTop:3}}>Entrée ou + pour ajouter</div>
    </div>
  );
}

// Retourne les tags d'un projet donné
function getTagsProjet(projetNom, projects){
  if(!projetNom||!projects)return[];
  const p=projects.rows.find(x=>x.name===projetNom);
  return(p?.tags||"").split(",").map(t=>t.trim()).filter(Boolean);
}

// Sélecteur de tags (tags disponibles du projet + tags libres)
function TagSelector({tags,onChange,projetNom,projects}){
  const [val,setVal]=useState("");
  const tagsProjet=getTagsProjet(projetNom,projects);
  const current=tags.split(",").map(t=>t.trim()).filter(Boolean);
  function toggle(tag){
    const has=current.includes(tag);
    onChange(has?current.filter(t=>t!==tag).join(","):[...current,tag].join(","));
  }
  function addCustom(){
    const v=val.trim();
    if(!v)return;
    if(!current.includes(v))onChange([...current,v].join(","));
    setVal("");
  }
  return(
    <div>
      {tagsProjet.length>0&&<div style={{marginBottom:6}}>
        <div style={{fontSize:10,color:"#7A7A7A",marginBottom:4}}>Tags du projet :</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
          {tagsProjet.map((tag,i)=>{
            const active=current.includes(tag);
            return<button key={i} onClick={()=>toggle(tag)} style={{padding:"2px 8px",borderRadius:10,fontSize:11,fontWeight:600,cursor:"pointer",border:`1px solid ${active?"#1A5DAB":"#DDDDDD"}`,background:active?"#1A5DAB":"#fff",color:active?"#fff":"#7A7A7A",fontFamily:"'DM Sans',sans-serif"}}>{tag}</button>;
          })}
        </div>
      </div>}
      {current.filter(t=>!tagsProjet.includes(t)).length>0&&<div style={{marginBottom:6,display:"flex",flexWrap:"wrap",gap:4}}>
        {current.filter(t=>!tagsProjet.includes(t)).map((tag,i)=>(
          <span key={i} style={{display:"inline-flex",alignItems:"center",gap:3,background:"#F2F0ED",color:"#3A3A3A",fontSize:11,fontWeight:500,padding:"2px 8px",borderRadius:10}}>
            {tag}
            <button onClick={()=>toggle(tag)} style={{background:"none",border:"none",cursor:"pointer",color:"#3A3A3A",fontSize:12,padding:0}}>×</button>
          </span>
        ))}
      </div>}
      <div style={{display:"flex",gap:6}}>
        <Inp value={val} onChange={e=>setVal(e.target.value)} placeholder="Tag libre..."
          onKeyDown={e=>{if(e.key==="Enter"){addCustom();e.preventDefault();}}}/>
        <button onClick={addCustom} style={{padding:"6px 10px",borderRadius:4,border:"1px solid #DDDDDD",background:"#F9F9F9",cursor:"pointer",fontSize:12,color:"#3A3A3A",fontFamily:"'DM Sans',sans-serif",flexShrink:0}}>+</button>
      </div>
    </div>
  );
}

// Barre de filtre projet + tag
function FiltreProjetTag({projects,filterProjet,setFilterProjet,filterTag,setFilterTag}){
  const tagsDispos=getTagsProjet(filterProjet,projects);

      </Sel>

// ── Normalisation des refs stock : UNE SEULE méthode partout ──
function normRef(s){return String(s||"").trim().toLowerCase().replace(/\s+/g," ");}

// Parse les pièces stock d'une mission (nouveau format JSON ou ancien stockRef/stockQty)
function getMissionStockItems(m){
  // Si stockItems est défini (même vide []), c'est la source de vérité — ignorer stockRef
  if(m.stockItems!==undefined&&m.stockItems!==null&&m.stockItems!==""){
    try{const p=JSON.parse(m.stockItems);if(Array.isArray(p))return p.filter(x=>x.ref&&x.qty);}catch(e){}
  }
  // Fallback legacy : ancien champ stockRef (missions avant le multi-pièces)
  if(m.stockRef)return [{ref:m.stockRef,qty:Number(m.stockQty)||1}];
  return[];
}

const EP={name:"",statut:"en cours",avancement:0,equipe:0,budget:"",depense:"",client:"",lieu:"",note:"",ingenieur:"",tags:""};
function Projets({sheet,notes,tasks,orders,stocks,events,prestMissions,atelierChantier,team}){
  const [open,setOpen]=useState(false);
  const [form,setForm]=useState(EP);
  const [editing,setEditing]=useState(null);
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");
  const [detail,setDetail]=useState(null);
  const [noteForm,setNoteForm]=useState({titre:"",contenu:""});
  const [savingNote,setSavingNote]=useState(false);
  const [showHistorique,setShowHistorique]=useState(false);
  const [editingOrder,setEditingOrder]=useState(null);
  const [orderForm,setOrderForm]=useState({});
  const f=(k,v)=>setForm(x=>({...x,[k]:v}));
  const isBool=v=>v===true||String(v).toUpperCase()==="TRUE";

  function openDetail(id){
    setOpen(false);
    setEditing(null);
    setEditingOrder(null);
    setDetail(id);
  }

  function openEdit(p,e){
    if(e)e.stopPropagation();
    setDetail(null);
    setEditing(p.id);
    setForm({...p,budget:p.budget??"",depense:p.depense??""});
    setErr("");
    setOpen(true);
  }

  function openNew(){
    setDetail(null);
    setEditing(null);
    setForm(EP);
    setErr("");
    setOpen(true);
  }

  async function save(){
    if(!form.name.trim()){setErr("Nom obligatoire.");return;}
    setSaving(true);setErr("");
    try{
      const item={...form,avancement:+form.avancement||0,equipe:+form.equipe||0,budget:+form.budget||0,depense:+form.depense||0};
      if(editing){await sheet.update(editing,item);}else{await sheet.add(item);}
      setOpen(false);setEditing(null);
    }catch(e){setErr(e.message);}
    setSaving(false);
  }

  async function saveNote(projId){
    if(!noteForm.contenu.trim())return;
    setSavingNote(true);
    try{
      await notes.add({projet_id:projId,date:TODAY,titre:noteForm.titre,contenu:noteForm.contenu});
      setNoteForm({titre:"",contenu:""});
    }catch(e){}
    setSavingNote(false);
  }

  async function finaliser(p){
    if(!confirm(`Finaliser et archiver le projet "${p.name}" ?`))return;
    await sheet.update(p.id,{...p,statut:"terminé",avancement:100});
    setDetail(null);
  }

  // Sauvegarde commande modifiée depuis vue détail
  async function saveOrder(){
    if(!editingOrder)return;
    await orders.update(editingOrder,{...orderForm,qty:+orderForm.qty||0,prix:+orderForm.prix||0});
    setEditingOrder(null);
    setOrderForm({});
  }

  // Délègue à la fonction globale
  function calcDepensesReelles(p){return calcDepensesProjet(p,orders,prestMissions);}

  // Calcule l'équipe automatique d'un projet (membres distincts des missions liées)
  function calcEquipeAuto(p){
    const missions=(atelierChantier?.rows||[]).filter(m=>m.projet===p.name);
    const membres=new Set();
    missions.forEach(m=>{
      const mb=typeof m.membres==="string"?m.membres.split(",").filter(Boolean):(m.membres||[]);
      mb.forEach(x=>membres.add(x.trim()));
    });
    return Array.from(membres);
  }

  // Liste des ingénieurs (filtre sur le rôle depuis le module Équipe)
  const ingenieurs=(team?.rows||[]).filter(t=>{
    const r=(t.role||t.poste||"").toLowerCase();
    return r.includes("ingénieur")||r.includes("ingenieur")||r.includes("engineer")||r.includes("be ")||r.includes("bureau d'études");
  });

  const actifs=sheet.rows.filter(p=>p.statut!=="terminé");
  const historique=sheet.rows.filter(p=>p.statut==="terminé");

  // ── Panel latéral nouveau/modifier projet ──
  const panel=open&&<SidePanel title={editing?"Modifier le projet":"Nouveau projet"} onClose={()=>{setOpen(false);setEditing(null);}}>
    <FG label="Nom du projet *"><Inp value={form.name} onChange={e=>f("name",e.target.value)} placeholder="Ex: Façade ETFE Lyon"/></FG>
    <FG label="Client / maître d'ouvrage"><Inp value={form.client||""} onChange={e=>f("client",e.target.value)} placeholder="Ex: Société ABC"/></FG>
    <FG label="Lieu / chantier"><Inp value={form.lieu||""} onChange={e=>f("lieu",e.target.value)} placeholder="Ex: Lyon"/></FG>
    <FG label="Statut"><Sel value={form.statut} onChange={e=>f("statut",e.target.value)}>{PROJ_STATUTS.map(s=><option key={s}>{s}</option>)}</Sel></FG>
    <FG label="Avancement études (%)"><Inp type="number" value={form.avancement} onChange={e=>f("avancement",e.target.value)} placeholder="0-100"/></FG>
    <FG label="Chiffre d'affaires (€)"><Inp type="number" value={form.budget} onChange={e=>f("budget",e.target.value)}/></FG>
    <FG label="Dépenses saisies (€)"><Inp type="number" value={form.depense} onChange={e=>f("depense",e.target.value)}/></FG>
    <FG label="Ingénieur responsable">
      <Sel value={form.ingenieur||""} onChange={e=>f("ingenieur",e.target.value)}>
        <option value="">— Aucun —</option>
        {ingenieurs.map(t=><option key={t.id} value={t.nom}>{t.nom} · {t.role||t.poste||""}</option>)}
        {/* Fallback si aucun ingénieur filtré : afficher toute l'équipe */}
        {!ingenieurs.length&&(team?.rows||[]).map(t=><option key={t.id} value={t.nom}>{t.nom}</option>)}
      </Sel>
    </FG>
    <FG label="Note"><Inp value={form.note||""} onChange={e=>f("note",e.target.value)} placeholder="Optionnel"/></FG>
    <FG label="Tags projet">
      <TagInput tags={form.tags||""} onChange={v=>f("tags",v)}/>
    </FG>
    <ErrMsg msg={err}/>
    <PanelBtns onCancel={()=>{setOpen(false);setEditing(null);}} onSave={save} saving={saving} saveLabel={editing?"Mettre à jour":"Créer"}/>
  </SidePanel>;

  // ══ VUE DÉTAIL ══
  if(detail){
    const p=sheet.rows.find(x=>Number(x.id)===Number(detail));
    if(!p){setDetail(null);return null;}

    const projTasks=tasks.rows.filter(t=>t.projet===p.name);
    const projOrders=orders.rows.filter(o=>o.projet===p.name||o.projet===String(p.id));
    const projNotes=notes.rows.filter(n=>Number(n.projet_id)===Number(p.id)).sort((a,b)=>toISO(b.date).localeCompare(toISO(a.date)));
    const projEvents=events.rows.filter(e=>{
      if(e.projet!==p.name)return false;
      const iso=toISO(e.date);
      if(!iso)return false;
      // Garder si date >= aujourd'hui (ou si dateFin couvre encore aujourd'hui)
      const fin=e.dateFin?toISO(e.dateFin):iso;
      return fin>=TODAY;
    }).sort((a,b)=>toISO(a.date).localeCompare(toISO(b.date)));
    const projPrest=(prestMissions?.rows||[]).filter(m=>m.projet===p.name||m.projet===String(p.id));
    const projAtelier=(atelierChantier?.rows||[]).filter(m=>m.projet===p.name&&m.type==="atelier")
      .sort((a,b)=>toISO(a.dateDebut||"").localeCompare(toISO(b.dateDebut||"")));
    const projChantier=(atelierChantier?.rows||[]).filter(m=>m.projet===p.name&&m.type==="chantier")
      .sort((a,b)=>toISO(a.dateDebut||"").localeCompare(toISO(b.dateDebut||"")));
    const projStocks=stocks.rows.filter(s=>projOrders.some(o=>o.article&&s.ref&&normRef(o.article)===normRef(s.ref)));

    const sc=statutColor(p.statut);
    const dep=calcDepensesReelles(p);
    const caVal=Number(p.budget)||0;
    const depSaisie=Number(p.depense)||0;
    const depAff=dep.total>0?dep.total:depSaisie;
    const pct=caVal>0?Math.round(depAff/caVal*100):0;

    const sbMission=s=>({planifié:{bg:"#F2F0ED",tx:"#3A3A3A"},"en cours":{bg:"#FFF0F0",tx:"#CC2222"},terminé:{bg:"#F0FFF0",tx:"#2A7A2A"}}[s]||{bg:"#F2F0ED",tx:"#3A3A3A"});

    function exportPDF(){
      const isBool=v=>v===true||String(v).toUpperCase()==="TRUE";
      const dateAujourdhui=new Date().toLocaleDateString("fr-FR");
      const ref=`Réf. HP-${String(p.id).padStart(4,"0")}-${new Date().getFullYear()}`;
      const equipeAutoPDF=calcEquipeAuto(p);
      const equipeVal=equipeAutoPDF.length>0?equipeAutoPDF.join(", "):(p.equipe?p.equipe+" pers.":null);

      const secTitle=(n,t)=>`<h2 style="font-family:'DM Sans',Arial,sans-serif;font-size:13pt;font-weight:700;color:#1C1C1C;border-left:3px solid #CC2222;padding-left:8px;margin:20px 0 10px;">${n}. ${t}</h2>`;

      const badge=(txt,color)=>`<span style="display:inline-block;background:${color==="red"?"#FFF0F0":color==="green"?"#F0FFF0":"#F2F0ED"};color:${color==="red"?"#CC2222":color==="green"?"#2A7A2A":"#3A3A3A"};font-size:9pt;padding:2px 8px;border-radius:4px;font-weight:600;">${txt}</span>`;

      const pbar=(pct)=>`<div style="height:5px;background:#EEEEEE;border-radius:3px;margin-top:4px;"><div style="height:100%;width:${Math.min(pct,100)}%;background:${pct>90?"#CC2222":pct>60?"#CC8800":"#2A7A2A"};border-radius:3px;"></div></div>`;

      const tableRow=(cells,header=false)=>`<tr>${cells.map((c,i)=>`<td style="padding:7px 10px;border-bottom:0.5px solid #DDDDDD;font-size:9.5pt;font-family:'DM Sans',Arial,sans-serif;color:#1C1C1C;${header?"font-weight:700;background:#F2F0ED;":""}${i===0?"font-weight:500;":""}">${c||"—"}</td>`).join("")}</tr>`;

      const table=(headers,rows)=>`<table style="width:100%;border-collapse:collapse;border:0.5px solid #DDDDDD;border-radius:6px;overflow:hidden;margin-bottom:12px;"><thead>${tableRow(headers,true)}</thead><tbody>${rows.map(r=>tableRow(r)).join("")}</tbody></table>`;

      // Sections
      let sections="";

      // 1. Résumé financier
      if(caVal>0||dep.total>0){
        sections+=secTitle(1,"Résumé financier");
        sections+=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:14px;">`;
        [
          {lbl:"Chiffre d'affaires",val:caVal>0?caVal.toLocaleString("fr-FR")+" €":"—"},
          {lbl:"Dépenses engagées",val:dep.total>0?dep.total.toLocaleString("fr-FR")+" €":"—"},
          {lbl:"Commandes reçues",val:dep.recues>0?dep.recues.toLocaleString("fr-FR")+" €":"—"},
          {lbl:"Prestations",val:dep.prest>0?dep.prest.toLocaleString("fr-FR")+" €":"—"},
        ].forEach(m=>{
          sections+=`<div style="background:#F9F9F9;border:0.5px solid #DDDDDD;border-radius:6px;padding:10px 12px;"><div style="font-size:8.5pt;color:#7A7A7A;margin-bottom:3px;font-family:'DM Sans',Arial,sans-serif;">${m.lbl}</div><div style="font-size:14pt;font-weight:700;color:#1C1C1C;font-family:'DM Sans',Arial,sans-serif;">${m.val}</div></div>`;
        });
        sections+="</div>";
        if(caVal>0){sections+=`<div style="font-size:9pt;color:#7A7A7A;margin-bottom:3px;font-family:'DM Sans',Arial,sans-serif;">Consommation CA : ${pct}%</div>${pbar(pct)}<div style="margin-bottom:14px;"></div>`;}
      }

      // 2. Tâches
      if(projTasks.length){
        sections+=secTitle(2,`Tâches (${projTasks.length})`);
        sections+=table(["Description","Échéance","Statut"],
          projTasks.map(t=>[
            t.text,
            t.due?fmt(t.due):"—",
            isBool(t.done)?"✓ Terminée":autoUrgence(t.due,t.done)==="critique"?"En retard":"En cours"
          ])
        );
      }

      // 3. Calendrier
      if(projEvents.length){
        sections+=secTitle(3,`Calendrier (${projEvents.length})`);
        sections+=table(["Événement","Date","Heure","Type"],
          projEvents.map(e=>[e.title,fmt(e.date),e.heure||"—",EV_LABELS[e.type]||e.type||"—"])
        );
      }

      // 4. Commandes
      if(projOrders.length){
        sections+=secTitle(4,`Commandes (${projOrders.length})`);
        sections+=table(["Article","Fournisseur","Qté","Prix unitaire","Total","Statut"],
          projOrders.map(o=>[
            o.article,o.fourn,`${o.qty} ${o.unit||""}`,
            o.prix>0?Number(o.prix).toLocaleString("fr-FR")+" €":"—",
            o.prix>0?(+o.prix*(+o.qty||1)).toLocaleString("fr-FR")+" €":"—",
            isBool(o.recue)?"Reçue":"En cours"
          ])
        );
      }

      // 5. Prestations
      if(projPrest.length){
        sections+=secTitle(5,`Prestations (${projPrest.length})`);
        sections+=table(["Description","Prestataire","Période","Prix","Statut"],
          projPrest.map(m=>[
            m.description,m.prestataire||"—",
            m.dateDebut?`${fmt(m.dateDebut)}${m.dateFin?" → "+fmt(m.dateFin):""}` :"—",
            m.prix>0?Number(m.prix).toLocaleString("fr-FR")+" €":"—",
            m.statut
          ])
        );
      }

      // 6. Missions atelier
      if(projAtelier.length){
        sections+=secTitle(6,`Atelier (${projAtelier.length})`);
        sections+=table(["Description","Membres","Période","Statut"],
          projAtelier.map(m=>{
            const mb=typeof m.membres==="string"?m.membres.split(",").filter(Boolean).join(", "):m.membres||"—";
            return[m.description,mb||"—",m.dateDebut?`${fmt(m.dateDebut)}${m.dateFin?" → "+fmt(m.dateFin):""}` :"—",m.statut];
          })
        );
      }

      // 7. Missions chantier
      if(projChantier.length){
        sections+=secTitle(7,`Chantier (${projChantier.length})`);
        sections+=table(["Description","Membres","Période","Statut"],
          projChantier.map(m=>{
            const mb=typeof m.membres==="string"?m.membres.split(",").filter(Boolean).join(", "):m.membres||"—";
            return[m.description,mb||"—",m.dateDebut?`${fmt(m.dateDebut)}${m.dateFin?" → "+fmt(m.dateFin):""}` :"—",m.statut];
          })
        );
      }

      // 8. Notes
      if(projNotes.length){
        sections+=secTitle(8,`Notes (${projNotes.length})`);
        projNotes.forEach(n=>{
          sections+=`<div style="background:#F9F9F9;border:0.5px solid #DDDDDD;border-left:3px solid #DDDDDD;border-radius:6px;padding:10px 14px;margin-bottom:8px;">`;
          if(n.titre)sections+=`<div style="font-size:10.5pt;font-weight:700;color:#1C1C1C;margin-bottom:3px;font-family:'DM Sans',Arial,sans-serif;">${n.titre}</div>`;
          sections+=`<div style="font-size:8.5pt;color:#7A7A7A;font-family:monospace;margin-bottom:5px;">${fmt(n.date)}</div>`;
          sections+=`<div style="font-size:9.5pt;color:#3A3A3A;line-height:1.6;white-space:pre-wrap;font-family:'DM Sans',Arial,sans-serif;">${n.contenu}</div>`;
          sections+="</div>";
        });
      }

      // Logo SVG inline
      const logoSVG=`<svg width="100" height="37" viewBox="0 0 120 44" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M 2 2 Q 30 14 58 14 Q 86 14 106 2 Q 98 18 98 22 Q 98 26 106 42 Q 86 30 58 30 Q 30 30 2 42 Q 10 26 10 22 Q 10 18 2 2 Z" fill="#CC2222"/><text x="54" y="27" text-anchor="middle" fill="white" font-family="Arial,sans-serif" font-weight="700" font-size="16">High</text></svg><span style="font-family:'DM Sans',Arial,sans-serif;font-size:15pt;font-weight:400;color:#3A3A3A;margin-left:4px;vertical-align:middle;">Point</span><br><span style="font-family:'DM Sans',Arial,sans-serif;font-size:7pt;color:#7A7A7A;letter-spacing:0.04em;margin-left:108px;">Architectures Textiles</span>`;

      const html=`<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/><title>Fiche projet — ${p.name}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',Arial,sans-serif;color:#1C1C1C;background:#fff;font-size:10pt;line-height:1.6;}
  @page{margin:18mm 16mm 20mm 16mm;size:A4;}
  @media print{
    .no-print{display:none!important;}
    body{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  }
  .page-header{display:flex;justify-content:space-between;align-items:flex-start;padding-bottom:10px;border-bottom:1.5px solid #CC2222;margin-bottom:20px;}
  .header-right{text-align:right;font-size:8pt;color:#7A7A7A;line-height:1.8;}
  .project-title-block{margin-bottom:20px;}
  .project-ref{font-family:'DM Mono',monospace;color:#CC2222;font-size:9pt;margin-top:4px;}
  .meta-block{display:flex;gap:20px;flex-wrap:wrap;margin-top:8px;font-size:9pt;color:#7A7A7A;}
  .meta-item span{color:#1C1C1C;font-weight:600;}
  .footer{position:fixed;bottom:0;left:16mm;right:16mm;border-top:0.5px solid #DDDDDD;padding-top:5px;font-size:7.5pt;color:#7A7A7A;text-align:center;font-family:'DM Sans',Arial,sans-serif;}
  .print-btn{position:fixed;top:16px;right:16px;background:#CC2222;color:#fff;border:none;padding:8px 18px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'DM Sans',Arial,sans-serif;font-weight:600;z-index:100;}
</style></head><body>
<button class="print-btn no-print" onclick="window.print()">Imprimer / Enregistrer PDF</button>

<div class="page-header">
  <div>${logoSVG}</div>
  <div class="header-right">
    www.highpoint-structures.com<br>
    info@highpoint-structures.com<br>
    05 46 00 00 00
  </div>
</div>

<div class="project-title-block">
  <div style="font-size:18pt;font-weight:700;color:#1C1C1C;">${p.name}</div>
  <div class="project-ref">${ref}</div>
  <div class="meta-block">
    ${p.client?`<div class="meta-item">Client : <span>${p.client}</span></div>`:""}
    ${p.lieu?`<div class="meta-item">Lieu : <span>${p.lieu}</span></div>`:""}
    ${p.ingenieur?`<div class="meta-item">Ingénieur : <span>${p.ingenieur}</span></div>`:""}
    ${equipeVal?`<div class="meta-item">Équipe : <span>${equipeVal}</span></div>`:""}
    <div class="meta-item">Statut : <span>${p.statut}</span></div>
    <div class="meta-item">Avancement : <span>${p.avancement}%</span></div>
    <div class="meta-item">Date : <span>${dateAujourdhui}</span></div>
  </div>
  ${p.note?`<div style="margin-top:10px;padding:8px 12px;background:#F9F9F9;border-left:3px solid #DDDDDD;border-radius:4px;font-size:9pt;color:#3A3A3A;font-style:italic;">${p.note}</div>`:""}
</div>

${sections}

<div class="footer">
  HIGH POINT — 17 rue Robert Geffré — 17000 La Rochelle — FRANCE — SARL au capital de 32 000 € — SIRET : 53454409300030
</div>
</body></html>`;

      const win=window.open("","_blank");
      win.document.write(html);
      win.document.close();
    }

    return(
      <WithPanel panel={panel}>
        {/* En-tête */}
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap"}}>
          <button onClick={()=>setDetail(null)} style={{background:"none",border:"1px solid #DDDDDD",borderRadius:4,cursor:"pointer",fontSize:12,padding:"4px 10px",color:"#3A3A3A",fontFamily:"'DM Sans',sans-serif"}}>← Retour</button>
          <div style={{fontSize:16,fontWeight:700,color:"#1C1C1C",flex:1}}>{p.name}</div>
          {p.client&&<span style={{fontSize:13,color:"#7A7A7A"}}>{p.client}</span>}
          {p.lieu&&<span style={{fontSize:12,color:"#7A7A7A"}}>· {p.lieu}</span>}
          <Badge label={p.statut} bg={sc.bg} color={sc.tx}/>
          {(p.tags||"").split(",").filter(Boolean).map((tag,i)=>(
            <span key={i} style={{background:"#F2F0ED",color:"#3A3A3A",fontSize:11,fontWeight:500,padding:"2px 8px",borderRadius:10}}>{tag.trim()}</span>
          ))}
          <Btn onClick={()=>exportPDF()}>↓ PDF</Btn>
          <Btn onClick={e=>openEdit(p,e)}>Modifier</Btn>
          {p.statut!=="terminé"&&<Btn danger onClick={()=>finaliser(p)}>Finaliser</Btn>}
        </div>

        {/* KPIs */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
          {(()=>{
            const equipeAuto=calcEquipeAuto(p);
            return[
              {lbl:"Avancement",val:calcAvancement(p,atelierChantier).global+"%"},
              {lbl:"Chiffre d'affaires",val:caVal>0?caVal.toLocaleString("fr-FR")+" €":"—"},
              {lbl:"Dépenses engagées",val:dep.total>0?dep.total.toLocaleString("fr-FR")+" €":depSaisie>0?depSaisie.toLocaleString("fr-FR")+" €":"—",
               sub:dep.total>0?`cmd: ${dep.engagees.toLocaleString("fr-FR")} € · prest: ${dep.prest.toLocaleString("fr-FR")} €`:null},
              {lbl:"Équipe",val:equipeAuto.length>0?`${equipeAuto.length} pers.`:p.equipe?p.equipe+" pers.":"—",
               sub:equipeAuto.length>0?equipeAuto.slice(0,2).join(", ")+(equipeAuto.length>2?` +${equipeAuto.length-2}`:""):null},
            ].map((m,i)=>(
              <div key={i} style={{background:"#fff",border:"0.5px solid #DDDDDD",borderRadius:8,padding:"10px 14px"}}>
                <div style={{fontSize:11,color:"#7A7A7A",marginBottom:3}}>{m.lbl}</div>
                <div style={{fontSize:16,fontWeight:700,color:"#1C1C1C"}}>{m.val}</div>
                {m.sub&&<div style={{fontSize:10,color:"#7A7A7A",marginTop:3}}>{m.sub}</div>}
              </div>
            ));
          })()}
        </div>
        {/* Avancement composite */}
        {(()=>{
          const av2=calcAvancement(p,atelierChantier);
          const cols=["#1A5DAB","#CC8800","#2A7A2A"];
          return(
            <Bd style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <SecTitle>Avancement composite</SecTitle>
                <span style={{fontSize:18,fontWeight:700,color:"#1C1C1C"}}>{av2.global}%</span>
              </div>
              <div style={{height:6,borderRadius:3,background:"#EEEEEE",overflow:"hidden",marginBottom:10}}>
                <div style={{height:"100%",width:av2.global+"%",background:av2.global>=80?"#2A7A2A":av2.global>=40?"#1A5DAB":"#CC2222",borderRadius:3}}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
                {av2.facteurs.map((fac,i)=>(
                  <div key={i} style={{background:"#F9F9F9",borderRadius:6,padding:"8px 10px",border:"0.5px solid #EEEEEE"}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                      <span style={{fontSize:11,color:"#7A7A7A"}}>{fac.lbl}</span>
                      <span style={{fontSize:12,fontWeight:700,color:cols[i]}}>{fac.val}%</span>
                    </div>
                    {fac.lbl==="Études"
                      ? <SliderEtudes val={fac.val} onSave={async v=>{await sheet.update(p.id,{...p,avancement:v});}}/>
                      : <div style={{height:3,background:"#EEEEEE",borderRadius:2,overflow:"hidden"}}>
                          <div style={{height:"100%",width:fac.val+"%",background:cols[i],borderRadius:2}}/>
                        </div>
                    }
                    {fac.lbl==="Études"&&false&&<div/>}
                  </div>
                ))}
              </div>
            </Bd>
          );
        })()}
        {/* Tag ingénieur */}
        {p.ingenieur&&<div style={{marginBottom:10,display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:11,color:"#7A7A7A"}}>Ingénieur responsable :</span>
          <span style={{background:"#EBF3FF",color:"#1A5DAB",fontSize:12,fontWeight:600,padding:"3px 10px",borderRadius:4}}>{p.ingenieur}</span>
        </div>}

        {/* Barre CA */}
        {caVal>0&&<div style={{marginBottom:14}}>
          <div style={{fontSize:12,color:"#7A7A7A",marginBottom:4}}>Consommation CA : {pct}%{dep.total>0&&<span style={{marginLeft:8,fontSize:11}}> · {dep.recues.toLocaleString("fr-FR")} € reçus · {dep.engagees.toLocaleString("fr-FR")} € engagés</span>}</div>
          <div style={{height:5,borderRadius:3,background:"#EEEEEE",overflow:"hidden"}}>
            <div style={{height:"100%",width:Math.min(pct,100)+"%",background:pct>90?"#CC2222":pct>60?"#CC8800":"#2A7A2A",borderRadius:3}}/>
          </div>
        </div>}

        {p.note&&<div style={{fontSize:12,color:"#7A7A7A",fontStyle:"italic",marginBottom:14,padding:"8px 12px",background:"#F9F9F9",borderRadius:6,borderLeft:"3px solid #DDDDDD"}}>{p.note}</div>}

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>

          {/* Tâches */}
          <Bd>
            <SecTitle>Tâches ({projTasks.length})</SecTitle>
            {!projTasks.length&&<div style={{fontSize:13,color:"#7A7A7A"}}>Aucune tâche liée.</div>}
            {projTasks.map(t=>{
              const urg=autoUrgence(t.due,t.done);const u=UC[isBool(t.done)?"done":urg]||UC.med;const done=isBool(t.done);
              return(
                <div key={t.id} style={{display:"flex",gap:8,padding:"7px 0",borderBottom:"0.5px solid #EEEEEE",alignItems:"center"}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:done?"#2A7A2A":u.tx,flexShrink:0}}/>
                  <div style={{flex:1,fontSize:12,color:done?"#7A7A7A":"#1C1C1C",textDecoration:done?"line-through":"none"}}>{t.text}</div>
                  {t.due&&<span style={{fontSize:11,color:"#7A7A7A"}}>{fmt(t.due)}</span>}
                  <Badge label={u.lbl} bg={u.bg} color={u.tx}/>
                </div>
              );
            })}
          </Bd>

          {/* Calendrier */}
          <Bd>
            <SecTitle>Calendrier ({projEvents.length})</SecTitle>
            {!projEvents.length&&<div style={{fontSize:13,color:"#7A7A7A"}}>Aucun événement lié.</div>}
            {projEvents.map(ev=>(
              <div key={ev.id} style={{display:"flex",gap:8,padding:"7px 0",borderBottom:"0.5px solid #EEEEEE",alignItems:"center"}}>
                <div style={{width:3,background:EV_COLORS[ev.type]||"#7A7A7A",borderRadius:2,alignSelf:"stretch",flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,fontWeight:500,color:"#1C1C1C"}}>{ev.title}</div>
                  <div style={{fontSize:11,color:"#7A7A7A"}}>{fmt(ev.date)}{ev.heure&&` · ${ev.heure}`}</div>
                </div>
                <Badge label={EV_LABELS[ev.type]||ev.type} bg="#F2F0ED" color="#3A3A3A"/>
              </div>
            ))}
          </Bd>

          {/* Commandes */}
          <Bd>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <SecTitle>Commandes ({projOrders.length})</SecTitle>
              {projOrders.filter(o=>isBool(o.recue)).length>0&&
                <span style={{fontSize:12,color:"#2A7A2A",fontWeight:600}}>
                  {projOrders.filter(o=>isBool(o.recue)).reduce((s,o)=>s+(+o.prix||0)*(+o.qty||0),0).toLocaleString("fr-FR")} € reçues
                </span>}
            </div>
            {!projOrders.length&&<div style={{fontSize:13,color:"#7A7A7A"}}>Aucune commande liée.</div>}
            {projOrders.map(o=>{
              if(editingOrder===o.id)return(
                <div key={o.id} style={{padding:"8px 10px",background:"#F2F0ED",borderRadius:6,marginBottom:6}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:6}}>
                    <FG label="Article"><Inp value={orderForm.article||""} onChange={e=>setOrderForm(x=>({...x,article:e.target.value}))}/></FG>
                    <FG label="Fournisseur"><Inp value={orderForm.fourn||""} onChange={e=>setOrderForm(x=>({...x,fourn:e.target.value}))}/></FG>
                    <FG label="Qté"><Inp type="number" value={orderForm.qty||""} onChange={e=>setOrderForm(x=>({...x,qty:e.target.value}))}/></FG>
                    <FG label="Prix unit. €"><Inp type="number" value={orderForm.prix||""} onChange={e=>setOrderForm(x=>({...x,prix:e.target.value}))}/></FG>
                  </div>
                  <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
                    <Btn small onClick={()=>setEditingOrder(null)}>Annuler</Btn>
                    <Btn small primary onClick={saveOrder}>✓ Sauvegarder</Btn>
                  </div>
                </div>
              );
              return(
                <div key={o.id} style={{display:"flex",gap:8,padding:"7px 0",borderBottom:"0.5px solid #EEEEEE",alignItems:"center"}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:500,color:"#1C1C1C"}}>{o.article}</div>
                    <div style={{fontSize:11,color:"#7A7A7A"}}>{o.fourn} · {o.qty} {o.unit}{o.prix>0&&` · ${(+o.prix*(+o.qty||1)).toLocaleString("fr-FR")} €`}</div>
                  </div>
                  <Badge label={isBool(o.recue)?"Reçue":"En cours"} bg={isBool(o.recue)?"#F0FFF0":"#F2F0ED"} color={isBool(o.recue)?"#2A7A2A":"#3A3A3A"}/>
                  <button onClick={()=>{setEditingOrder(o.id);setOrderForm({...o});}} style={{background:"none",border:"1px solid #DDDDDD",borderRadius:4,cursor:"pointer",fontSize:11,padding:"2px 6px",color:"#3A3A3A",fontFamily:"'DM Sans',sans-serif"}}>Mod.</button>
                </div>
              );
            })}
          </Bd>

          {/* Prestations */}
          <Bd>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <SecTitle>Prestations ({projPrest.length})</SecTitle>
              {projPrest.filter(m=>m.statut==="terminé").length>0&&
                <span style={{fontSize:12,color:"#2A7A2A",fontWeight:600}}>
                  {projPrest.filter(m=>m.statut==="terminé").reduce((s,m)=>s+Number(m.prix||0),0).toLocaleString("fr-FR")} € terminées
                </span>}
            </div>
            {!projPrest.length&&<div style={{fontSize:13,color:"#7A7A7A"}}>Aucune prestation.</div>}
            {projPrest.map(m=>{
              const sb=sbMission(m.statut);
              return(
                <div key={m.id} style={{display:"flex",gap:8,padding:"7px 0",borderBottom:"0.5px solid #EEEEEE",alignItems:"center"}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:500,color:"#1C1C1C"}}>{m.description}</div>
                    <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:2}}>
                      {m.prestataire&&<span style={{background:"#F2F0ED",color:"#3A3A3A",fontSize:10,fontWeight:600,padding:"1px 6px",borderRadius:3}}>{m.prestataire}</span>}
                      {m.prix>0&&<span style={{fontSize:11,color:"#7A7A7A"}}>{Number(m.prix).toLocaleString("fr-FR")} €</span>}
                    </div>
                  </div>
                  <Badge label={m.statut} bg={sb.bg} color={sb.tx}/>
                </div>
              );
            })}
          </Bd>

          {/* Atelier */}
          {projAtelier.length>0&&<Bd>
            <SecTitle>Atelier ({projAtelier.length})</SecTitle>
            {projAtelier.map(m=>{
              const sb=sbMission(m.statut);
              return(
                <div key={m.id} style={{display:"flex",gap:8,padding:"7px 0",borderBottom:"0.5px solid #EEEEEE",alignItems:"center"}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:500,color:"#1C1C1C"}}>{m.description}</div>
                    {m.dateDebut&&<div style={{fontSize:11,color:"#7A7A7A"}}>{fmt(m.dateDebut)}{m.dateFin&&` → ${fmt(m.dateFin)}`}</div>}
                  </div>
                  <Badge label={m.statut} bg={sb.bg} color={sb.tx}/>
                </div>
              );
            })}
          </Bd>}

          {/* Chantier */}
          {projChantier.length>0&&<Bd>
            <SecTitle>Chantier ({projChantier.length})</SecTitle>
            {projChantier.map(m=>{
              const sb=sbMission(m.statut);
              return(
                <div key={m.id} style={{display:"flex",gap:8,padding:"7px 0",borderBottom:"0.5px solid #EEEEEE",alignItems:"center"}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:500,color:"#1C1C1C"}}>{m.description}</div>
                    {m.dateDebut&&<div style={{fontSize:11,color:"#7A7A7A"}}>{fmt(m.dateDebut)}{m.dateFin&&` → ${fmt(m.dateFin)}`}</div>}
                  </div>
                  <Badge label={m.statut} bg={sb.bg} color={sb.tx}/>
                </div>
              );
            })}
          </Bd>}

          {/* Stocks liés */}
          {projStocks.length>0&&<Bd>
            <SecTitle>Stocks liés ({projStocks.length})</SecTitle>
            {projStocks.map(s=>{
              const r=Number(s.qty)/Math.max(Number(s.min),0.001);
              const sb=r<0.7?{bg:"#FFF0F0",tx:"#CC2222",lbl:"Critique"}:r<1?{bg:"#FFF8EC",tx:"#CC8800",lbl:"Bas"}:{bg:"#F0FFF0",tx:"#2A7A2A",lbl:"OK"};
              return(
                <div key={s.id} style={{display:"flex",gap:8,padding:"7px 0",borderBottom:"0.5px solid #EEEEEE",alignItems:"center"}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:500,color:"#1C1C1C"}}>{s.ref}</div>
                    <div style={{fontSize:11,color:"#7A7A7A"}}>{s.qty}/{s.min} {s.unit}</div>
                  </div>
                  <Badge label={sb.lbl} bg={sb.bg} color={sb.tx}/>
                </div>
              );
            })}
          </Bd>}

          {/* Notes — pleine largeur */}
          <Bd style={{gridColumn:"1/-1"}}>
            <SecTitle>Notes ({projNotes.length})</SecTitle>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:10}}>
              <FG label="Titre (optionnel)"><Inp value={noteForm.titre} onChange={e=>setNoteForm(x=>({...x,titre:e.target.value}))} placeholder="Ex: Point chantier"/></FG>
              <FG label="Contenu *"><Inp value={noteForm.contenu} onChange={e=>setNoteForm(x=>({...x,contenu:e.target.value}))} placeholder="Saisir une note..."/></FG>
            </div>
            <div style={{display:"flex",justifyContent:"flex-end",marginBottom:12}}>
              <Btn primary onClick={()=>saveNote(p.id)}><span className={savingNote?"spin":""}>{savingNote?"⟳":"+"}</span> Ajouter une note</Btn>
            </div>
            {!projNotes.length&&<div style={{fontSize:13,color:"#7A7A7A"}}>Aucune note.</div>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {projNotes.map(n=>(
                <div key={n.id} style={{padding:"10px 12px",borderRadius:6,background:"#F9F9F9",border:"0.5px solid #EEEEEE",position:"relative"}}>
                  <button onClick={()=>notes.remove(n.id)} style={{position:"absolute",top:8,right:8,background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#7A7A7A"}}>✕</button>
                  {n.titre&&<div style={{fontSize:12,fontWeight:700,color:"#1C1C1C",marginBottom:2,paddingRight:20}}>{n.titre}</div>}
                  <div style={{fontSize:11,color:"#7A7A7A",fontFamily:"'DM Mono',monospace",marginBottom:4}}>{fmt(n.date)}</div>
                  <div style={{fontSize:12,color:"#3A3A3A",whiteSpace:"pre-wrap",lineHeight:1.5}}>{n.contenu}</div>
                </div>
              ))}
            </div>
          </Bd>

        </div>
      </WithPanel>
    );
  }

  // ══ VUE LISTE ══
  return <WithPanel panel={panel}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <div style={{fontSize:15,fontWeight:700,color:"#1C1C1C",borderLeft:"3px solid #CC2222",paddingLeft:8}}>Projets actifs ({actifs.length})</div>
        {historique.length>0&&<button onClick={()=>setShowHistorique(h=>!h)} style={{fontSize:12,color:"#7A7A7A",background:"none",border:"1px solid #DDDDDD",borderRadius:4,padding:"3px 8px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>{showHistorique?"Masquer":"Voir"} historique ({historique.length})</button>}
      </div>
      <Btn primary onClick={openNew}>+ Nouveau projet</Btn>
    </div>

    {sheet.loading&&<div style={{fontSize:13,color:"#7A7A7A",padding:12}}>Chargement...</div>}
    {!actifs.length&&!sheet.loading&&<Bd style={{textAlign:"center",padding:24,color:"#7A7A7A",fontSize:13,marginBottom:10}}>Aucun projet actif.</Bd>}

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      {actifs.map(p=>{
        const c=statutColor(p.statut);
        const dep=calcDepensesReelles(p);
        const caVal=Number(p.budget)||0;
        const depAff=dep.total>0?dep.total:Number(p.depense)||0;
        const bp=caVal>0?Math.round(depAff/caVal*100):0;
        return(
          <div key={p.id} onClick={()=>openDetail(p.id)}
            style={{background:"#fff",border:"0.5px solid #DDDDDD",borderRadius:10,padding:14,cursor:"pointer",position:"relative",transition:"box-shadow .15s"}}
            onMouseEnter={e=>e.currentTarget.style.boxShadow="0 2px 8px rgba(0,0,0,0.08)"}
            onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:700,color:"#1C1C1C"}}>{p.name}</div>
                {p.client&&<div style={{fontSize:12,color:"#7A7A7A"}}>{p.client}</div>}
                {p.lieu&&<div style={{fontSize:12,color:"#7A7A7A"}}>{p.lieu}</div>}
                {p.ingenieur&&<span style={{background:"#EBF3FF",color:"#1A5DAB",fontSize:10,fontWeight:600,padding:"1px 6px",borderRadius:3,display:"inline-block",marginTop:3}}>{p.ingenieur}</span>}
                {(p.tags||"").split(",").filter(Boolean).map((tag,i)=>(
                  <span key={i} style={{display:"inline-block",background:"#F2F0ED",color:"#3A3A3A",fontSize:10,fontWeight:500,padding:"1px 6px",borderRadius:10,marginRight:3,marginTop:3}}>{tag.trim()}</span>
                ))}
              </div>
              <div style={{display:"flex",gap:4,alignItems:"flex-start",flexShrink:0}} onClick={e=>e.stopPropagation()}>
                <button onClick={e=>openEdit(p,e)} style={{background:"none",border:"1px solid #DDDDDD",borderRadius:4,cursor:"pointer",fontSize:11,padding:"2px 8px",color:"#3A3A3A",fontFamily:"'DM Sans',sans-serif"}}>Modifier</button>
                <button onClick={e=>{e.stopPropagation();if(confirm("Supprimer ce projet ?"))sheet.remove(p.id);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#CC2222"}}>✕</button>
              </div>
            </div>
            <Badge label={p.statut} bg={c.bg} color={c.tx}/>
            {(()=>{const av=calcAvancement(p,atelierChantier);return(<><div style={{fontSize:12,color:"#7A7A7A",marginTop:8}}>Avancement : {av.global}%</div><PBar val={av.global}/></>);})()}
            {caVal>0&&<>
              <div style={{fontSize:12,color:"#7A7A7A",marginTop:6}}>{depAff.toLocaleString("fr-FR")} € / {caVal.toLocaleString("fr-FR")} € CA{dep.total>0&&<span style={{fontSize:10,color:"#7A7A7A",marginLeft:4}}>(engagé)</span>}</div>
              <PBar val={bp}/>
            </>}
            <div style={{fontSize:11,color:"#CC2222",marginTop:8,fontWeight:500}}>→ Voir le détail complet</div>
          </div>
        );
      })}
    </div>

    {showHistorique&&historique.length>0&&(
      <div style={{marginTop:16}}>
        <div style={{fontSize:13,fontWeight:700,color:"#7A7A7A",borderLeft:"3px solid #DDDDDD",paddingLeft:8,marginBottom:10}}>Projets terminés ({historique.length})</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {historique.map(p=>(
            <div key={p.id} onClick={()=>openDetail(p.id)}
              style={{background:"#fff",border:"0.5px solid #DDDDDD",borderRadius:10,padding:14,opacity:.7,cursor:"pointer"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <div><div style={{fontSize:13,fontWeight:700,color:"#3A3A3A",textDecoration:"line-through"}}>{p.name}</div>{p.client&&<div style={{fontSize:12,color:"#7A7A7A"}}>{p.client}</div>}</div>
                <Badge label="Terminé" bg="#F0FFF0" color="#2A7A2A"/>
              </div>
              {p.budget>0&&<div style={{fontSize:12,color:"#7A7A7A"}}>{Number(p.depense).toLocaleString("fr-FR")} € / {Number(p.budget).toLocaleString("fr-FR")} € CA</div>}
            </div>
          ))}
        </div>
      </div>
    )}
  </WithPanel>;
}

// ══ PRESTATAIRES ══
const EPREST={nom:"",specialite:"",contact:"",tel:"",note:""};
const EPREST_MISSION={prestataire:"",projet:"",description:"",dateDebut:"",dateFin:"",prix:"",statut:"planifié",stockRef:"",stockQty:"",tags:"",stockItems:""};

function Prestataires({sheet,missions,projects,stocks,events,fournisseurs}){
  const [filterProjet,setFilterProjet]=useState("");
  const [filterTag,setFilterTag]=useState("");
  const [open,setOpen]=useState(false);
  const [form,setForm]=useState(EPREST);
  const [editing,setEditing]=useState(null);
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");
  const [missionOpen,setMissionOpen]=useState(false);
  const [stockModalPrest,setStockModalPrest]=useState(null);
  const [savingStockPrest,setSavingStockPrest]=useState(false);
  const [missionForm,setMissionForm]=useState(EPREST_MISSION);
  const [missionEditing,setMissionEditing]=useState(null);
  const [savingM,setSavingM]=useState(false);
  const [errM,setErrM]=useState("");
  const [detail,setDetail]=useState(null);
  const [partageId,setPartageId]=useState(null);
  const [copied,setCopied]=useState(false);
  const [showAllTerminees,setShowAllTerminees]=useState(false);
  const [showAllMTerminees,setShowAllMTerminees]=useState(false);

  function textPartagePrest(x){
    const lines=[
      `🔧 ${x.nom}`,
      x.specialite&&`Spécialité : ${x.specialite}`,
      x.contact&&`Contact : ${x.contact}`,
      x.tel&&`Tél : ${x.tel}`,
      x.note&&`Note : ${x.note}`,
    ].filter(Boolean);
    return lines.join("\n");
  }
  const f=(k,v)=>setForm(x=>({...x,[k]:v}));
  const fm=(k,v)=>setMissionForm(x=>({...x,[k]:v}));

  async function save(){
