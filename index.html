const GAS_URL = "https://script.google.com/macros/s/AKfycbwb3hMTcB1HYK_blQwojA52MQ145Eew8U2XgjxCcvkRicROHOsJHUvrH5lZZIBpZYCs/exec";
const VERSION = "v2.10";

// ── API via JSONP ──
function jsonp(params) {
  return new Promise((resolve, reject) => {
    const cb = "cb_" + Math.random().toString(36).slice(2);
    const script = document.createElement("script");
    script.async = true;
    const url = GAS_URL + "?" + new URLSearchParams({...params, callback: cb}).toString();
    const cleanup = () => { if(window[cb])delete window[cb]; if(script.parentNode)script.parentNode.removeChild(script); };
    const timer = window.setTimeout(() => { cleanup(); reject(new Error("Délai d'attente dépassé")); }, 20000);
    window[cb] = (data) => { window.clearTimeout(timer); cleanup(); resolve(data); };
    script.onerror = () => { window.clearTimeout(timer); cleanup(); reject(new Error("Erreur réseau")); };
    script.src = url;
    document.head.appendChild(script);
  });
}
async function gasGet(key){const r=await jsonp({action:"get",key});if(!r.ok)throw new Error(r.msg);return r.data;}
async function gasAction(action,key,data,id){const p={action,key};if(data!==undefined&&data!==null)p.data=JSON.stringify(data);if(id!==undefined)p.id=id;const r=await jsonp(p);if(!r.ok)throw new Error(r.msg);return r.data??r;}
const gasAdd=(key,data)=>gasAction("add",key,data);
const gasUpdate=(key,id,data)=>gasAction("update",key,data,id);
const gasDelete=(key,id)=>gasAction("delete",key,null,id);
const gasInit=()=>jsonp({action:"init"});

const TODAY=new Date().toISOString().split("T")[0];
const todayDate=new Date(TODAY+"T00:00:00");
const MONTHS=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
// Formate une date quelle que soit sa forme (ISO, DD/MM/YYYY, timestamp Google Sheets)
function fmt(d){
  if(!d||d==="—")return"—";
  // Déjà au format JJ/MM/AAAA
  if(typeof d==="string"&&/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(d))return d;
  // Format ISO YYYY-MM-DD
  if(typeof d==="string"&&/^\d{4}-\d{2}-\d{2}/.test(d)){
    const[y,m,day]=d.split("T")[0].split("-");
    return`${parseInt(day)}/${parseInt(m)}/${y}`;
  }
  // Timestamp numérique (Google Sheets serial date)
  if(!isNaN(d)){
    const x=new Date(Math.round((Number(d)-25569)*86400000));
    return`${x.getUTCDate()}/${x.getUTCMonth()+1}/${x.getUTCFullYear()}`;
  }
  return"—";
}
// Normalise une date en YYYY-MM-DD pour les comparaisons
function toISO(d){
  if(!d)return"";
  if(typeof d==="string"&&/^\d{4}-\d{2}-\d{2}/.test(d))return d.split("T")[0];
  if(typeof d==="string"&&/^\d{1,2}\/\d{1,2}\/\d{4}$/.test(d)){
    const[day,m,y]=d.split("/");
    return`${y}-${m.padStart(2,"0")}-${day.padStart(2,"0")}`;
  }
  if(!isNaN(d)){
    const x=new Date(Math.round((Number(d)-25569)*86400000));
    return x.toISOString().split("T")[0];
  }
  return"";
}
function diffDays(d){
  const iso=toISO(d);
  if(!iso)return 999;
  return Math.ceil((new Date(iso+"T00:00:00")-todayDate)/86400000);
}
// Urgence automatique selon échéance
function autoUrgence(due, done){
  if(done===true||done==="TRUE")return"low";
  const d=diffDays(due);
  if(isNaN(d)||d===999)return"med";
  if(d<0)return"critique";
  if(d<=2)return"high";
  if(d<=7)return"med";
  return"low";
}
const UC={

class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={error:null};}
  static getDerivedStateFromError(error){return{error};}
  componentDidCatch(error,info){console.error("UI error",error,info);}
  render(){
    if(this.state.error)return(
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
        <div style={{maxWidth:480,background:"#fff",border:"0.5px solid #DDDDDD",borderRadius:10,padding:20}}>

          <div style={{fontSize:13,color:"#3A3A3A",marginBottom:12}}>Rechargez la page pour reprendre.</div>
          <Btn primary onClick={()=>window.location.reload()}>Recharger</Btn>
        </div>
      </div>
    );
    return this.props.children;
  }
}

function WithPanel({panel,children}){

}

// ── Hook générique ──
function useSheet(key){
  const [rows,setRows]=useState([]);
  const [loading,setLoading]=useState(true);
  const [error,setError]=useState(null);
  const load=useCallback(async()=>{
    setLoading(true);
    try{setRows(await gasGet(key));setError(null);}
    catch(e){setError(e.message||"Erreur de chargement");}
    finally{setLoading(false);}
  },[key]);
  useEffect(()=>{load();},[load]);
  const add=async(data)=>{try{const c=await gasAdd(key,data);setRows(r=>[...r,c]);setError(null);return c;}catch(e){setError(e.message||"Erreur d'ajout");throw e;}};
  const update=async(id,data)=>{try{await gasUpdate(key,id,data);setRows(r=>r.map(x=>Number(x.id)===Number(id)?{...x,...data}:x));setError(null);}catch(e){setError(e.message||"Erreur de mise à jour");throw e;}};
  const remove=async(id)=>{try{await gasDelete(key,id);setRows(r=>r.filter(x=>Number(x.id)!==Number(id)));setError(null);}catch(e){setError(e.message||"Erreur de suppression");throw e;}};
  return{rows,setRows,loading,error,reload:load,add,update,remove};
}

// ── Calcul dépenses projet — fonction globale (utilisée par Dashboard ET Projets) ──
// Compte TOUTES les commandes et prestations assignées au projet, quel que soit leur statut
function calcDepensesProjet(p, orders, prestMissions){
  const isBool=v=>v===true||v==="TRUE";
  const projCmd=(orders?.rows||[]).filter(o=>o.projet===p.name||o.projet===String(p.id));
  const cmdEngagees=projCmd.reduce((s,o)=>s+(+o.prix||0)*(+o.qty||0),0);
  const cmdRecues=projCmd.filter(o=>isBool(o.recue)).reduce((s,o)=>s+(+o.prix||0)*(+o.qty||0),0);
  const projPrest=(prestMissions?.rows||[]).filter(m=>m.projet===p.name||m.projet===String(p.id));
  const prestTotal=projPrest.reduce((s,m)=>s+Number(m.prix||0),0);
  const prestTerminees=projPrest.filter(m=>m.statut==="terminé").reduce((s,m)=>s+Number(m.prix||0),0);
  return {
    engagees: cmdEngagees,
    recues: cmdRecues,
    prest: prestTotal,
    prestTerminees,
    total: cmdEngagees + prestTotal,
  };
}

// ══ DASHBOARD ══
function Dashboard({sheets}){
  const {projects,tasks,stocks,orders,events,prestMissions}=sheets;
  const pending=tasks.rows.filter(t=>!t.done&&t.done!=="TRUE");
  const isDone=t=>t.done===true||t.done==="TRUE";
  const isBool=v=>v===true||v==="TRUE";
  async function toggleTask(t){await tasks.update(t.id,{...t,done:!isDone(t)});}

  // Séparation claire retard / urgent
  const tachesRetard=[...pending].filter(t=>autoUrgence(t.due,t.done)==="critique")
    .sort((a,b)=>toISO(a.due).localeCompare(toISO(b.due)));
  const tachesUrgent=[...pending].filter(t=>autoUrgence(t.due,t.done)==="high")
    .sort((a,b)=>toISO(a.due).localeCompare(toISO(b.due)));

  const stockAlerts=stocks.rows.filter(s=>Number(s.qty)<Number(s.min));
  const retardsProjets=projects.rows.filter(p=>p.statut==="retard");
  const upcoming=[...events.rows].sort((a,b)=>toISO(a.date).localeCompare(toISO(b.date))).filter(e=>toISO(e.date)>=TODAY).slice(0,5);
  const loading=Object.values(sheets).some(s=>s.loading);

  // ── Finances globales ──
  const totalCA=projects.rows.reduce((s,p)=>s+Number(p.budget||0),0);
  const allDep=projects.rows.map(p=>calcDepensesProjet(p,orders,prestMissions));
  const totalEngagees=allDep.reduce((s,d)=>s+d.engagees,0);
  const totalRecues=allDep.reduce((s,d)=>s+d.recues,0);
  const totalPrest=allDep.reduce((s,d)=>s+d.prest,0);

  if(loading)return <Bd style={{textAlign:"center",padding:48}}><div style={{fontSize:22,marginBottom:8}} className="spin">⟳</div><div style={{fontSize:13,color:"#7A7A7A"}}>Chargement depuis Google Sheets...</div></Bd>;
  const empty=!projects.rows.length&&!tasks.rows.length&&!events.rows.length;
  if(empty)return(
    <Bd style={{textAlign:"center",padding:48}}>
      <HPLogo/>
      <div style={{fontSize:16,fontWeight:700,marginTop:16,marginBottom:6,color:"#1C1C1C"}}>BTP Manager — High Point Structures</div>
      <div style={{fontSize:13,color:"#7A7A7A"}}>Connecté à Google Sheets. Commence par ajouter tes projets.</div>
    </Bd>
  );
  return(
    <div>
      {/* Bandeau alertes — tâches en retard */}
      {(tachesRetard.length>0||retardsProjets.length>0)&&(
        <div style={{background:"#FFF0F0",border:"1px solid #FFCCCC",borderLeft:"4px solid #CC2222",borderRadius:8,padding:"12px 16px",marginBottom:14}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:tachesRetard.length>0?10:0}}>
            <span style={{fontSize:13,fontWeight:700,color:"#CC2222"}}>
              {tachesRetard.length>0&&`${tachesRetard.length} tâche${tachesRetard.length>1?"s":""} en retard`}
              {tachesRetard.length>0&&retardsProjets.length>0&&" · "}
              {retardsProjets.length>0&&`${retardsProjets.length} projet${retardsProjets.length>1?"s":""} en retard`}
            </span>
          </div>
          {tachesRetard.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {tachesRetard.slice(0,4).map(t=>(
              <span key={t.id} style={{background:"#fff",border:"1px solid #FFAAAA",color:"#CC2222",fontSize:11,padding:"3px 10px",borderRadius:20,fontWeight:600,display:"flex",alignItems:"center",gap:5}}>
                <span style={{width:6,height:6,borderRadius:"50%",background:"#CC2222",display:"inline-block",flexShrink:0}}/>
                {t.text}{t.due&&<span style={{color:"#AA0000",fontWeight:700}}> · {Math.abs(diffDays(t.due))}j</span>}
              </span>
            ))}
          </div>}
        </div>
      )}

      {/* KPIs activité */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
        {[
          {val:projects.rows.filter(p=>p.statut!=="terminé").length,lbl:"Projets actifs"},
          {val:pending.length,lbl:"Tâches en attente"},
          {val:tachesRetard.length,lbl:"Tâches en retard",alert:tachesRetard.length>0},
          {val:orders.rows.filter(o=>!isBool(o.recue)).length,lbl:"Commandes en cours"},
        ].map((m,i)=>(
          <div key={i} style={{
            background:"#fff",
            border:m.alert?"1px solid #FFCCCC":"0.5px solid #DDDDDD",
            borderTop:m.alert?"3px solid #CC2222":"3px solid #F2F0ED",
            borderRadius:8,padding:"12px 14px"
          }}>
            <div style={{fontSize:22,fontWeight:700,color:m.alert?"#CC2222":"#1C1C1C"}}>{m.val}</div>
            <div style={{fontSize:12,color:"#7A7A7A",marginTop:2}}>{m.lbl}</div>
          </div>
        ))}
      </div>

      {/* Zone finances globale */}
      <Bd style={{marginBottom:14}}>
        <SecTitle>Finances globales</SecTitle>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
          {[
            {lbl:"Chiffre d'affaires",val:totalCA>0?totalCA.toLocaleString("fr-FR")+" €":"—",color:"#1C1C1C",bold:true},
            {lbl:"Commandes engagées",val:totalEngagees>0?totalEngagees.toLocaleString("fr-FR")+" €":"—",color:"#3A3A3A"},
            {lbl:"Commandes reçues",val:totalRecues>0?totalRecues.toLocaleString("fr-FR")+" €":"—",color:"#3A3A3A"},
            {lbl:"Prestations",val:totalPrest>0?totalPrest.toLocaleString("fr-FR")+" €":"—",color:"#3A3A3A"},
          ].map((m,i)=>(
            <div key={i} style={{background:"#F9F9F9",borderRadius:6,padding:"10px 12px",border:"0.5px solid #EEEEEE"}}>
              <div style={{fontSize:11,color:"#7A7A7A",marginBottom:4}}>{m.lbl}</div>
              <div style={{fontSize:16,fontWeight:m.bold?700:600,color:m.color}}>{m.val}</div>
            </div>
          ))}
        </div>
      </Bd>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>

        {/* Tâches en retard + urgentes */}
        <Bd style={{
          background:tachesRetard.length>0?"#FFF0F0":"#fff",
          border:tachesRetard.length>0?"1px solid #FFCCCC":"0.5px solid #DDDDDD"
        }}>
          <div style={{borderLeft:"3px solid #CC2222",paddingLeft:8,marginBottom:12}}>
            <span style={{fontSize:13,fontWeight:700,color:"#CC2222"}}>
              Tâches en retard ({tachesRetard.length})
            </span>
          </div>
          {!tachesRetard.length&&<div style={{fontSize:13,color:"#2A7A2A",fontWeight:500}}>✓ Aucune tâche en retard.</div>}
          {tachesRetard.map(t=>{
            const jours=Math.abs(diffDays(t.due));
            return(
              <div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 0",borderBottom:"0.5px solid #FFCCCC"}}>
                <Check checked={false} onChange={()=>toggleTask(t)} color="#CC2222"/>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,color:"#1C1C1C",fontWeight:600}}>{t.text}</div>
                  <div style={{fontSize:11,color:"#7A7A7A",marginTop:2}}>{t.projet}</div>
                </div>
                <span style={{background:"#CC2222",color:"#fff",fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:4,whiteSpace:"nowrap"}}>
                  {jours}j de retard
                </span>
              </div>
            );
          })}
          {tachesUrgent.length>0&&<>
            <div style={{fontSize:11,fontWeight:700,color:"#7A7A7A",letterSpacing:"0.05em",marginTop:12,marginBottom:6}}>
              URGENT — dans les 48h
            </div>
            {tachesUrgent.slice(0,3).map(t=>(
              <div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:"0.5px solid #EEEEEE"}}>
                <Check checked={false} onChange={()=>toggleTask(t)} color="#CC2222"/>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,color:"#1C1C1C",fontWeight:500}}>{t.text}</div>
                  <div style={{fontSize:11,color:"#7A7A7A"}}>{t.projet}</div>
                </div>
                <Badge label={`J-${diffDays(t.due)}`} bg="#FFF0F0" color="#CC2222"/>
              </div>
            ))}
          </>}
        </Bd>

        <Bd>
          <SecTitle>Prochains événements</SecTitle>
          {!upcoming.length&&<div style={{fontSize:13,color:"#7A7A7A"}}>Aucun événement.</div>}
          {upcoming.map(ev=>{const d=diffDays(ev.date);return(
            <div key={ev.id} style={{display:"flex",gap:8,padding:"8px 10px",borderRadius:6,background:"#F9F9F9",marginBottom:5,border:"0.5px solid #EEEEEE"}}>
              <div style={{width:3,background:EV_COLORS[ev.type]||"#7A7A7A",borderRadius:2,flexShrink:0}}/>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500,color:"#1C1C1C"}}>{ev.title}</div><div style={{fontSize:11,color:"#7A7A7A"}}>{ev.projet}</div></div>
              <span style={{fontSize:11,color:"#7A7A7A",whiteSpace:"nowrap"}}>{d===0?"Aujourd'hui":d===1?"Demain":`J+${d}`}</span>
            </div>
          );})}
        </Bd>

        <Bd>
          <SecTitle>Projets actifs</SecTitle>
          {!projects.rows.filter(p=>p.statut!=="terminé").length&&<div style={{fontSize:13,color:"#7A7A7A"}}>Aucun projet.</div>}
          {projects.rows.filter(p=>p.statut!=="terminé").map(p=>{
            const sc=statutColor(p.statut);
            return(
              <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"0.5px solid #EEEEEE"}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:sc.dot,flexShrink:0}}/>
                <div style={{flex:1}}><div style={{fontSize:13,fontWeight:500,color:"#1C1C1C"}}>{p.name}</div><PBar val={p.avancement}/><div style={{fontSize:11,color:"#7A7A7A",marginTop:2}}>{p.avancement}%</div></div>
                <Badge label={p.statut} bg={sc.bg} color={sc.tx}/>
              </div>
            );
          })}
        </Bd>

        <Bd>
          <SecTitle>Prochaines commandes</SecTitle>
          {!orders.rows.filter(o=>!isBool(o.recue)).length&&<div style={{fontSize:13,color:"#7A7A7A"}}>Aucune commande en cours.</div>}
          {orders.rows.filter(o=>!isBool(o.recue)).slice(0,5).map(o=>(
            <div key={o.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:"0.5px solid #EEEEEE"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:500,color:"#1C1C1C"}}>{o.article}</div>
                <div style={{fontSize:11,color:"#7A7A7A"}}>{o.fourn}{o.projet&&` · ${o.projet}`}</div>
              </div>
              {o.prix>0&&<span style={{fontSize:12,color:"#3A3A3A",fontWeight:500,whiteSpace:"nowrap"}}>{(+o.prix*(+o.qty||1)).toLocaleString("fr-FR")} €</span>}
            </div>
          ))}
        </Bd>

      </div>
    </div>
  );
}

// ══ PROJETS ══
const EP={name:"",statut:"en cours",avancement:0,equipe:0,budget:"",depense:"",client:"",lieu:"",note:""};
function Projets({sheet,notes,tasks,orders,stocks,events,prestMissions,atelierChantier}){
  const [open,setOpen]=useState(false);
  const [form,setForm]=useState(EP);
  const [editing,setEditing]=useState(null);
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");
  const [detail,setDetail]=useState(null);
  const [noteForm,setNoteForm]=useState({titre:"",contenu:""});
  const [savingNote,setSavingNote]=useState(false);
  const [showHistorique,setShowHistorique]=useState(false);
  const [editingOrder,setEditingOrder]=useState(null);
  const [orderForm,setOrderForm]=useState({});
  const f=(k,v)=>setForm(x=>({...x,[k]:v}));
  const isBool=v=>v===true||v==="TRUE";

  function openDetail(id){
    setOpen(false);
    setEditing(null);
    setEditingOrder(null);
    setDetail(id);
  }

  function openEdit(p,e){
    if(e)e.stopPropagation();
    setDetail(null);
    setEditing(p.id);
    setForm({...p,budget:p.budget??"",depense:p.depense??""});
    setErr("");
    setOpen(true);
  }

  function openNew(){
    setDetail(null);
    setEditing(null);
    setForm(EP);
    setErr("");
    setOpen(true);
  }

  async function save(){
    if(!form.name.trim()){setErr("Nom obligatoire.");return;}
    setSaving(true);setErr("");
    try{
      const item={...form,avancement:+form.avancement||0,equipe:+form.equipe||0,budget:+form.budget||0,depense:+form.depense||0};
      if(editing){await sheet.update(editing,item);}else{await sheet.add(item);}
      setOpen(false);setEditing(null);
    }catch(e){setErr(e.message);}
    setSaving(false);
  }

  async function saveNote(projId){
    if(!noteForm.contenu.trim())return;
    setSavingNote(true);
    try{
      await notes.add({projet_id:projId,date:TODAY,titre:noteForm.titre,contenu:noteForm.contenu});
      setNoteForm({titre:"",contenu:""});
    }catch(e){}
    setSavingNote(false);
  }

  async function finaliser(p){
    if(!confirm(`Finaliser et archiver le projet "${p.name}" ?`))return;
    await sheet.update(p.id,{...p,statut:"terminé",avancement:100});
    setDetail(null);
  }

  // Sauvegarde commande modifiée depuis vue détail
  async function saveOrder(){
    if(!editingOrder)return;
    await orders.update(editingOrder,{...orderForm,qty:+orderForm.qty||0,prix:+orderForm.prix||0});
    setEditingOrder(null);
    setOrderForm({});
  }

  // Délègue à la fonction globale
  function calcDepensesReelles(p){return calcDepensesProjet(p,orders,prestMissions);}

  const actifs=sheet.rows.filter(p=>p.statut!=="terminé");
  const historique=sheet.rows.filter(p=>p.statut==="terminé");

  // ── Panel latéral nouveau/modifier projet ──
  const panel=open&&<SidePanel title={editing?"Modifier le projet":"Nouveau projet"} onClose={()=>{setOpen(false);setEditing(null);}}>
    <FG label="Nom du projet *"><Inp value={form.name} onChange={e=>f("name",e.target.value)} placeholder="Ex: Façade ETFE Lyon"/></FG>
    <FG label="Client / maître d'ouvrage"><Inp value={form.client||""} onChange={e=>f("client",e.target.value)} placeholder="Ex: Société ABC"/></FG>
    <FG label="Lieu / chantier"><Inp value={form.lieu||""} onChange={e=>f("lieu",e.target.value)} placeholder="Ex: Lyon"/></FG>
    <FG label="Statut"><Sel value={form.statut} onChange={e=>f("statut",e.target.value)}>{PROJ_STATUTS.map(s=><option key={s}>{s}</option>)}</Sel></FG>
    <FG label="Avancement (%)"><Inp type="number" value={form.avancement} onChange={e=>f("avancement",e.target.value)}/></FG>
    <FG label="Chiffre d'affaires (€)"><Inp type="number" value={form.budget} onChange={e=>f("budget",e.target.value)}/></FG>
    <FG label="Dépenses saisies (€)"><Inp type="number" value={form.depense} onChange={e=>f("depense",e.target.value)}/></FG>
    <FG label="Nb personnes"><Inp type="number" value={form.equipe} onChange={e=>f("equipe",e.target.value)}/></FG>
    <FG label="Note"><Inp value={form.note||""} onChange={e=>f("note",e.target.value)} placeholder="Optionnel"/></FG>
    <ErrMsg msg={err}/>
    <PanelBtns onCancel={()=>{setOpen(false);setEditing(null);}} onSave={save} saving={saving} saveLabel={editing?"Mettre à jour":"Créer"}/>
  </SidePanel>;

  // ══ VUE DÉTAIL ══
  if(detail){
    const p=sheet.rows.find(x=>Number(x.id)===Number(detail));
    if(!p){setDetail(null);return null;}

    const projTasks=tasks.rows.filter(t=>t.projet===p.name);
    const projOrders=orders.rows.filter(o=>o.projet===p.name||o.projet===String(p.id));
    const projNotes=notes.rows.filter(n=>Number(n.projet_id)===Number(p.id)).sort((a,b)=>toISO(b.date).localeCompare(toISO(a.date)));
    const projEvents=events.rows.filter(e=>e.projet===p.name).sort((a,b)=>toISO(a.date).localeCompare(toISO(b.date)));
    const projPrest=(prestMissions?.rows||[]).filter(m=>m.projet===p.name||m.projet===String(p.id));
    const projAtelier=(atelierChantier?.rows||[]).filter(m=>m.projet===p.name&&m.type==="atelier");
    const projChantier=(atelierChantier?.rows||[]).filter(m=>m.projet===p.name&&m.type==="chantier");
    const projStocks=stocks.rows.filter(s=>projOrders.some(o=>o.article&&s.ref&&o.article.toLowerCase()===s.ref.toLowerCase()));

    const sc=statutColor(p.statut);
    const dep=calcDepensesReelles(p);
    const caVal=Number(p.budget)||0;
    const depSaisie=Number(p.depense)||0;
    const depAff=dep.total>0?dep.total:depSaisie;
    const pct=caVal>0?Math.round(depAff/caVal*100):0;

    const sbMission=s=>({planifié:{bg:"#F2F0ED",tx:"#3A3A3A"},"en cours":{bg:"#FFF0F0",tx:"#CC2222"},terminé:{bg:"#F0FFF0",tx:"#2A7A2A"}}[s]||{bg:"#F2F0ED",tx:"#3A3A3A"});

    return(
      <WithPanel panel={panel}>
        {/* En-tête */}
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap"}}>
          <button onClick={()=>setDetail(null)} style={{background:"none",border:"1px solid #DDDDDD",borderRadius:4,cursor:"pointer",fontSize:12,padding:"4px 10px",color:"#3A3A3A",fontFamily:"'DM Sans',sans-serif"}}>← Retour</button>
          <div style={{fontSize:16,fontWeight:700,color:"#1C1C1C",flex:1}}>{p.name}</div>
          {p.client&&<span style={{fontSize:13,color:"#7A7A7A"}}>{p.client}</span>}
          {p.lieu&&<span style={{fontSize:12,color:"#7A7A7A"}}>· {p.lieu}</span>}
          <Badge label={p.statut} bg={sc.bg} color={sc.tx}/>
          <Btn onClick={e=>openEdit(p,e)}>Modifier</Btn>
          {p.statut!=="terminé"&&<Btn danger onClick={()=>finaliser(p)}>Finaliser</Btn>}
        </div>

        {/* KPIs */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
          {[
            {lbl:"Avancement",val:p.avancement+"%"},
            {lbl:"Chiffre d'affaires",val:caVal>0?caVal.toLocaleString("fr-FR")+" €":"—"},
            {lbl:"Dépenses engagées",val:dep.total>0?dep.total.toLocaleString("fr-FR")+" €":depSaisie>0?depSaisie.toLocaleString("fr-FR")+" €":"—",
             sub:dep.total>0?`cmd: ${dep.engagees.toLocaleString("fr-FR")} € · prest: ${dep.prest.toLocaleString("fr-FR")} €`:null},
            {lbl:"Équipe",val:p.equipe?p.equipe+" pers.":"—"},
          ].map((m,i)=>(
            <div key={i} style={{background:"#fff",border:"0.5px solid #DDDDDD",borderRadius:8,padding:"10px 14px"}}>
              <div style={{fontSize:11,color:"#7A7A7A",marginBottom:3}}>{m.lbl}</div>
              <div style={{fontSize:16,fontWeight:700,color:"#1C1C1C"}}>{m.val}</div>
              {m.sub&&<div style={{fontSize:10,color:"#7A7A7A",marginTop:3}}>{m.sub}</div>}
            </div>
          ))}
        </div>

        {/* Barre CA */}
        {caVal>0&&<div style={{marginBottom:14}}>
          <div style={{fontSize:12,color:"#7A7A7A",marginBottom:4}}>Consommation CA : {pct}%{dep.total>0&&<span style={{marginLeft:8,fontSize:11}}> · {dep.recues.toLocaleString("fr-FR")} € reçus · {dep.engagees.toLocaleString("fr-FR")} € engagés</span>}</div>
          <div style={{height:5,borderRadius:3,background:"#EEEEEE",overflow:"hidden"}}>
            <div style={{height:"100%",width:Math.min(pct,100)+"%",background:pct>90?"#CC2222":pct>60?"#CC8800":"#2A7A2A",borderRadius:3}}/>
          </div>
        </div>}

        {p.note&&<div style={{fontSize:12,color:"#7A7A7A",fontStyle:"italic",marginBottom:14,padding:"8px 12px",background:"#F9F9F9",borderRadius:6,borderLeft:"3px solid #DDDDDD"}}>{p.note}</div>}

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>

          {/* Tâches */}
          <Bd>
            <SecTitle>Tâches ({projTasks.length})</SecTitle>
            {!projTasks.length&&<div style={{fontSize:13,color:"#7A7A7A"}}>Aucune tâche liée.</div>}
            {projTasks.map(t=>{
              const urg=autoUrgence(t.due,t.done);const u=UC[urg]||UC.med;const done=isBool(t.done);
              return(
                <div key={t.id} style={{display:"flex",gap:8,padding:"7px 0",borderBottom:"0.5px solid #EEEEEE",alignItems:"center"}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:done?"#2A7A2A":u.tx,flexShrink:0}}/>
                  <div style={{flex:1,fontSize:12,color:done?"#7A7A7A":"#1C1C1C",textDecoration:done?"line-through":"none"}}>{t.text}</div>
                  {t.due&&<span style={{fontSize:11,color:"#7A7A7A"}}>{fmt(t.due)}</span>}
                  <Badge label={u.lbl} bg={u.bg} color={u.tx}/>
                </div>
              );
            })}
          </Bd>

          {/* Calendrier */}
          <Bd>
            <SecTitle>Calendrier ({projEvents.length})</SecTitle>
            {!projEvents.length&&<div style={{fontSize:13,color:"#7A7A7A"}}>Aucun événement lié.</div>}
            {projEvents.map(ev=>(
              <div key={ev.id} style={{display:"flex",gap:8,padding:"7px 0",borderBottom:"0.5px solid #EEEEEE",alignItems:"center"}}>
                <div style={{width:3,background:EV_COLORS[ev.type]||"#7A7A7A",borderRadius:2,alignSelf:"stretch",flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,fontWeight:500,color:"#1C1C1C"}}>{ev.title}</div>
                  <div style={{fontSize:11,color:"#7A7A7A"}}>{fmt(ev.date)}{ev.heure&&` · ${ev.heure}`}</div>
                </div>
                <Badge label={EV_LABELS[ev.type]||ev.type} bg="#F2F0ED" color="#3A3A3A"/>
              </div>
            ))}
          </Bd>

          {/* Commandes */}
          <Bd>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <SecTitle>Commandes ({projOrders.length})</SecTitle>
              {projOrders.filter(o=>isBool(o.recue)).length>0&&
                <span style={{fontSize:12,color:"#2A7A2A",fontWeight:600}}>
                  {projOrders.filter(o=>isBool(o.recue)).reduce((s,o)=>s+(+o.prix||0)*(+o.qty||0),0).toLocaleString("fr-FR")} € reçues
                </span>}
            </div>
            {!projOrders.length&&<div style={{fontSize:13,color:"#7A7A7A"}}>Aucune commande liée.</div>}
            {projOrders.map(o=>{
              if(editingOrder===o.id)return(
                <div key={o.id} style={{padding:"8px 10px",background:"#F2F0ED",borderRadius:6,marginBottom:6}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:6}}>
                    <FG label="Article"><Inp value={orderForm.article||""} onChange={e=>setOrderForm(x=>({...x,article:e.target.value}))}/></FG>
                    <FG label="Fournisseur"><Inp value={orderForm.fourn||""} onChange={e=>setOrderForm(x=>({...x,fourn:e.target.value}))}/></FG>
                    <FG label="Qté"><Inp type="number" value={orderForm.qty||""} onChange={e=>setOrderForm(x=>({...x,qty:e.target.value}))}/></FG>
                    <FG label="Prix unit. €"><Inp type="number" value={orderForm.prix||""} onChange={e=>setOrderForm(x=>({...x,prix:e.target.value}))}/></FG>
                  </div>
                  <div style={{display:"flex",gap:6,justifyContent:"flex-end"}}>
                    <Btn small onClick={()=>setEditingOrder(null)}>Annuler</Btn>
                    <Btn small primary onClick={saveOrder}>✓ Sauvegarder</Btn>
                  </div>
                </div>
              );
              return(
                <div key={o.id} style={{display:"flex",gap:8,padding:"7px 0",borderBottom:"0.5px solid #EEEEEE",alignItems:"center"}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:500,color:"#1C1C1C"}}>{o.article}</div>
                    <div style={{fontSize:11,color:"#7A7A7A"}}>{o.fourn} · {o.qty} {o.unit}{o.prix>0&&` · ${(+o.prix*(+o.qty||1)).toLocaleString("fr-FR")} €`}</div>
                  </div>
                  <Badge label={isBool(o.recue)?"Reçue":"En cours"} bg={isBool(o.recue)?"#F0FFF0":"#F2F0ED"} color={isBool(o.recue)?"#2A7A2A":"#3A3A3A"}/>
                  <button onClick={()=>{setEditingOrder(o.id);setOrderForm({...o});}} style={{background:"none",border:"1px solid #DDDDDD",borderRadius:4,cursor:"pointer",fontSize:11,padding:"2px 6px",color:"#3A3A3A",fontFamily:"'DM Sans',sans-serif"}}>Mod.</button>
                </div>
              );
            })}
          </Bd>

          {/* Prestations */}
          <Bd>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <SecTitle>Prestations ({projPrest.length})</SecTitle>
              {projPrest.filter(m=>m.statut==="terminé").length>0&&
                <span style={{fontSize:12,color:"#2A7A2A",fontWeight:600}}>
                  {projPrest.filter(m=>m.statut==="terminé").reduce((s,m)=>s+Number(m.prix||0),0).toLocaleString("fr-FR")} € terminées
                </span>}
            </div>
            {!projPrest.length&&<div style={{fontSize:13,color:"#7A7A7A"}}>Aucune prestation.</div>}
            {projPrest.map(m=>{
              const sb=sbMission(m.statut);
              return(
                <div key={m.id} style={{display:"flex",gap:8,padding:"7px 0",borderBottom:"0.5px solid #EEEEEE",alignItems:"center"}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:500,color:"#1C1C1C"}}>{m.description}</div>
                    <div style={{fontSize:11,color:"#7A7A7A"}}>{m.prestataire}{m.prix>0&&` · ${Number(m.prix).toLocaleString("fr-FR")} €`}</div>
                  </div>
                  <Badge label={m.statut} bg={sb.bg} color={sb.tx}/>
                </div>
              );
            })}
          </Bd>

          {/* Atelier */}
          {projAtelier.length>0&&<Bd>
            <SecTitle>Atelier ({projAtelier.length})</SecTitle>
            {projAtelier.map(m=>{
              const sb=sbMission(m.statut);
              return(
                <div key={m.id} style={{display:"flex",gap:8,padding:"7px 0",borderBottom:"0.5px solid #EEEEEE",alignItems:"center"}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:500,color:"#1C1C1C"}}>{m.description}</div>
                    {m.dateDebut&&<div style={{fontSize:11,color:"#7A7A7A"}}>{fmt(m.dateDebut)}{m.dateFin&&` → ${fmt(m.dateFin)}`}</div>}
                  </div>
                  <Badge label={m.statut} bg={sb.bg} color={sb.tx}/>
                </div>
              );
            })}
          </Bd>}

          {/* Chantier */}
          {projChantier.length>0&&<Bd>
            <SecTitle>Chantier ({projChantier.length})</SecTitle>
            {projChantier.map(m=>{
              const sb=sbMission(m.statut);
              return(
                <div key={m.id} style={{display:"flex",gap:8,padding:"7px 0",borderBottom:"0.5px solid #EEEEEE",alignItems:"center"}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:500,color:"#1C1C1C"}}>{m.description}</div>
                    {m.dateDebut&&<div style={{fontSize:11,color:"#7A7A7A"}}>{fmt(m.dateDebut)}{m.dateFin&&` → ${fmt(m.dateFin)}`}</div>}
                  </div>
                  <Badge label={m.statut} bg={sb.bg} color={sb.tx}/>
                </div>
              );
            })}
          </Bd>}

          {/* Stocks liés */}
          {projStocks.length>0&&<Bd>
            <SecTitle>Stocks liés ({projStocks.length})</SecTitle>
            {projStocks.map(s=>{
              const r=Number(s.qty)/Math.max(Number(s.min),0.001);
              const sb=r<0.7?{bg:"#FFF0F0",tx:"#CC2222",lbl:"Critique"}:r<1?{bg:"#FFF8EC",tx:"#CC8800",lbl:"Bas"}:{bg:"#F0FFF0",tx:"#2A7A2A",lbl:"OK"};
              return(
                <div key={s.id} style={{display:"flex",gap:8,padding:"7px 0",borderBottom:"0.5px solid #EEEEEE",alignItems:"center"}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12,fontWeight:500,color:"#1C1C1C"}}>{s.ref}</div>
                    <div style={{fontSize:11,color:"#7A7A7A"}}>{s.qty}/{s.min} {s.unit}</div>
                  </div>
                  <Badge label={sb.lbl} bg={sb.bg} color={sb.tx}/>
                </div>
              );
            })}
          </Bd>}

          {/* Notes — pleine largeur */}
          <Bd style={{gridColumn:"1/-1"}}>
            <SecTitle>Notes ({projNotes.length})</SecTitle>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:10}}>
              <FG label="Titre (optionnel)"><Inp value={noteForm.titre} onChange={e=>setNoteForm(x=>({...x,titre:e.target.value}))} placeholder="Ex: Point chantier"/></FG>
              <FG label="Contenu *"><Inp value={noteForm.contenu} onChange={e=>setNoteForm(x=>({...x,contenu:e.target.value}))} placeholder="Saisir une note..."/></FG>
            </div>
            <div style={{display:"flex",justifyContent:"flex-end",marginBottom:12}}>
              <Btn primary onClick={()=>saveNote(p.id)}><span className={savingNote?"spin":""}>{savingNote?"⟳":"+"}</span> Ajouter une note</Btn>
            </div>
            {!projNotes.length&&<div style={{fontSize:13,color:"#7A7A7A"}}>Aucune note.</div>}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {projNotes.map(n=>(
                <div key={n.id} style={{padding:"10px 12px",borderRadius:6,background:"#F9F9F9",border:"0.5px solid #EEEEEE",position:"relative"}}>
                  <button onClick={()=>notes.remove(n.id)} style={{position:"absolute",top:8,right:8,background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#7A7A7A"}}>✕</button>
                  {n.titre&&<div style={{fontSize:12,fontWeight:700,color:"#1C1C1C",marginBottom:2,paddingRight:20}}>{n.titre}</div>}
                  <div style={{fontSize:11,color:"#7A7A7A",fontFamily:"'DM Mono',monospace",marginBottom:4}}>{fmt(n.date)}</div>
                  <div style={{fontSize:12,color:"#3A3A3A",whiteSpace:"pre-wrap",lineHeight:1.5}}>{n.contenu}</div>
                </div>
              ))}
            </div>
          </Bd>

        </div>
      </WithPanel>
    );
  }

  // ══ VUE LISTE ══
  return <WithPanel panel={panel}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div style={{display:"flex",gap:8,alignItems:"center"}}>
        <div style={{fontSize:15,fontWeight:700,color:"#1C1C1C",borderLeft:"3px solid #CC2222",paddingLeft:8}}>Projets actifs ({actifs.length})</div>
        {historique.length>0&&<button onClick={()=>setShowHistorique(h=>!h)} style={{fontSize:12,color:"#7A7A7A",background:"none",border:"1px solid #DDDDDD",borderRadius:4,padding:"3px 8px",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>{showHistorique?"Masquer":"Voir"} historique ({historique.length})</button>}
      </div>
      <Btn primary onClick={openNew}>+ Nouveau projet</Btn>
    </div>

    {sheet.loading&&<div style={{fontSize:13,color:"#7A7A7A",padding:12}}>Chargement...</div>}
    {!actifs.length&&!sheet.loading&&<Bd style={{textAlign:"center",padding:24,color:"#7A7A7A",fontSize:13,marginBottom:10}}>Aucun projet actif.</Bd>}

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      {actifs.map(p=>{
        const c=statutColor(p.statut);
        const dep=calcDepensesReelles(p);
        const caVal=Number(p.budget)||0;
        const depAff=dep.total>0?dep.total:Number(p.depense)||0;
        const bp=caVal>0?Math.round(depAff/caVal*100):0;
        return(
          <div key={p.id} onClick={()=>openDetail(p.id)}
            style={{background:"#fff",border:"0.5px solid #DDDDDD",borderRadius:10,padding:14,cursor:"pointer",position:"relative",transition:"box-shadow .15s"}}
            onMouseEnter={e=>e.currentTarget.style.boxShadow="0 2px 8px rgba(0,0,0,0.08)"}
            onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:700,color:"#1C1C1C"}}>{p.name}</div>
                {p.client&&<div style={{fontSize:12,color:"#7A7A7A"}}>{p.client}</div>}
                {p.lieu&&<div style={{fontSize:12,color:"#7A7A7A"}}>{p.lieu}</div>}
              </div>
              <div style={{display:"flex",gap:4,alignItems:"flex-start",flexShrink:0}} onClick={e=>e.stopPropagation()}>
                <button onClick={e=>openEdit(p,e)} style={{background:"none",border:"1px solid #DDDDDD",borderRadius:4,cursor:"pointer",fontSize:11,padding:"2px 8px",color:"#3A3A3A",fontFamily:"'DM Sans',sans-serif"}}>Modifier</button>
                <button onClick={e=>{e.stopPropagation();if(confirm("Supprimer ce projet ?"))sheet.remove(p.id);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#CC2222"}}>✕</button>
              </div>
            </div>
            <Badge label={p.statut} bg={c.bg} color={c.tx}/>
            <div style={{fontSize:12,color:"#7A7A7A",marginTop:8}}>Avancement : {p.avancement}%</div>
            <PBar val={p.avancement}/>
            {caVal>0&&<>
              <div style={{fontSize:12,color:"#7A7A7A",marginTop:6}}>{depAff.toLocaleString("fr-FR")} € / {caVal.toLocaleString("fr-FR")} € CA{dep.total>0&&<span style={{fontSize:10,color:"#7A7A7A",marginLeft:4}}>(engagé)</span>}</div>
              <PBar val={bp}/>
            </>}
            <div style={{fontSize:11,color:"#CC2222",marginTop:8,fontWeight:500}}>→ Voir le détail complet</div>
          </div>
        );
      })}
    </div>

    {showHistorique&&historique.length>0&&(
      <div style={{marginTop:16}}>
        <div style={{fontSize:13,fontWeight:700,color:"#7A7A7A",borderLeft:"3px solid #DDDDDD",paddingLeft:8,marginBottom:10}}>Projets terminés ({historique.length})</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {historique.map(p=>(
            <div key={p.id} onClick={()=>openDetail(p.id)}
              style={{background:"#fff",border:"0.5px solid #DDDDDD",borderRadius:10,padding:14,opacity:.7,cursor:"pointer"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <div><div style={{fontSize:13,fontWeight:700,color:"#3A3A3A",textDecoration:"line-through"}}>{p.name}</div>{p.client&&<div style={{fontSize:12,color:"#7A7A7A"}}>{p.client}</div>}</div>
                <Badge label="Terminé" bg="#F0FFF0" color="#2A7A2A"/>
              </div>
              {p.budget>0&&<div style={{fontSize:12,color:"#7A7A7A"}}>{Number(p.depense).toLocaleString("fr-FR")} € / {Number(p.budget).toLocaleString("fr-FR")} € CA</div>}
            </div>
          ))}
        </div>
      </div>
    )}
  </WithPanel>;
}

// ══ PRESTATAIRES ══
const EPREST={nom:"",specialite:"",contact:"",tel:"",note:""};
const EPREST_MISSION={prestataire:"",projet:"",description:"",dateDebut:"",dateFin:"",prix:"",statut:"planifié",stockRef:"",stockQty:""};

function Prestataires({sheet,missions,projects,stocks}){
  const [open,setOpen]=useState(false);
  const [form,setForm]=useState(EPREST);
  const [editing,setEditing]=useState(null);
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");
  const [missionOpen,setMissionOpen]=useState(false);
  const [missionForm,setMissionForm]=useState(EPREST_MISSION);
  const [missionEditing,setMissionEditing]=useState(null);
  const [savingM,setSavingM]=useState(false);
  const [errM,setErrM]=useState("");
  const f=(k,v)=>setForm(x=>({...x,[k]:v}));
  const fm=(k,v)=>setMissionForm(x=>({...x,[k]:v}));

  async function save(){
    if(!form.nom.trim()){setErr("Nom obligatoire.");return;}
    setSaving(true);setErr("");
    try{if(editing){await sheet.update(editing,form);}else{await sheet.add(form);}setOpen(false);setEditing(null);}
    catch(e){setErr(e.message);}setSaving(false);
  }

  async function saveMission(){
    if(!missionForm.description.trim()){setErrM("Description obligatoire.");return;}
    setSavingM(true);setErrM("");
    try{
      const item={...missionForm,prix:+missionForm.prix||0,stockQty:+missionForm.stockQty||0};
      if(missionEditing){await missions.update(missionEditing,item);}
      else{await missions.add(item);}
      setMissionOpen(false);setMissionEditing(null);
    }catch(e){setErrM(e.message);}setSavingM(false);
  }

  async function terminerMission(m){
    if(!confirm(`Marquer la prestation "${m.description}" comme terminée ?`))return;
    // Met à jour le stock si une pièce est liée
    if(m.stockRef&&m.stockQty>0){
      const s=stocks.rows.find(x=>x.ref===m.stockRef);
      if(s){await stocks.update(s.id,{...s,qty:Math.max(0,Number(s.qty)-Number(m.stockQty)),historique:true});}
    }
    // Met à jour les dépenses du projet
    if(m.projet&&m.prix>0){
      const p=projects.rows.find(x=>x.name===m.projet);
      if(p){await projects.update(p.id,{...p,depense:(Number(p.depense)||0)+Number(m.prix)});}
    }
    await missions.update(m.id,{...m,statut:"terminé"});
  }

  const statutBadgePrest=(s)=>({
    "planifié":{bg:"#F2F0ED",tx:"#3A3A3A"},
    "en cours":{bg:"#FFF0F0",tx:"#CC2222"},
    "terminé":{bg:"#F0FFF0",tx:"#2A7A2A"},
  }[s]||{bg:"#F2F0ED",tx:"#3A3A3A"});

  const missionPanel=missionOpen&&<SidePanel title={missionEditing?"Modifier la prestation":"Nouvelle prestation"} onClose={()=>{setMissionOpen(false);setMissionEditing(null);}}>
    <FG label="Description *"><Inp value={missionForm.description} onChange={e=>fm("description",e.target.value)} placeholder="Ex: Pose membranes ETFE"/></FG>
    <FG label="Prestataire"><Sel value={missionForm.prestataire} onChange={e=>fm("prestataire",e.target.value)}>
      <option value="">— Aucun —</option>{sheet.rows.map(p=><option key={p.id}>{p.nom}</option>)}
    </Sel></FG>
    <FG label="Projet"><Sel value={missionForm.projet} onChange={e=>fm("projet",e.target.value)}>
      <option value="">— Aucun —</option>{projects.rows.map(p=><option key={p.id}>{p.name}</option>)}
    </Sel></FG>
    <FG label="Date début"><Inp type="date" value={missionForm.dateDebut} onChange={e=>fm("dateDebut",e.target.value)}/></FG>
    <FG label="Date fin prévue"><Inp type="date" value={missionForm.dateFin} onChange={e=>fm("dateFin",e.target.value)}/></FG>
    <FG label="Prix de la prestation (€)"><Inp type="number" value={missionForm.prix} onChange={e=>fm("prix",e.target.value)} placeholder="0.00"/></FG>
    <FG label="Pièce stock liée"><Sel value={missionForm.stockRef} onChange={e=>fm("stockRef",e.target.value)}>
      <option value="">— Aucune —</option>{stocks.rows.map(s=><option key={s.id}>{s.ref}</option>)}
    </Sel></FG>
    {missionForm.stockRef&&<FG label="Quantité utilisée"><Inp type="number" value={missionForm.stockQty} onChange={e=>fm("stockQty",e.target.value)} placeholder="0"/></FG>}
    <FG label="Statut"><Sel value={missionForm.statut} onChange={e=>fm("statut",e.target.value)}>
      <option value="planifié">Planifié</option><option value="en cours">En cours</option><option value="terminé">Terminé</option>
    </Sel></FG>
    <ErrMsg msg={errM}/><PanelBtns onCancel={()=>{setMissionOpen(false);setMissionEditing(null);}} onSave={saveMission} saving={savingM} saveLabel={missionEditing?"Mettre à jour":"Créer"}/>
  </SidePanel>;

  const prestPanel=open&&<SidePanel title={editing?"Modifier le prestataire":"Nouveau prestataire"} onClose={()=>{setOpen(false);setEditing(null);}}>
    <FG label="Nom / société *"><Inp value={form.nom} onChange={e=>f("nom",e.target.value)} placeholder="Ex: Cordiste Pro SARL"/></FG>
    <FG label="Spécialité"><Inp value={form.specialite} onChange={e=>f("specialite",e.target.value)} placeholder="Ex: Cordiste, étanchéité..."/></FG>
    <FG label="Contact"><Inp value={form.contact} onChange={e=>f("contact",e.target.value)} placeholder="email@..."/></FG>
    <FG label="Téléphone"><Inp value={form.tel||""} onChange={e=>f("tel",e.target.value)}/></FG>
    <FG label="Note"><Inp value={form.note||""} onChange={e=>f("note",e.target.value)} placeholder="Optionnel"/></FG>
    <ErrMsg msg={err}/><PanelBtns onCancel={()=>{setOpen(false);setEditing(null);}} onSave={save} saving={saving} saveLabel={editing?"Mettre à jour":"Ajouter"}/>
  </SidePanel>;

  const activePanel=missionOpen?missionPanel:prestPanel;
  const mActives=missions.rows.filter(m=>m.statut!=="terminé");
  const mTerminees=missions.rows.filter(m=>m.statut==="terminé");

  return <WithPanel panel={activePanel}>
    {/* Prestations */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div style={{fontSize:15,fontWeight:700,color:"#1C1C1C",borderLeft:"3px solid #CC2222",paddingLeft:8}}>Prestations ({mActives.length} actives)</div>
      <Btn primary onClick={()=>{setMissionEditing(null);setMissionForm(EPREST_MISSION);setErrM("");setOpen(false);setMissionOpen(true);}}>+ Nouvelle prestation</Btn>
    </div>

    {!mActives.length&&<Bd style={{textAlign:"center",padding:20,color:"#7A7A7A",fontSize:13,marginBottom:12}}>Aucune prestation en cours.</Bd>}
    {mActives.map(m=>{const sb=statutBadgePrest(m.statut);return(
      <Bd key={m.id} style={{marginBottom:8}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:"#1C1C1C"}}>{m.description}</div>
            <div style={{fontSize:12,color:"#7A7A7A"}}>{m.prestataire&&`${m.prestataire} · `}{m.projet}</div>
            <div style={{fontSize:12,color:"#7A7A7A"}}>{m.dateDebut&&`Du ${fmt(m.dateDebut)}`}{m.dateFin&&` au ${fmt(m.dateFin)}`}</div>
            {m.stockRef&&<div style={{fontSize:12,color:"#7A7A7A"}}>Pièce : {m.stockRef} × {m.stockQty}</div>}
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <Badge label={sb.tx==="#CC2222"?"En cours":m.statut} bg={sb.bg} color={sb.tx}/>
            {m.prix>0&&<span style={{fontSize:13,fontWeight:700,color:"#CC2222"}}>{Number(m.prix).toLocaleString("fr-FR")} €</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:6}}>
          <Btn small onClick={()=>{setMissionEditing(m.id);setMissionForm({...m,prix:String(m.prix),stockQty:String(m.stockQty)});setErrM("");setOpen(false);setMissionOpen(true);}}>Modifier</Btn>
          {m.statut!=="terminé"&&<Btn small primary onClick={()=>terminerMission(m)}>Marquer terminé</Btn>}
          <Btn small danger onClick={()=>missions.remove(m.id)}>Suppr.</Btn>
        </div>
      </Bd>
    );})}

    {/* Historique prestations */}
    {mTerminees.length>0&&<>
      <div style={{fontSize:13,fontWeight:700,color:"#7A7A7A",borderLeft:"3px solid #DDDDDD",paddingLeft:8,margin:"16px 0 10px"}}>Historique — prestations terminées ({mTerminees.length})</div>
      {mTerminees.map(m=>(
        <div key={m.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:6,background:"#F9F9F9",border:"0.5px solid #EEEEEE",marginBottom:6,opacity:.7}}>
          <div style={{flex:1}}>
            <div style={{fontSize:13,color:"#3A3A3A",textDecoration:"line-through"}}>{m.description}</div>
            <div style={{fontSize:11,color:"#7A7A7A"}}>{m.projet} · {m.dateFin&&fmt(m.dateFin)}</div>
          </div>
          {m.prix>0&&<span style={{fontSize:12,fontWeight:700,color:"#2A7A2A"}}>{Number(m.prix).toLocaleString("fr-FR")} €</span>}
          <Badge label="Terminé" bg="#F0FFF0" color="#2A7A2A"/>
        </div>
      ))}
    </>}

    {/* Liste prestataires */}
    <div style={{marginTop:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:700,color:"#1C1C1C",borderLeft:"3px solid #CC2222",paddingLeft:8}}>Prestataires ({sheet.rows.length})</div>
        <Btn small onClick={()=>{setMissionOpen(false);setEditing(null);setForm(EPREST);setErr("");setOpen(true);}}>+ Ajouter</Btn>
      </div>
      {!sheet.rows.length&&<Bd style={{textAlign:"center",padding:16,color:"#7A7A7A",fontSize:13}}>Aucun prestataire enregistré.</Bd>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {sheet.rows.map(p=>(
          <Bd key={p.id} style={{padding:10}}>
            <div style={{display:"flex",justifyContent:"space-between"}}>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:"#1C1C1C"}}>{p.nom}</div>
                {p.specialite&&<div style={{fontSize:12,color:"#7A7A7A"}}>{p.specialite}</div>}
                {p.contact&&<div style={{fontSize:12,color:"#7A7A7A"}}>{p.contact}</div>}
                {p.tel&&<div style={{fontSize:12,color:"#7A7A7A",fontFamily:"'DM Mono',monospace"}}>{p.tel}</div>}
              </div>
              <div style={{display:"flex",gap:4}}>
                <button onClick={()=>{setMissionOpen(false);setEditing(p.id);setForm({...p});setErr("");setOpen(true);}} style={{background:"none",border:"1px solid #DDDDDD",borderRadius:4,cursor:"pointer",fontSize:11,padding:"2px 6px",color:"#3A3A3A",fontFamily:"'DM Sans',sans-serif"}}>Mod.</button>
                <button onClick={()=>sheet.remove(p.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#7A7A7A"}}>✕</button>
              </div>
            </div>
          </Bd>
        ))}
      </div>
    </div>
  </WithPanel>;
}

// ══ ATELIER / CHANTIER (module générique) ══
const EMISSION={type:"",projet:"",description:"",membres:[],stockRef:"",stockQty:"",dateDebut:"",dateFin:"",statut:"planifié",note:""};

function MissionModule({moduleType,sheet,projects,team,stocks}){
  const label=moduleType==="atelier"?"Atelier":"Chantier";
  const [open,setOpen]=useState(false);
  const [form,setForm]=useState({...EMISSION,type:moduleType});
  const [editing,setEditing]=useState(null);
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");
  const [vue,setVue]=useState("liste"); // "liste" | "planning"
  const f=(k,v)=>setForm(x=>({...x,[k]:v}));

  async function save(){
    if(!form.description.trim()){setErr("Description obligatoire.");return;}
    setSaving(true);setErr("");
    try{
      const item={...form,stockQty:+form.stockQty||0,membres:Array.isArray(form.membres)?form.membres.join(","):form.membres};
      if(editing){await sheet.update(editing,item);}else{await sheet.add(item);}
      setOpen(false);setEditing(null);
    }catch(e){setErr(e.message);}setSaving(false);
  }

  async function terminer(m){
    if(!confirm(`Marquer "${m.description}" comme terminé ?`))return;
    if(m.stockRef&&m.stockQty>0){
      const s=stocks.rows.find(x=>x.ref===m.stockRef);
      if(s){await stocks.update(s.id,{...s,qty:Math.max(0,Number(s.qty)-Number(m.stockQty))});}
    }
    await sheet.update(m.id,{...m,statut:"terminé"});
  }

  const toutes=sheet.rows.filter(m=>m.type===moduleType);
  const actives=toutes.filter(m=>m.statut!=="terminé");
  const terminees=toutes.filter(m=>m.statut==="terminé");
  const sb=(s)=>({planifié:{bg:"#F2F0ED",tx:"#3A3A3A"},"en cours":{bg:"#FFF0F0",tx:"#CC2222"},terminé:{bg:"#F0FFF0",tx:"#2A7A2A"}}[s]||{bg:"#F2F0ED",tx:"#3A3A3A"});

  const toggleMembre=(nom)=>{
    const current=Array.isArray(form.membres)?form.membres:(form.membres||"").split(",").filter(Boolean);
    const next=current.includes(nom)?current.filter(x=>x!==nom):[...current,nom];
    f("membres",next);
  };
  const getMembres=(m)=>typeof m.membres==="string"?m.membres.split(",").filter(Boolean):Array.isArray(m.membres)?m.membres:[];

  // Tous les membres impliqués dans au moins une mission active du module
  const membresActifs=team.rows.filter(t=>
    actives.some(m=>getMembres(m).includes(t.nom))
  );

  // Couleur de statut pour la barre de planning
  const barColor=(s)=>s==="terminé"?"#2A7A2A":s==="en cours"?"#CC2222":"#AAAAAA";

  const panel=open&&<SidePanel title={editing?`Modifier la mission`:`Nouvelle mission ${label}`} onClose={()=>{setOpen(false);setEditing(null);}}>
    <FG label="Description *"><Inp value={form.description} onChange={e=>f("description",e.target.value)} placeholder="Ex: Découpe membranes ETFE"/></FG>
    <FG label="Projet"><Sel value={form.projet} onChange={e=>f("projet",e.target.value)}>
      <option value="">— Aucun —</option>{projects.rows.map(p=><option key={p.id}>{p.name}</option>)}
    </Sel></FG>
    <FG label="Date début"><Inp type="date" value={form.dateDebut} onChange={e=>f("dateDebut",e.target.value)}/></FG>
    <FG label="Date fin prévue"><Inp type="date" value={form.dateFin} onChange={e=>f("dateFin",e.target.value)}/></FG>
    <FG label="Membres de l'équipe">
      <div style={{display:"flex",flexWrap:"wrap",gap:6,padding:"8px 0"}}>
        {team.rows.map(m=>{
          const current=Array.isArray(form.membres)?form.membres:(form.membres||"").split(",").filter(Boolean);
          const sel=current.includes(m.nom);
          return <button key={m.id} onClick={()=>toggleMembre(m.nom)} style={{padding:"3px 10px",borderRadius:4,fontSize:12,cursor:"pointer",border:`1px solid ${sel?"#CC2222":"#DDDDDD"}`,background:sel?"#CC2222":"#fff",color:sel?"#fff":"#3A3A3A",fontFamily:"'DM Sans',sans-serif"}}>{m.nom}</button>;
        })}
      </div>
    </FG>
    <FG label="Pièce stock utilisée"><Sel value={form.stockRef} onChange={e=>f("stockRef",e.target.value)}>
      <option value="">— Aucune —</option>{stocks.rows.map(s=><option key={s.id}>{s.ref}</option>)}
    </Sel></FG>
    {form.stockRef&&<FG label="Quantité utilisée"><Inp type="number" value={form.stockQty} onChange={e=>f("stockQty",e.target.value)} placeholder="0"/></FG>}
    <FG label="Statut"><Sel value={form.statut} onChange={e=>f("statut",e.target.value)}>
      <option value="planifié">Planifié</option><option value="en cours">En cours</option><option value="terminé">Terminé</option>
    </Sel></FG>
    <FG label="Note"><Inp value={form.note||""} onChange={e=>f("note",e.target.value)} placeholder="Optionnel"/></FG>
    <ErrMsg msg={err}/><PanelBtns onCancel={()=>{setOpen(false);setEditing(null);}} onSave={save} saving={saving} saveLabel={editing?"Mettre à jour":"Créer"}/>
  </SidePanel>;

  return <WithPanel panel={panel}>
    {/* Header avec toggle vue */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <div style={{fontSize:15,fontWeight:700,color:"#1C1C1C",borderLeft:"3px solid #CC2222",paddingLeft:8}}>
          Missions {label} ({actives.length} actives)
        </div>
        {/* Toggle liste / planning */}
        <div style={{display:"flex",border:"1px solid #DDDDDD",borderRadius:6,overflow:"hidden"}}>
          {[["liste","≡ Liste"],["planning","▦ Planning"]].map(([v,l])=>(
            <button key={v} onClick={()=>setVue(v)} style={{
              padding:"4px 12px",fontSize:12,cursor:"pointer",border:"none",
              background:vue===v?"#CC2222":"#fff",
              color:vue===v?"#fff":"#3A3A3A",
              fontFamily:"'DM Sans',sans-serif",fontWeight:vue===v?700:400
            }}>{l}</button>
          ))}
        </div>
      </div>
      <Btn primary onClick={()=>{setEditing(null);setForm({...EMISSION,type:moduleType});setErr("");setOpen(true);}}>+ Nouvelle mission</Btn>
    </div>

    {/* ══ VUE LISTE ══ */}
    {vue==="liste"&&<>
      {!actives.length&&<Bd style={{textAlign:"center",padding:20,color:"#7A7A7A",fontSize:13,marginBottom:12}}>Aucune mission {label.toLowerCase()} en cours.</Bd>}
      {actives.map(m=>{
        const s=sb(m.statut);
        const membres=getMembres(m);
        return(
          <Bd key={m.id} style={{marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700,color:"#1C1C1C",marginBottom:2}}>{m.description}</div>
                {m.projet&&<div style={{fontSize:12,color:"#7A7A7A",marginBottom:3}}>{m.projet}</div>}
                <div style={{fontSize:12,color:"#7A7A7A"}}>{m.dateDebut&&`Du ${fmt(m.dateDebut)}`}{m.dateFin&&` au ${fmt(m.dateFin)}`}</div>
                {membres.length>0&&(
                  <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:6}}>

      {terminees.length>0&&<>
        <div style={{fontSize:13,fontWeight:700,color:"#7A7A7A",borderLeft:"3px solid #DDDDDD",paddingLeft:8,margin:"16px 0 10px"}}>Historique — missions terminées ({terminees.length})</div>
        {terminees.map(m=>(
          <div key={m.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",borderRadius:6,background:"#F9F9F9",border:"0.5px solid #EEEEEE",marginBottom:6,opacity:.7}}>
            <div style={{flex:1}}>

            </div>
            <Badge label="Terminé" bg="#F0FFF0" color="#2A7A2A"/>
          </div>
        ))}
      </>}
    </>}

    {/* ══ VUE PLANNING ══ */}
    {vue==="planning"&&<>
      {!membresActifs.length&&(
        <Bd style={{textAlign:"center",padding:24,color:"#7A7A7A",fontSize:13}}>
          Aucun membre assigné aux missions actives. Assigne des membres depuis la vue Liste.
        </Bd>
      )}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {membresActifs.map(membre=>{
          const missionsPersonne=actives.filter(m=>getMembres(m).includes(membre.nom));
          const nTerminees=terminees.filter(m=>getMembres(m).includes(membre.nom)).length;
          const nTotal=missionsPersonne.length+nTerminees;
          const pct=nTotal>0?Math.round(nTerminees/nTotal*100):0;

          return(
            <Bd key={membre.id}>
              {/* En-tête membre */}
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,paddingBottom:10,borderBottom:"1px solid #EEEEEE"}}>
                <div style={{width:36,height:36,borderRadius:"50%",background:"#CC2222",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <span style={{fontSize:13,fontWeight:700,color:"#fff"}}>{initials(membre.nom)}</span>
                </div>
                <div style={{flex:1}}>
