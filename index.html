    if(!form.nom.trim()){setErr("Nom obligatoire.");return;}
    setSaving(true);setErr("");
    try{if(editing){await sheet.update(editing,form);}else{await sheet.add(form);}setOpen(false);setEditing(null);}
    catch(e){setErr(e.message);}setSaving(false);
  }

  async function saveMission(){
    if(!missionForm.description.trim()){setErrM("Description obligatoire.");return;}
    setSavingM(true);setErrM("");
    try{
      const item={...missionForm,prix:+missionForm.prix||0,stockQty:+missionForm.stockQty||0};
      if(missionEditing){
        // Si la mission est déjà terminée et qu'on ajoute/modifie une pièce stock → déduire du stock
        const ancienne=missions.rows.find(x=>Number(x.id)===Number(missionEditing));
        if(ancienne&&ancienne.statut==="terminé"){
          const ancItems=getMissionStockItems(ancienne);
          let newItemsSave=[];
          try{newItemsSave=missionForm.stockItems?JSON.parse(missionForm.stockItems):(missionForm.stockRef?[{ref:missionForm.stockRef,qty:+missionForm.stockQty||1}]:[]);}catch(e){}
          const ancStr=JSON.stringify(ancItems.map(x=>normRef(x.ref)+"_"+x.qty).sort());
          const newStr=JSON.stringify(newItemsSave.map(x=>normRef(x.ref)+"_"+x.qty).sort());
          if(ancStr!==newStr){
            // SNAPSHOT avant toute mutation
            const snap=[...stocks.rows];
            // Vérifier disponibilité D'ABORD
            for(const it of newItemsSave){
              if(!it.ref||!it.qty)continue;
              const ancQty=ancItems.find(a=>normRef(a.ref)===normRef(it.ref))?.qty||0;
              const sN=snap.find(x=>normRef(x.ref)===normRef(it.ref));
              const dispoApresRemise=(sN?Number(sN.qty):0)+Number(ancQty);
              if(dispoApresRemise<Number(it.qty)){
                setErrM(`Stock insuffisant pour "${it.ref}" : ${dispoApresRemise} disponible, ${it.qty} demandé`);
                setSavingM(false);return;
              }
            }
            // Remettre les anciennes pièces (lecture depuis snap)
            for(const it of ancItems){
              if(!it.ref||!it.qty)continue;
              await updateStockQty(stocks,snap,it.ref,+it.qty,{type:"correction",label:`Annulation mission : ${missionForm.description}`});
            }
            // Snapshot mis à jour manuellement pour les déductions
            const snap2=snap.map(s=>ancItems.find(a=>normRef(a.ref)===normRef(s.ref))?{...s,qty:Number(s.qty)+(ancItems.find(a=>normRef(a.ref)===normRef(s.ref))?.qty||0)}:s);
            // Déduire les nouvelles pièces (lecture depuis snap2)
            for(const it of newItemsSave){
              if(!it.ref||!it.qty)continue;
              await updateStockQty(stocks,snap2,it.ref,-it.qty,{type:"prestation",label:missionForm.description,projet:missionForm.projet});
            }
          }
        }
        await missions.update(missionEditing,item);
      } else {
        await missions.add(item);
      }
      // Sync événement calendrier — création ET modification
      if(events&&missionForm.dateDebut){
        const evExistant=events.rows.find(e=>
          e.type==="prestation"&&e.title===missionForm.description
        );
        const evData={
          title:missionForm.description,
          date:missionForm.dateDebut,
          heure:"",
          type:"prestation",
          projet:missionForm.projet||"",
          note:missionForm.prestataire?`Prestataire : ${missionForm.prestataire}`:"",
          dateFin:missionForm.dateFin||"",
        };
        if(evExistant){
          // Mettre à jour l'événement existant avec les nouvelles dates
          await events.update(evExistant.id,{...evExistant,...evData});
        } else {
          await events.add(evData);
        }
      }
      setMissionOpen(false);setMissionEditing(null);
    }catch(e){setErrM(e.message);}setSavingM(false);
  }

  async function terminerMission(m){
    if(!confirm(`Marquer la prestation "${m.description}" comme terminée ?`))return;
    // Ouvrir le modal de création stock (même logique que missions atelier/chantier)
    setStockModalPrest({mission:m, stockForm:{
      ref:m.description,
      qty:1,
      unit:"pcs",
      cat:"Autre",
      prix:0,
      loc:"",
      origine:`Fabriqué par ${m.prestataire||"prestataire"}`,
    }});
  }

  async function confirmerTerminaisonPrest(m, creerStock, sf, dejaTermine){
    setSavingStockPrest(true);
    try{
      const stockItems=getMissionStockItems(m);
      // SNAPSHOT avant toute mutation
      const snap=[...stocks.rows];
      if(!dejaTermine){
        // Vérifier disponibilité avec snapshot
        for(const it of stockItems){
          if(!it.ref||!it.qty)continue;
          const chk=checkStockDispo(snap,it.ref,it.qty);
          if(!chk.ok){alert(chk.msg);setSavingStockPrest(false);setStockModalPrest(null);return;}
        }
      }
      // Créer/mettre à jour l'article stock produit
      if(creerStock&&sf&&sf.ref){
        const existe=snap.find(s=>normRef(s.ref)===normRef(sf.ref));
        if(existe){
          await stocks.update(existe.id,{...existe,qty:Number(existe.qty)+(+sf.qty||1),origine:sf.origine||existe.origine||""});
        } else {
          await stocks.add({ref:sf.ref,cat:sf.cat||"Autre",qty:+sf.qty||1,min:+sf.min||0,unit:sf.unit||"pcs",prix:+sf.prix||0,loc:sf.loc||"",fourn:sf.fourn||"",note:sf.note||"",tags:sf.tags||"",origine:sf.origine||"",prixRevient:+sf.prixRevient||0,projet:sf.projet||"",historique:JSON.stringify([{date:TODAY,type:"prestation",label:`Produit par prestation : ${m.description}`,projet:m.projet||"",prestataire:m.prestataire||"",qty:+sf.qty||1,qtyApres:+sf.qty||1}])});
        }
      }
      if(!dejaTermine){
        // Déduire les pièces consommées depuis snapshot
        for(const it of stockItems){
          if(!it.ref||!it.qty)continue;
          await updateStockQty(stocks,snap,it.ref,-Number(it.qty),{type:"prestation",label:m.description,projet:m.projet||"",prestataire:m.prestataire||""});
        }
        if(m.projet&&m.prix>0){
          const p=projects.rows.find(x=>x.name===m.projet);
          if(p){await projects.update(p.id,{...p,depense:(Number(p.depense)||0)+Number(m.prix)});}
        }
        await missions.update(m.id,{...m,statut:"terminé"});
      }
    }catch(e){alert("Erreur : "+e.message);}
    setSavingStockPrest(false);setStockModalPrest(null);
  }

  const statutBadgePrest=(s)=>({
    "planifié":{bg:"#F2F0ED",tx:"#3A3A3A"},
    "en cours":{bg:"#FFF0F0",tx:"#CC2222"},
    "terminé":{bg:"#F0FFF0",tx:"#2A7A2A"},
  }[s]||{bg:"#F2F0ED",tx:"#3A3A3A"});

  const missionPanel=missionOpen&&<SidePanel title={missionEditing?"Modifier la prestation":"Nouvelle prestation"} onClose={()=>{setMissionOpen(false);setMissionEditing(null);}}>
    <FG label="Description *"><Inp value={missionForm.description} onChange={e=>fm("description",e.target.value)} placeholder="Ex: Pose membranes ETFE"/></FG>
    <FG label="Prestataire"><Sel value={missionForm.prestataire} onChange={e=>fm("prestataire",e.target.value)}>
      <option value="">— Aucun —</option>{sheet.rows.map(p=><option key={p.id}>{p.nom}</option>)}
    </Sel></FG>
    <FG label="Projet"><Sel value={missionForm.projet} onChange={e=>fm("projet",e.target.value)}>
      <option value="">— Aucun —</option>{projects.rows.map(p=><option key={p.id}>{p.name}</option>)}
    </Sel></FG>
    <FG label="Date début"><Inp type="date" value={missionForm.dateDebut} onChange={e=>fm("dateDebut",e.target.value)}/></FG>
    <FG label="Date fin prévue"><Inp type="date" value={missionForm.dateFin} onChange={e=>fm("dateFin",e.target.value)}/></FG>
    <FG label="Prix de la prestation (€)"><Inp type="number" value={missionForm.prix} onChange={e=>fm("prix",e.target.value)} placeholder="0.00"/></FG>
    <FG label="Pièces stock utilisées">
      {(()=>{
        let items=[];
        try{items=missionForm.stockItems?JSON.parse(missionForm.stockItems):(missionForm.stockRef?[{ref:missionForm.stockRef,qty:+missionForm.stockQty||1}]:[]);}catch(e){}
        const setItems=arr=>fm("stockItems",JSON.stringify(arr)); // ne pas filtrer pendant édition
        return(<>
          {items.map((it,i)=>(
            <div key={i} style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}>
              <Sel value={it.ref} onChange={e=>{const a=[...items];a[i]={...a[i],ref:e.target.value};setItems(a);}}>
                <option value="">— Choisir —</option>
                {(missionEditing&&missionForm.statut==="terminé"?stocks.rows:stocks.rows.filter(s=>Number(s.qty)>0)).map(s=><option key={s.id} value={s.ref}>{s.ref} ({s.qty} {s.unit})</option>)}
              </Sel>
              <Inp type="number" value={it.qty} onChange={e=>{const a=[...items];a[i]={...a[i],qty:+e.target.value||1};setItems(a);}} placeholder="Qté" style={{width:70,flexShrink:0}}/>
              <button onClick={()=>setItems(items.filter((_,j)=>j!==i))} style={{background:"none",border:"none",cursor:"pointer",color:"#CC2222",fontSize:14,flexShrink:0}}>✕</button>
            </div>
          ))}
          <button onClick={()=>setItems([...items,{ref:"",qty:1}])} style={{width:"100%",padding:"6px",borderRadius:4,border:"1px dashed #CC2222",background:"#FFF0F0",cursor:"pointer",fontSize:12,color:"#CC2222",fontFamily:"'DM Sans',sans-serif"}}>+ Ajouter une pièce</button>
        </>);
      })()}
    </FG>
    <FG label="Statut"><Sel value={missionForm.statut} onChange={e=>fm("statut",e.target.value)}>
      <option value="planifié">Planifié</option><option value="en cours">En cours</option><option value="terminé">Terminé</option>
    </Sel></FG>
    <FG label="Tags"><TagSelector tags={missionForm.tags||""} onChange={v=>fm("tags",v)} projetNom={missionForm.projet} projects={projects}/></FG>
    <ErrMsg msg={errM}/><PanelBtns onCancel={()=>{setMissionOpen(false);setMissionEditing(null);}} onSave={saveMission} saving={savingM} saveLabel={missionEditing?"Mettre à jour":"Créer"}/>
  </SidePanel>;

  const prestPanel=open&&<SidePanel title={editing?"Modifier le prestataire":"Nouveau prestataire"} onClose={()=>{setOpen(false);setEditing(null);}}>
    <FG label="Nom / société *"><Inp value={form.nom} onChange={e=>f("nom",e.target.value)} placeholder="Ex: Cordiste Pro SARL"/></FG>
    <FG label="Spécialité"><Inp value={form.specialite} onChange={e=>f("specialite",e.target.value)} placeholder="Ex: Cordiste, étanchéité..."/></FG>
    <FG label="Contact"><Inp value={form.contact} onChange={e=>f("contact",e.target.value)} placeholder="email@..."/></FG>
    <FG label="Téléphone"><Inp value={form.tel||""} onChange={e=>f("tel",e.target.value)}/></FG>
    <FG label="Note"><Inp value={form.note||""} onChange={e=>f("note",e.target.value)} placeholder="Optionnel"/></FG>
    <ErrMsg msg={err}/><PanelBtns onCancel={()=>{setOpen(false);setEditing(null);}} onSave={save} saving={saving} saveLabel={editing?"Mettre à jour":"Ajouter"}/>
  </SidePanel>;

  const activePanel=missionOpen?missionPanel:prestPanel;
  const mActives=missions.rows.filter(m=>m.statut!=="terminé").filter(m=>{
    if(filterProjet&&m.projet!==filterProjet)return false;
    if(filterTag){const t=(m.tags||"").split(",").map(x=>x.trim());if(!t.includes(filterTag))return false;}
    return true;
  });
  const mTerminees=missions.rows.filter(m=>m.statut==="terminé").sort((a,b)=>toISO(b.dateFin||b.dateDebut||"").localeCompare(toISO(a.dateFin||a.dateDebut||"")));

  // ── Finances globales prestations — filtrées si projet actif ──
  const missionsFin=filterProjet?missions.rows.filter(m=>normRef(m.projet)===normRef(filterProjet)):missions.rows;
  const totalPrest=missionsFin.reduce((s,m)=>s+Number(m.prix||0),0);
  const parPrest=sheet.rows.map(p=>{
    const pmiss=missionsFin.filter(m=>normRef(m.prestataire)===normRef(p.nom));
    const total=pmiss.reduce((s,m)=>s+Number(m.prix||0),0);
    const nb=pmiss.length;
    const pct=totalPrest>0&&total>0?Math.round(total/totalPrest*100):0;
    return{...p,total,nb,pct};
  }).filter(x=>x.nb>0).sort((a,b)=>b.total-a.total);

  // ── Vue détail prestataire ──
  if(detail){
    const p=sheet.rows.find(x=>Number(x.id)===Number(detail));
    if(!p){setDetail(null);return null;}
    const pmissions=missions.rows.filter(m=>normRef(m.prestataire)===normRef(p.nom)).sort((a,b)=>toISO(b.dateDebut||"").localeCompare(toISO(a.dateDebut||"")));
    const totalD=pmissions.reduce((s,m)=>s+Number(m.prix||0),0);
    const terminees=pmissions.filter(m=>m.statut==="terminé");
    const actives=pmissions.filter(m=>m.statut!=="terminé");
    const sb=s=>statutBadgePrest(s);
    return(
      <WithPanel panel={activePanel}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap"}}>
          <button onClick={()=>setDetail(null)} style={{background:"none",border:"1px solid #DDDDDD",borderRadius:4,cursor:"pointer",fontSize:12,padding:"4px 10px",color:"#3A3A3A",fontFamily:"'DM Sans',sans-serif"}}>← Retour</button>
          <div style={{fontSize:16,fontWeight:700,color:"#1C1C1C",flex:1}}>{p.nom}</div>
          {p.specialite&&<span style={{fontSize:12,color:"#7A7A7A"}}>{p.specialite}</span>}
          {p.tel&&<span style={{fontSize:12,color:"#7A7A7A",fontFamily:"'DM Mono',monospace"}}>{p.tel}</span>}
          {p.contact&&<span style={{fontSize:12,color:"#7A7A7A"}}>{p.contact}</span>}
          <Btn onClick={()=>{setMissionOpen(false);setEditing(p.id);setForm({...p});setErr("");setOpen(true);}}>Modifier</Btn>
        </div>

        {/* Note prestataire */}
        {p.note&&<div style={{background:"#F9F9F9",border:"0.5px solid #EEEEEE",borderLeft:"3px solid #DDDDDD",borderRadius:6,padding:"10px 14px",marginBottom:14,fontSize:12,color:"#3A3A3A",lineHeight:1.6,fontStyle:"italic"}}>{p.note}</div>}

        {/* KPIs */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}}>
          {[
            {lbl:"Total dépensé",val:totalD>0?totalD.toLocaleString("fr-FR")+" €":"—",color:"#CC2222",bold:true},
            {lbl:"Prestations",val:pmissions.length},
            {lbl:"Terminées",val:terminees.length},
          ].map((m,i)=>(
            <div key={i} style={{background:"#fff",border:"0.5px solid #DDDDDD",borderRadius:8,padding:"10px 14px"}}>
              <div style={{fontSize:11,color:"#7A7A7A",marginBottom:3}}>{m.lbl}</div>
              <div style={{fontSize:16,fontWeight:m.bold?700:600,color:m.color||"#1C1C1C"}}>{m.val}</div>
            </div>
          ))}
        </div>

        {/* Prestations actives */}
        {actives.length>0&&<Bd style={{marginBottom:12}}>
          <SecTitle>Prestations en cours ({actives.length})</SecTitle>
          {actives.map(m=>{const s=sb(m.statut);return(
            <div key={m.id} style={{display:"flex",gap:8,padding:"8px 0",borderBottom:"0.5px solid #EEEEEE",alignItems:"center"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:500,color:"#1C1C1C"}}>{m.description}</div>
                <div style={{fontSize:11,color:"#7A7A7A"}}>{m.projet}{m.dateDebut&&` · ${fmt(m.dateDebut)}${m.dateFin?` → ${fmt(m.dateFin)}`:""}`}</div>
                {getMissionStockItems(m).length>0&&<div style={{fontSize:10,color:"#7A7A7A",marginTop:2}}>🔩 {getMissionStockItems(m).map(it=>`${it.ref} ×${it.qty}`).join(" · ")}</div>}
              </div>
              {m.prix>0&&<span style={{fontSize:12,fontWeight:700,color:"#CC2222"}}>{Number(m.prix).toLocaleString("fr-FR")} €</span>}
              <Badge label={m.statut} bg={s.bg} color={s.tx}/>
            </div>
          );})}
        </Bd>}

        {/* Historique */}
        {terminees.length>0&&<Bd>
          <SecTitle>Historique — {terminees.length} prestation{terminees.length>1?"s":""} terminée{terminees.length>1?"s":""}</SecTitle>
          {(showAllTerminees?terminees:terminees.slice(0,5)).map(m=>(
            <div key={m.id} style={{display:"flex",gap:8,padding:"8px 0",borderBottom:"0.5px solid #EEEEEE",alignItems:"center"}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,color:"#3A3A3A"}}>{m.description}</div>
                <div style={{fontSize:11,color:"#7A7A7A"}}>{m.projet}{m.dateFin&&` · ${fmt(m.dateFin)}`}</div>
                {getMissionStockItems(m).length>0&&<div style={{fontSize:10,color:"#7A7A7A",marginTop:2}}>🔩 {getMissionStockItems(m).map(it=>`${it.ref} ×${it.qty}`).join(" · ")}</div>}
              </div>
              {m.prix>0&&<span style={{fontSize:12,fontWeight:700,color:"#2A7A2A"}}>{Number(m.prix).toLocaleString("fr-FR")} €</span>}
              <Badge label="Terminé" bg="#F0FFF0" color="#2A7A2A"/>
            </div>
          ))}
          {!showAllTerminees&&terminees.length>5&&(
            <div onClick={()=>setShowAllTerminees(true)} style={{textAlign:"center",padding:"8px 0",fontSize:12,color:"#1A5DAB",cursor:"pointer",borderTop:"0.5px solid #EEEEEE",marginTop:4}}>
              ↓ Voir les {terminees.length-5} autres ({terminees.length} au total)
            </div>
          )}
          {showAllTerminees&&terminees.length>5&&(
            <div onClick={()=>setShowAllTerminees(false)} style={{textAlign:"center",padding:"8px 0",fontSize:12,color:"#7A7A7A",cursor:"pointer",borderTop:"0.5px solid #EEEEEE",marginTop:4}}>
              ↑ Réduire
            </div>
          )}
          <div style={{display:"flex",justifyContent:"flex-end",marginTop:8,paddingTop:8,borderTop:"1px solid #EEEEEE"}}>
            <span style={{fontSize:13,fontWeight:700,color:"#1C1C1C"}}>Total : {totalD.toLocaleString("fr-FR")} €</span>
          </div>
        </Bd>}
      </WithPanel>
    );
  }

  return <WithPanel panel={activePanel}>
    {/* Modal partage prestataire */}
    {stockModalPrest&&<ModalStockTerminaison
      mission={stockModalPrest.mission}
      moduleType="prestation"
      onCancel={()=>setStockModalPrest(null)}
      onConfirm={(creer,sf)=>confirmerTerminaisonPrest(stockModalPrest.mission,creer,sf,stockModalPrest.dejaTermine)}
      saving={savingStockPrest}
      stocks={stocks}
      projects={projects}
      fournisseurs={fournisseurs||{rows:[]}}
    />}
    {partageId&&(()=>{const px=sheet.rows.find(x=>x.id===partageId);return px&&(
      <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.4)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget){setPartageId(null);setCopied(false);}}}>
        <div style={{background:"#fff",borderRadius:12,padding:24,width:400,maxWidth:"90vw",boxShadow:"0 8px 32px rgba(0,0,0,0.18)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontSize:14,fontWeight:700,color:"#1C1C1C"}}>Partager le contact</div>
            <button onClick={()=>{setPartageId(null);setCopied(false);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:16,color:"#7A7A7A"}}>✕</button>
          </div>
          <pre style={{background:"#F9F9F9",border:"1px solid #EEEEEE",borderRadius:8,padding:14,fontSize:12,fontFamily:"'DM Mono',monospace",whiteSpace:"pre-wrap",marginBottom:14,color:"#1C1C1C",lineHeight:1.7}}>{textPartagePrest(px)}</pre>
          <button onClick={()=>{navigator.clipboard.writeText(textPartagePrest(px));setCopied(true);setTimeout(()=>setCopied(false),2000);}}
            style={{width:"100%",padding:"9px",borderRadius:6,border:"none",background:copied?"#2A7A2A":"#CC2222",cursor:"pointer",fontSize:13,fontFamily:"'DM Sans',sans-serif",color:"#fff",fontWeight:700}}>
            {copied?"✓ Copié !":"📋 Copier le contact"}
          </button>
        </div>
      </div>
    );})()}
    <FiltreProjetTag projects={projects} filterProjet={filterProjet} setFilterProjet={setFilterProjet} filterTag={filterTag} setFilterTag={setFilterTag}/>
    {/* ── Bloc finances global ── */}
    {parPrest.length>0&&<Bd style={{marginBottom:14}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <SecTitle>Finances prestations</SecTitle>
        <span style={{fontSize:14,fontWeight:700,color:"#CC2222"}}>{totalPrest.toLocaleString("fr-FR")} € total</span>
      </div>
      {parPrest.map((p,i)=>(
        <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:"0.5px solid #EEEEEE"}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
              <span style={{fontSize:12,fontWeight:500,color:"#1C1C1C"}}>{p.nom}</span>
              <span style={{fontSize:11,color:"#7A7A7A"}}>{p.total.toLocaleString("fr-FR")} € · {p.pct}%</span>
            </div>
            <div style={{height:4,borderRadius:2,background:"#EEEEEE",overflow:"hidden"}}>
              <div style={{height:"100%",width:p.pct+"%",background:i===0?"#CC2222":i===1?"#CC8800":"#3A3A3A",borderRadius:2}}/>
            </div>
          </div>
          <span style={{fontSize:11,color:"#7A7A7A",whiteSpace:"nowrap"}}>{p.nb} prest.</span>
        </div>
      ))}
    </Bd>}

    {/* Prestations */}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div style={{fontSize:15,fontWeight:700,color:"#1C1C1C",borderLeft:"3px solid #CC2222",paddingLeft:8}}>Prestations ({mActives.length} actives)</div>
      <Btn primary onClick={()=>{setMissionEditing(null);setMissionForm(EPREST_MISSION);setErrM("");setOpen(false);setMissionOpen(true);}}>+ Nouvelle prestation</Btn>
    </div>

    {!mActives.length&&<Bd style={{textAlign:"center",padding:20,color:"#7A7A7A",fontSize:13,marginBottom:12}}>Aucune prestation en cours.</Bd>}
    {mActives.map(m=>{const sb2=statutBadgePrest(m.statut);return(
      <Bd key={m.id} style={{marginBottom:8}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
          <div>
            <div style={{fontSize:13,fontWeight:700,color:"#1C1C1C"}}>{m.description}</div>
            <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginTop:3}}>
              {m.prestataire&&<span style={{background:"#F2F0ED",color:"#3A3A3A",fontSize:11,fontWeight:600,padding:"1px 7px",borderRadius:4}}>{m.prestataire}</span>}
              {m.projet&&<span style={{background:"#EBF3FF",color:"#1A5DAB",fontSize:11,padding:"1px 7px",borderRadius:4}}>{m.projet}</span>}
            </div>
            <div style={{fontSize:12,color:"#7A7A7A",marginTop:3}}>{m.dateDebut&&`Du ${fmt(m.dateDebut)}`}{m.dateFin&&` au ${fmt(m.dateFin)}`}</div>
            {getMissionStockItems(m).length>0&&<div style={{fontSize:11,color:"#7A7A7A"}}>Pièces : {getMissionStockItems(m).map(it=>`${it.ref} ×${it.qty}`).join(", ")}</div>}
          </div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <Badge label={m.statut} bg={sb2.bg} color={sb2.tx}/>
            {m.prix>0&&<span style={{fontSize:13,fontWeight:700,color:"#CC2222"}}>{Number(m.prix).toLocaleString("fr-FR")} €</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:6}}>
          <Btn small onClick={()=>{setMissionEditing(m.id);setMissionForm({...m,prix:String(m.prix),stockQty:String(m.stockQty)});setErrM("");setOpen(false);setMissionOpen(true);}}>Modifier</Btn>
          {m.statut!=="terminé"&&<Btn small primary onClick={()=>terminerMission(m)}>Marquer terminé</Btn>}
          <Btn small danger onClick={()=>missions.remove(m.id)}>Suppr.</Btn>
        </div>
      </Bd>
    );})}

    {/* Historique prestations */}
    {mTerminees.length>0&&<>
      <div style={{fontSize:13,fontWeight:700,color:"#7A7A7A",borderLeft:"3px solid #DDDDDD",paddingLeft:8,margin:"16px 0 10px"}}>Historique — prestations terminées ({mTerminees.length})</div>
      {(showAllMTerminees?mTerminees:mTerminees.slice(0,5)).map(m=>(
        <Bd key={m.id} style={{marginBottom:6,opacity:.85}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
            <div style={{flex:1}}>
              <div style={{fontSize:13,color:"#3A3A3A",fontWeight:500}}>{m.description}</div>
              <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap",marginTop:3}}>
                {m.prestataire&&<span style={{background:"#F2F0ED",color:"#3A3A3A",fontSize:11,fontWeight:600,padding:"1px 7px",borderRadius:4}}>{m.prestataire}</span>}
                {m.projet&&<span style={{background:"#EBF3FF",color:"#1A5DAB",fontSize:11,padding:"1px 7px",borderRadius:4}}>{m.projet}</span>}
                {m.dateFin&&<span style={{fontSize:11,color:"#7A7A7A"}}>{fmt(m.dateFin)}</span>}
              </div>
              {getMissionStockItems(m).length>0&&<div style={{fontSize:10,color:"#7A7A7A",marginTop:3}}>🔩 {getMissionStockItems(m).map(it=>`${it.ref} ×${it.qty}`).join(" · ")}</div>}
            </div>
            {m.prix>0&&<span style={{fontSize:12,fontWeight:700,color:"#2A7A2A"}}>{Number(m.prix).toLocaleString("fr-FR")} €</span>}
            <Badge label="Terminé" bg="#F0FFF0" color="#2A7A2A"/>
          </div>
          <div style={{display:"flex",gap:6}}>
            <Btn small onClick={()=>{setMissionEditing(m.id);setMissionForm({...m,prix:String(m.prix),stockQty:String(m.stockQty)});setErrM("");setOpen(false);setMissionOpen(true);}}>Modifier</Btn>
            <Btn small onClick={()=>setStockModalPrest({mission:m,dejaTermine:true,stockForm:{ref:m.description,qty:1,unit:"pcs",cat:"Autre",prix:0,loc:"",origine:`Fabriqué par ${m.prestataire||"prestataire"}`}})}>📦</Btn>
            <Btn small danger onClick={()=>missions.remove(m.id)}>Suppr.</Btn>
          </div>
        </Bd>
      ))}
      {!showAllMTerminees&&mTerminees.length>5&&(
        <div onClick={()=>setShowAllMTerminees(true)} style={{textAlign:"center",padding:"8px 0",fontSize:12,color:"#1A5DAB",cursor:"pointer",borderTop:"0.5px solid #EEEEEE",marginTop:4}}>
          ↓ Voir les {mTerminees.length-5} autres ({mTerminees.length} au total)
        </div>
      )}
      {showAllMTerminees&&mTerminees.length>5&&(
        <div onClick={()=>setShowAllMTerminees(false)} style={{textAlign:"center",padding:"8px 0",fontSize:12,color:"#7A7A7A",cursor:"pointer",borderTop:"0.5px solid #EEEEEE",marginTop:4}}>
          ↑ Réduire
        </div>
      )}
    </>}

    {/* Liste prestataires — cliquables */}
    <div style={{marginTop:20}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:700,color:"#1C1C1C",borderLeft:"3px solid #CC2222",paddingLeft:8}}>Prestataires ({sheet.rows.length})</div>
        <Btn small onClick={()=>{setMissionOpen(false);setEditing(null);setForm(EPREST);setErr("");setOpen(true);}}>+ Ajouter</Btn>
      </div>
      {!sheet.rows.length&&<Bd style={{textAlign:"center",padding:16,color:"#7A7A7A",fontSize:13}}>Aucun prestataire enregistré.</Bd>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {sheet.rows.map(p=>{
          const tot=missions.rows.filter(m=>m.prestataire===p.nom).reduce((s,m)=>s+Number(m.prix||0),0);
          const nb=missions.rows.filter(m=>m.prestataire===p.nom).length;
          return(
            <div key={p.id} onClick={()=>setDetail(p.id)}
              style={{background:"#fff",border:"0.5px solid #DDDDDD",borderRadius:10,padding:12,cursor:"pointer",transition:"box-shadow .15s"}}
              onMouseEnter={e=>e.currentTarget.style.boxShadow="0 2px 8px rgba(0,0,0,0.08)"}
              onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:"#1C1C1C"}}>{p.nom}</div>
                  {p.specialite&&<div style={{fontSize:11,color:"#7A7A7A"}}>{p.specialite}</div>}
                  {p.contact&&<div style={{fontSize:11,color:"#7A7A7A"}}>{p.contact}</div>}
                </div>
                <div style={{display:"flex",gap:4,alignSelf:"flex-start"}} onClick={e=>e.stopPropagation()}>
                  <button onClick={e=>{e.stopPropagation();setPartageId(p.id);setCopied(false);}} style={{background:"none",border:"1px solid #1A5DAB",borderRadius:4,cursor:"pointer",fontSize:11,padding:"2px 6px",color:"#1A5DAB",fontFamily:"'DM Sans',sans-serif"}}>↗</button>
                  <button onClick={e=>{e.stopPropagation();setMissionOpen(false);setEditing(p.id);setForm({...p});setErr("");setOpen(true);}} style={{background:"none",border:"1px solid #DDDDDD",borderRadius:4,cursor:"pointer",fontSize:11,padding:"2px 6px",color:"#3A3A3A",fontFamily:"'DM Sans',sans-serif"}}>Mod.</button>
                  <button onClick={e=>{e.stopPropagation();sheet.remove(p.id);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#7A7A7A"}}>✕</button>
                </div>
              </div>
              {nb>0&&<div style={{fontSize:11,color:"#7A7A7A",marginTop:4}}>{nb} prestation{nb>1?"s":""}{tot>0&&` · ${tot.toLocaleString("fr-FR")} €`}</div>}
              <div style={{fontSize:10,color:"#CC2222",marginTop:4,fontWeight:500}}>→ Voir le détail</div>
            </div>
          );
        })}
      </div>
    </div>
  </WithPanel>;
}

// ══ ATELIER / CHANTIER (module générique) ══
// Composant modal pour créer un article stock à la terminaison d'une mission
function ModalStockTerminaison({mission,moduleType,onCancel,onConfirm,saving,stocks,projects,fournisseurs}){
  // Calcul du coût de revient automatique
  const coutMatieres=(getMissionStockItems(mission)||[]).reduce((sum,it)=>{
    const s=(stocks?.rows||[]).find(x=>normRef(x.ref)===normRef(it.ref));
    return sum+(Number(s?.prix)||0)*Number(it.qty||0);
  },0);
  const coutMO=Number(mission.prix)||0;

  const [creer,setCreer]=useState(true);
  const [sf,setSf]=useState({
    ref:mission.description,
    qty:1,
    unit:"pcs",
    cat:moduleType==="atelier"?"Consommables atelier":moduleType==="chantier"?"Autre":"Autre",
    prix:0,
    min:0,
    loc:moduleType==="atelier"?"Atelier":"",
    origine:moduleType==="atelier"?"Fabriqué à l'atelier":moduleType==="chantier"?"Fabriqué en chantier":`Fabriqué par ${mission.prestataire||"prestataire"}`,
    prixRevient:0,
    fourn:"",
    note:"",
    projet:mission.projet||"",
    tags:"",
  });
  const fSf=(k,v)=>setSf(x=>({...x,[k]:v}));

  const coutTotal=coutMatieres+coutMO;
  const prixRevientAuto=sf.qty>0?Math.round((coutTotal/sf.qty)*100)/100:0;

  return(
    <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.5)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",borderRadius:12,padding:24,width:460,maxWidth:"94vw",maxHeight:"90vh",overflow:"auto",boxShadow:"0 8px 32px rgba(0,0,0,0.2)"}}>
        <div style={{fontSize:14,fontWeight:700,color:"#1C1C1C",marginBottom:4}}>Mission terminée ✓</div>
        <div style={{fontSize:12,color:"#7A7A7A",marginBottom:12}}>"{mission.description}"</div>

        {/* Récap coût de revient */}
        {coutTotal>0&&<div style={{background:"#F9F9F9",border:"0.5px solid #EEEEEE",borderRadius:8,padding:"10px 12px",marginBottom:14,fontSize:12}}>
          <div style={{fontWeight:700,color:"#1C1C1C",marginBottom:6}}>Coût de revient calculé</div>
          {coutMatieres>0&&<div style={{display:"flex",justifyContent:"space-between",color:"#3A3A3A",marginBottom:2}}>
            <span>Matières utilisées</span><span style={{fontFamily:"'DM Mono',monospace"}}>{coutMatieres.toLocaleString("fr-FR")} €</span>
          </div>}
          {coutMO>0&&<div style={{display:"flex",justifyContent:"space-between",color:"#3A3A3A",marginBottom:2}}>
            <span>Main d'œuvre / prestation</span><span style={{fontFamily:"'DM Mono',monospace"}}>{coutMO.toLocaleString("fr-FR")} €</span>
          </div>}
          <div style={{display:"flex",justifyContent:"space-between",fontWeight:700,color:"#CC2222",borderTop:"0.5px solid #DDDDDD",paddingTop:6,marginTop:4}}>
            <span>Total</span><span style={{fontFamily:"'DM Mono',monospace"}}>{coutTotal.toLocaleString("fr-FR")} €</span>
          </div>
          {sf.qty>0&&<div style={{fontSize:11,color:"#7A7A7A",marginTop:4}}>→ {prixRevientAuto.toLocaleString("fr-FR")} € / {sf.unit} ({sf.qty} {sf.unit} produit{sf.qty>1?"s":""})</div>}
        </div>}

        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:creer?14:0,padding:"10px 12px",background:"#F9F9F9",borderRadius:6,cursor:"pointer"}} onClick={()=>setCreer(v=>!v)}>
          <input type="checkbox" checked={creer} onChange={()=>{}} style={{accentColor:"#CC2222",cursor:"pointer"}}/>
          <span style={{fontSize:13,fontWeight:600,color:"#1C1C1C"}}>Créer / mettre à jour un article dans le stock</span>
        </div>
        {creer&&<div style={{marginTop:10}}>
          <FG label="Désignation (ref stock)"><Inp value={sf.ref} onChange={e=>fSf("ref",e.target.value)}/></FG>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <FG label="Quantité produite"><Inp type="number" value={sf.qty} onChange={e=>fSf("qty",+e.target.value||1)} placeholder="1"/></FG>
            <FG label="Unité"><Sel value={sf.unit} onChange={e=>fSf("unit",e.target.value)}>{UNITS.map(u=><option key={u}>{u}</option>)}</Sel></FG>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <FG label="Seuil d'alerte"><Inp type="number" value={sf.min} onChange={e=>fSf("min",+e.target.value||0)} placeholder="0"/></FG>
            <FG label="Catégorie"><Sel value={sf.cat} onChange={e=>fSf("cat",e.target.value)}><option value="">— Choisir —</option>{CATS.map(c=><option key={c}>{c}</option>)}</Sel></FG>
          </div>
          <FG label="Prix de vente (€)"><Inp type="number" value={sf.prix} onChange={e=>fSf("prix",+e.target.value||0)} placeholder="0"/></FG>
          <FG label={`Coût de revient / unité (€)${coutTotal>0?" · calculé automatiquement":""}`}>
            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <Inp type="number" value={sf.prixRevient!==undefined?sf.prixRevient:prixRevientAuto} onChange={e=>fSf("prixRevient",+e.target.value||0)} placeholder={String(prixRevientAuto)} style={{flex:1}}/>
              {coutTotal>0&&<button onClick={()=>fSf("prixRevient",prixRevientAuto)} style={{padding:"6px 10px",borderRadius:4,border:"1px solid #DDDDDD",background:"#F9F9F9",cursor:"pointer",fontSize:11,color:"#3A3A3A",fontFamily:"'DM Sans',sans-serif",flexShrink:0,whiteSpace:"nowrap"}}>⟳ Recalc.</button>}
            </div>
            <div style={{fontSize:10,color:"#7A7A7A",marginTop:3}}>Informatif uniquement — non comptabilisé dans les finances</div>
          </FG>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <FG label="Emplacement"><Inp value={sf.loc} onChange={e=>fSf("loc",e.target.value)} placeholder="Ex: Rack A1"/></FG>
            <FG label="Projet lié"><Sel value={sf.projet||""} onChange={e=>fSf("projet",e.target.value)}>
              <option value="">— Aucun —</option>
              {(projects?.rows||[]).map(p=><option key={p.id} value={p.name}>{p.name}</option>)}
            </Sel></FG>
          </div>
          <FG label="Tags"><Inp value={sf.tags||""} onChange={e=>fSf("tags",e.target.value)} placeholder="Ex: Complexe Enveloppe (tags du projet auto-suggérés)"/>
            {(()=>{const p=(projects?.rows||[]).find(x=>x.name===sf.projet);const pt=(p?.tags||"").split(",").map(t=>t.trim()).filter(Boolean);return pt.length>0&&sf.tags===sf.tags&&<div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:4}}>{pt.map((t,i)=><span key={i} onClick={()=>fSf("tags",sf.tags?sf.tags+","+t:t)} style={{fontSize:10,background:"#EBF3FF",color:"#1A5DAB",padding:"2px 6px",borderRadius:10,cursor:"pointer"}}>+ {t}</span>)}</div>;})()}
          </FG>
          <FG label="Origine"><Inp value={sf.origine||""} onChange={e=>fSf("origine",e.target.value)}/></FG>
          <FG label="Note"><Inp value={sf.note||""} onChange={e=>fSf("note",e.target.value)} placeholder="Optionnel"/></FG>
        </div>}
        <div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}}>
          <button onClick={onCancel} style={{padding:"8px 16px",borderRadius:4,border:"1px solid #DDDDDD",background:"#fff",cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif",color:"#3A3A3A"}}>Annuler</button>
          <button onClick={()=>onConfirm(creer,{...sf,prixRevient:sf.prixRevient!==undefined?sf.prixRevient:prixRevientAuto})} disabled={saving} style={{padding:"8px 20px",borderRadius:4,border:"none",background:"#2A7A2A",cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif",color:"#fff",fontWeight:700}}>
            {saving?"...":"✓ Terminer la mission"}
          </button>
        </div>
      </div>
    </div>
  );
}

const EMISSION={type:"",projet:"",description:"",membres:[],stockRef:"",stockQty:"",dateDebut:"",dateFin:"",statut:"planifié",note:"",tags:"",stockItems:""};

// Parse les dépendances stockées en JSON dans le champ note
function parseDeps(note){
  if(!note)return{deps:[],noteTexte:""};
  try{const o=JSON.parse(note);if(o&&o.deps)return o;}catch(e){}
  return{deps:[],noteTexte:note};
}
function serializeDeps(deps,noteTexte){
  if(!deps||!deps.length)return noteTexte||"";
  return JSON.stringify({deps,noteTexte:noteTexte||""});
}

function MissionModule({moduleType,sheet,projects,team,stocks,events,orders,fournisseurs}){
  const [filterProjet,setFilterProjet]=useState("");
  const [filterTag,setFilterTag]=useState("");
  const [showAllTerminees,setShowAllTerminees]=useState(false);
  const label=moduleType==="atelier"?"Atelier":"Chantier";
  const [open,setOpen]=useState(false);
  const [form,setForm]=useState({...EMISSION,type:moduleType});
  const [stockModal,setStockModal]=useState(null); // {mission, stockForm} pour la création stock
  const [savingStock,setSavingStock]=useState(false);
  const [editing,setEditing]=useState(null);
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");
  const [vue,setVue]=useState("liste");
  // Dépendances chantier dans le panel
  const [deps,setDeps]=useState([]); // [{type:"stock"|"commande"|"atelier",ref,qty,id}]
  const [noteTexte,setNoteTexte]=useState("");
  const f=(k,v)=>setForm(x=>({...x,[k]:v}));
  const isBool=v=>v===true||String(v).toUpperCase()==="TRUE";

  function openPanel(mission=null){
    setErr("");
    if(mission){
      setEditing(mission.id);
      const parsed=parseDeps(mission.note);
      setDeps(parsed.deps||[]);
      setNoteTexte(parsed.noteTexte||"");
      setForm({...mission,stockQty:String(mission.stockQty),membres:getMembres(mission)});
    } else {
      setEditing(null);setDeps([]);setNoteTexte("");
      setForm({...EMISSION,type:moduleType});
    }
    setOpen(true);
  }

  // Ajouter/retirer une dépendance
  function addDep(dep){setDeps(d=>[...d.filter(x=>!(x.type===dep.type&&(x.ref||x.id)===(dep.ref||dep.id))),dep]);}
  function removeDep(dep){setDeps(d=>d.filter(x=>!(x.type===dep.type&&(x.ref||x.id)===(dep.ref||dep.id))));}
  function hasDep(dep){return deps.some(x=>x.type===dep.type&&(x.ref||x.id)===(dep.ref||dep.id));}

  async function save(){
    if(!form.description.trim()){setErr("Description obligatoire.");return;}
    setSaving(true);setErr("");
    try{
      const noteSerialized=moduleType==="chantier"?serializeDeps(deps,noteTexte):(form.note||"");
      const item={...form,stockQty:+form.stockQty||0,
        membres:Array.isArray(form.membres)?form.membres.join(","):form.membres,
        note:noteSerialized};
      if(editing){
        await sheet.update(editing,item);
      } else {
        await sheet.add(item);
      }
      // Sync événement calendrier pour chantier
      if(moduleType==="chantier"&&events&&form.dateDebut){
        const evExistant=events.rows.find(e=>e.type==="chantier"&&e.title===form.description);
        const evData={title:form.description,date:form.dateDebut,heure:"",type:"chantier",projet:form.projet||"",note:"Mission chantier",dateFin:form.dateFin||""};
        if(evExistant){await events.update(evExistant.id,{...evExistant,...evData});}
        else{await events.add(evData);}
      }
      setOpen(false);setEditing(null);
    }catch(e){setErr(e.message);}setSaving(false);
  }

  async function terminer(m){
    if(!confirm(`Marquer "${m.description}" comme terminé ?`))return;
    // Proposer la création d'un article stock
    const stockForm={
      ref:m.description,
      qty:1,
      unit:"pcs",
      cat:moduleType==="atelier"?"Consommables atelier":"Autre",
      prix:0,
      loc:moduleType==="atelier"?"Atelier":"",
    };
    setStockModal({mission:m, stockForm});
  }

  async function confirmerTerminaison(m, creerStock, sf, dejaTermine){
    setSavingStock(true);
    try{
      if(creerStock&&sf&&sf.ref){
        const existe=stocks.rows.find(s=>normRef(s.ref)===normRef(sf.ref));
        if(existe){
          await stocks.update(existe.id,{...existe,qty:Number(existe.qty)+(+sf.qty||1)});
        } else {
          await stocks.add({ref:sf.ref,cat:sf.cat||"Autre",qty:+sf.qty||1,min:+sf.min||0,unit:sf.unit||"pcs",prix:+sf.prix||0,loc:sf.loc||"",fourn:sf.fourn||"",note:sf.note||"",tags:sf.tags||"",origine:sf.origine||"",prixRevient:+sf.prixRevient||0,projet:sf.projet||"",historique:JSON.stringify([{date:TODAY,type:moduleType,label:`Produit depuis mission : ${m.description}`,projet:m.projet||"",qty:+sf.qty||1,qtyApres:+sf.qty||1}])});
        }
        // Convertir dépendances atelier → stock dans missions chantier liées
        if(moduleType==="atelier"){
          const missionsChantier=sheet.rows.filter(x=>x.type==="chantier"&&x.statut!=="terminé");
          for(const mc of missionsChantier){
            const parsed=parseDeps(mc.note);
            const deps=parsed.deps||[];
            const idx=deps.findIndex(d=>d.type==="atelier"&&Number(d.id)===Number(m.id));
            if(idx>=0){
              const newDeps=[...deps];
              newDeps[idx]={type:"stock",ref:sf.ref,qty:deps[idx].qty||1};
              await sheet.update(mc.id,{...mc,note:serializeDeps(newDeps,parsed.noteTexte||"")});
            }
          }
        }
      }

      // Déduire les pièces et finaliser — seulement si la mission n'était pas déjà terminée
      if(!dejaTermine){
        const snap3=[...stocks.rows];
        const stockItems2=getMissionStockItems(m);
        for(const it of stockItems2){
          if(!it.ref||!it.qty)continue;
          const chk=checkStockDispo(snap3,it.ref,it.qty);
          if(!chk.ok){alert(chk.msg);setSavingStock(false);setStockModal(null);return;}
        }
        for(const it of stockItems2){
          if(!it.ref||!it.qty)continue;
          await updateStockQty(stocks,snap3,it.ref,-Number(it.qty),{type:moduleType,label:m.description,projet:m.projet||""});
        }
        await sheet.update(m.id,{...m,statut:"terminé"});
      }
    }catch(e){alert("Erreur : "+e.message);}
    setSavingStock(false);setStockModal(null);
  }

  const toutes=sheet.rows.filter(m=>m.type===moduleType);
  const actives=toutes.filter(m=>m.statut!=="terminé")
    .sort((a,b)=>toISO(a.dateDebut||"").localeCompare(toISO(b.dateDebut||"")));
  const terminees=toutes.filter(m=>m.statut==="terminé")
    .sort((a,b)=>toISO(b.dateDebut||"").localeCompare(toISO(a.dateDebut||"")));
  const sb=(s)=>({planifié:{bg:"#F2F0ED",tx:"#3A3A3A"},"en cours":{bg:"#FFF0F0",tx:"#CC2222"},terminé:{bg:"#F0FFF0",tx:"#2A7A2A"}}[s]||{bg:"#F2F0ED",tx:"#3A3A3A"});

  const toggleMembre=(nom)=>{
    const current=Array.isArray(form.membres)?form.membres:(form.membres||"").split(",").filter(Boolean);
    const next=current.includes(nom)?current.filter(x=>x!==nom):[...current,nom];
    f("membres",next);
  };
  const getMembres=(m)=>typeof m.membres==="string"?m.membres.split(",").filter(Boolean):Array.isArray(m.membres)?m.membres:[];

  const membresActifs=team.rows.filter(t=>actives.some(m=>getMembres(m).includes(t.nom)));
  const barColor=(s)=>s==="terminé"?"#2A7A2A":s==="en cours"?"#CC2222":"#AAAAAA";

  // ── Calcul état dépendances chantier ──
  function evalDeps(m){
    if(moduleType!=="chantier")return[];
    const parsed=parseDeps(m.note);
    const jours=diffWorkDays(m.dateDebut);
    return (parsed.deps||[]).map(dep=>{
      let statut="ok",label="",detail="",ref="";
      if(dep.type==="stock"){
        const s=stocks.rows.find(x=>normRef(x.ref)===normRef(dep.ref));
        const dispo=s?Number(s.qty):0;
        const besoin=Number(dep.qty)||0;
        ref=dep.ref;
        label=dep.ref;
        detail=`${dispo}/${besoin} ${s?.unit||"pcs"}`;
        statut=dispo>=besoin?"ok":"manque";
      } else if(dep.type==="commande"){
        const o=(orders?.rows||[]).find(x=>Number(x.id)===Number(dep.id));
        ref=o?.article||dep.id;
        label=o?`${o.article} (${o.fourn})`:`Commande #${dep.id}`;
        detail=isBool(o?.recue)?"Reçue":"En attente";
        statut=isBool(o?.recue)?"ok":"attente";
      } else if(dep.type==="atelier"){
        const a=sheet.rows.find(x=>Number(x.id)===Number(dep.id)&&x.type==="atelier");
        ref=a?.description||dep.id;
        label=a?a.description:`Mission atelier #${dep.id}`;
        detail=a?.statut||"Inconnu";
        statut=a?.statut==="terminé"?"ok":"attente";
      }
      // Urgence combinée : état de la pièce × proximité du chantier
      let urgence="info";
      if(statut!=="ok"){
        urgence=jours<=0?"critique":jours<=3?"critique":jours<=5?"urgent":jours<=10?"attention":"info";
      }
      return{...dep,ref,label,detail,statut,urgence,jours};
    });
  }

  // Toutes les alertes actives (deps pas OK)
  const toutesAlertes=moduleType==="chantier"?actives.flatMap(m=>
    evalDeps(m).filter(d=>d.statut!=="ok").map(d=>({...d,mission:m}))
  ):[];

  // Ancienne alerte stock unique (compatibilité)
  const alertesStockSimple=moduleType==="chantier"?actives
    .filter(m=>m.stockRef&&m.stockQty>0&&m.dateDebut&&!parseDeps(m.note).deps?.length)
    .map(m=>{
      const s=stocks.rows.find(x=>normRef(x.ref)===normRef(m.stockRef));
      const dispo=s?Number(s.qty):0;
      const besoin=Number(m.stockQty);
      const jours=diffWorkDays(m.dateDebut);
      if(dispo>=besoin)return null;
      const urgence=jours<=0?"critique":jours<=5?"urgent":jours<=10?"attention":"info";
      return{mission:m,stock:s,dispo,besoin,jours,urgence,ref:m.stockRef,label:m.stockRef,detail:`${dispo}/${besoin}`,type:"stock"};
    }).filter(Boolean):[];

  const alertesAll=[...toutesAlertes,...alertesStockSimple];
  const urgColors={critique:{bg:"#FFF0F0",tx:"#CC2222",brd:"#CC2222",lbl:"Critique"},urgent:{bg:"#FFF4EC",tx:"#CC6600",brd:"#CC8800",lbl:"Urgent"},attention:{bg:"#FFFBEC",tx:"#CC8800",brd:"#DDAA00",lbl:"Attention"},info:{bg:"#F2F0ED",tx:"#3A3A3A",brd:"#DDDDDD",lbl:"À prévoir"}};

  // Missions atelier en cours (pour liaison)
  const atelierEnCours=sheet.rows.filter(x=>x.type==="atelier"&&x.statut!=="terminé");
  // Commandes en cours (pas encore reçues)
  const commandesEnCours=(orders?.rows||[]).filter(o=>!isBool(o.recue));

  const panel=open&&<SidePanel title={editing?`Modifier la mission`:`Nouvelle mission ${label}`} onClose={()=>{setOpen(false);setEditing(null);}}>
    <FG label="Description *"><Inp value={form.description} onChange={e=>f("description",e.target.value)} placeholder="Ex: Pose ETFE Jussieu"/></FG>
    <FG label="Projet"><Sel value={form.projet} onChange={e=>f("projet",e.target.value)}>
      <option value="">— Aucun —</option>{projects.rows.map(p=><option key={p.id}>{p.name}</option>)}
    </Sel></FG>
    <FG label="Date début"><Inp type="date" value={form.dateDebut} onChange={e=>f("dateDebut",e.target.value)}/></FG>
    <FG label="Date fin prévue"><Inp type="date" value={form.dateFin} onChange={e=>f("dateFin",e.target.value)}/></FG>
    <FG label="Membres de l'équipe">
      <div style={{display:"flex",flexWrap:"wrap",gap:6,padding:"4px 0"}}>
        {team.rows.map(m=>{
          const current=Array.isArray(form.membres)?form.membres:(form.membres||"").split(",").filter(Boolean);
          const sel=current.includes(m.nom);
          return <button key={m.id} onClick={()=>toggleMembre(m.nom)} style={{padding:"3px 10px",borderRadius:4,fontSize:12,cursor:"pointer",border:`1px solid ${sel?"#CC2222":"#DDDDDD"}`,background:sel?"#CC2222":"#fff",color:sel?"#fff":"#3A3A3A",fontFamily:"'DM Sans',sans-serif"}}>{m.nom}</button>;
        })}
      </div>
    </FG>

    {/* ── Dépendances chantier ── */}
    {moduleType==="chantier"&&<>
      <div style={{fontSize:12,fontWeight:700,color:"#1C1C1C",marginTop:8,marginBottom:6,borderLeft:"3px solid #CC2222",paddingLeft:6}}>Pièces & dépendances nécessaires</div>

      {/* Stock existant */}
      <FG label="Pièce stock">
        <div style={{display:"flex",gap:6,marginBottom:4}}>
          <div style={{flex:1}}>
            <Sel value={form.stockRef} onChange={e=>f("stockRef",e.target.value)}>
              <option value="">— Choisir —</option>{stocks.rows.map(s=><option key={s.id}>{s.ref}</option>)}
            </Sel>
          </div>
          <Inp type="number" value={form.stockQty} onChange={e=>f("stockQty",e.target.value)} placeholder="Qté" style={{width:70}}/>
          <button onClick={()=>{if(form.stockRef)addDep({type:"stock",ref:form.stockRef,qty:+form.stockQty||1});}} style={{padding:"6px 10px",background:"#CC2222",color:"#fff",border:"none",borderRadius:4,cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif",flexShrink:0}}>+ Lier</button>
        </div>
      </FG>

      {/* Commandes en cours */}
      {commandesEnCours.length>0&&<FG label="Commande en cours">
        <div style={{display:"flex",gap:6,marginBottom:4}}>
          <div style={{flex:1}}>
            <Sel onChange={e=>{if(e.target.value)addDep({type:"commande",id:e.target.value,ref:e.target.options[e.target.selectedIndex].text});e.target.value="";}}>
              <option value="">— Lier une commande —</option>
              {commandesEnCours.map(o=><option key={o.id} value={o.id}>{o.article} · {o.fourn}</option>)}
            </Sel>
          </div>
        </div>
      </FG>}

      {/* Missions atelier en cours */}
      {atelierEnCours.length>0&&<FG label="Mission atelier en cours">
        <div style={{display:"flex",gap:6,marginBottom:4}}>
          <div style={{flex:1}}>
            <Sel onChange={e=>{if(e.target.value)addDep({type:"atelier",id:e.target.value,ref:e.target.options[e.target.selectedIndex].text});e.target.value="";}}>
              <option value="">— Lier une mission atelier —</option>
              {atelierEnCours.map(m=><option key={m.id} value={m.id}>{m.description}</option>)}
            </Sel>
          </div>
        </div>
      </FG>}

      {/* Liste des dépendances ajoutées */}
      {deps.length>0&&<div style={{marginBottom:8}}>
        {deps.map((dep,i)=>{
          const icon=dep.type==="stock"?"📦":dep.type==="commande"?"🛒":"🔨";
          return(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 8px",background:"#F9F9F9",borderRadius:4,marginBottom:4,border:"0.5px solid #EEEEEE"}}>
              <span style={{fontSize:12}}>{icon}</span>
              <span style={{flex:1,fontSize:12,color:"#1C1C1C"}}>{dep.ref||dep.id}{dep.qty>0&&` × ${dep.qty}`}</span>
              <badge style={{fontSize:10,color:"#7A7A7A",background:"#F2F0ED",padding:"1px 6px",borderRadius:3}}>{dep.type}</badge>
              <button onClick={()=>removeDep(dep)} style={{background:"none",border:"none",cursor:"pointer",fontSize:11,color:"#CC2222"}}>✕</button>
            </div>
          );
        })}
      </div>}

      <FG label="Note"><Inp value={noteTexte} onChange={e=>setNoteTexte(e.target.value)} placeholder="Notes internes..."/></FG>
    </>}

    {moduleType==="atelier"&&<>
      <FG label="Pièces stock utilisées">
        {(()=>{
          let items=[];
          try{items=form.stockItems?JSON.parse(form.stockItems):(form.stockRef?[{ref:form.stockRef,qty:+form.stockQty||1}]:[]);}catch(e){}
          const setItems=arr=>f("stockItems",JSON.stringify(arr)); // ne pas filtrer pendant édition
          return(<>
            {items.map((it,i)=>(
              <div key={i} style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}>
                <Sel value={it.ref} onChange={e=>{const a=[...items];a[i]={...a[i],ref:e.target.value};setItems(a);}}>
                  <option value="">— Choisir —</option>
                  {(editing&&form.statut==="terminé"?stocks.rows:stocks.rows.filter(s=>Number(s.qty)>0)).map(s=><option key={s.id} value={s.ref}>{s.ref} ({s.qty} {s.unit})</option>)}
                </Sel>
                <div style={{display:"flex",flexDirection:"column",flexShrink:0}}>
                  <Inp type="number" value={it.qty} onChange={e=>{const a=[...items];a[i]={...a[i],qty:+e.target.value||1};setItems(a);}} placeholder="Qté" style={{width:70,border:(()=>{const sx=stocks.rows.find(s=>normRef(s.ref)===normRef(it.ref));return sx&&Number(it.qty)>Number(sx.qty)?"1px solid #CC2222":"1px solid #DDDDDD";})()}}/>
                  {(()=>{const sx=stocks.rows.find(s=>normRef(s.ref)===normRef(it.ref));return sx&&Number(it.qty)>Number(sx.qty)?<span style={{fontSize:9,color:"#CC2222",fontWeight:600}}>Max: {sx.qty}</span>:null;})()}
                </div>
                <button onClick={()=>setItems(items.filter((_,j)=>j!==i))} style={{background:"none",border:"none",cursor:"pointer",color:"#CC2222",fontSize:14,flexShrink:0}}>✕</button>
              </div>
            ))}
            <button onClick={()=>setItems([...items,{ref:"",qty:1}])} style={{width:"100%",padding:"6px",borderRadius:4,border:"1px dashed #CC2222",background:"#FFF0F0",cursor:"pointer",fontSize:12,color:"#CC2222",fontFamily:"'DM Sans',sans-serif"}}>+ Ajouter une pièce</button>
          </>);
        })()}
      </FG>
      <FG label="Note"><Inp value={form.note||""} onChange={e=>f("note",e.target.value)} placeholder="Optionnel"/></FG>
    </>}

    <FG label="Statut"><Sel value={form.statut} onChange={e=>f("statut",e.target.value)}>
      <option value="planifié">Planifié</option><option value="en cours">En cours</option><option value="terminé">Terminé</option>
    </Sel></FG>
    {moduleType==="chantier"&&<FG label="Importance (pour calcul avancement)"><Sel value={form.importance||"2"} onChange={e=>f("importance",e.target.value)}>
      <option value="1">1 — Faible</option><option value="2">2 — Normale</option><option value="3">3 — Critique</option>
    </Sel></FG>}
    <FG label="Tags"><TagSelector tags={form.tags||""} onChange={v=>f("tags",v)} projetNom={form.projet} projects={projects}/></FG>
    <ErrMsg msg={err}/><PanelBtns onCancel={()=>{setOpen(false);setEditing(null);}} onSave={save} saving={saving} saveLabel={editing?"Mettre à jour":"Créer"}/>
  </SidePanel>;

  // Filtrage par projet/tag
  const fActives=actives.filter(m=>{
    if(filterProjet&&m.projet!==filterProjet)return false;
    if(filterTag){const t=(m.tags||"").split(",").map(x=>x.trim());if(!t.includes(filterTag))return false;}
    return true;
  });
  const fTerminees=terminees.filter(m=>{
    if(filterProjet&&m.projet!==filterProjet)return false;
    if(filterTag){const t=(m.tags||"").split(",").map(x=>x.trim());if(!t.includes(filterTag))return false;}
    return true;
  });

  return <WithPanel panel={panel}>
    {/* ── Modal création article stock — composant dédié pour éviter useState dans IIFE ── */}
    {stockModal&&<ModalStockTerminaison
      mission={stockModal.mission}
      moduleType={moduleType}
      onCancel={()=>setStockModal(null)}
      onConfirm={(creer,sf)=>confirmerTerminaison(stockModal.mission,creer,sf,stockModal.dejaTermine)}
      saving={savingStock}
      stocks={stocks}
      projects={projects}
      fournisseurs={fournisseurs||{rows:[]}}
    />}
    <FiltreProjetTag projects={projects} filterProjet={filterProjet} setFilterProjet={setFilterProjet} filterTag={filterTag} setFilterTag={setFilterTag}/>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <div style={{fontSize:15,fontWeight:700,color:"#1C1C1C",borderLeft:"3px solid #CC2222",paddingLeft:8}}>
          Missions {label} ({fActives.length} actives)
        </div>
        <div style={{display:"flex",border:"1px solid #DDDDDD",borderRadius:6,overflow:"hidden"}}>
          {[["liste","≡ Liste"],["planning","▦ Planning"]].map(([v,l])=>(
            <button key={v} onClick={()=>setVue(v)} style={{padding:"4px 12px",fontSize:12,cursor:"pointer",border:"none",background:vue===v?"#CC2222":"#fff",color:vue===v?"#fff":"#3A3A3A",fontFamily:"'DM Sans',sans-serif",fontWeight:vue===v?700:400}}>{l}</button>
          ))}
        </div>
      </div>
      <Btn primary onClick={()=>openPanel()}>+ Nouvelle mission</Btn>
    </div>

    {/* ── Alertes dépendances chantier ── */}
    {alertesAll.length>0&&<div style={{marginBottom:14}}>
      <div style={{fontSize:13,fontWeight:700,color:"#CC2222",borderLeft:"3px solid #CC2222",paddingLeft:8,marginBottom:8}}>
        ⚠ {alertesAll.length} dépendance{alertesAll.length>1?"s":""} non prête{alertesAll.length>1?"s":""}
      </div>
      {alertesAll.map((a,i)=>{
        const uc=urgColors[a.urgence];
        const icon=a.type==="stock"?"📦":a.type==="commande"?"🛒":"🔨";
        return(
          <div key={i} style={{background:uc.bg,border:`1px solid ${uc.brd}`,borderLeft:`3px solid ${uc.brd}`,borderRadius:6,padding:"9px 12px",marginBottom:6,display:"flex",alignItems:"center",gap:10}}>
            <span style={{fontSize:14}}>{icon}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:700,color:uc.tx}}>{a.label}</div>
              <div style={{fontSize:11,color:uc.tx,opacity:.85}}>
                {a.mission.description} · {a.jours<=0?"Chantier dépassé":`J-${a.jours} ouvrés`} · {a.detail}
              </div>
            </div>
            <Badge label={uc.lbl} bg={uc.bg} color={uc.tx}/>
          </div>
        );
      })}
    </div>}

    {/* ══ VUE LISTE ══ */}
    {vue==="liste"&&<>
      {!actives.length&&<Bd style={{textAlign:"center",padding:20,color:"#7A7A7A",fontSize:13,marginBottom:12}}>Aucune mission {label.toLowerCase()} en cours.</Bd>}
      {fActives.map(m=>{
        const s=sb(m.statut);
        const membres=getMembres(m);
        return(
          <Bd key={m.id} style={{marginBottom:8}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,fontWeight:700,color:"#1C1C1C",marginBottom:2}}>{m.description}</div>
                {m.projet&&<div style={{fontSize:12,color:"#7A7A7A",marginBottom:3}}>{m.projet}</div>}
                <div style={{fontSize:12,color:"#7A7A7A"}}>{m.dateDebut&&`Du ${fmt(m.dateDebut)}`}{m.dateFin&&` au ${fmt(m.dateFin)}`}</div>
                {membres.length>0&&(
                  <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:6}}>
                    {membres.map(mb=><span key={mb} style={{background:"#F2F0ED",color:"#3A3A3A",fontSize:11,padding:"2px 8px",borderRadius:4}}>{mb}</span>)}
                  </div>
                )}
                {(m.tags||"").split(",").filter(Boolean).length>0&&(
                  <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:4}}>
                    {(m.tags||"").split(",").filter(Boolean).map((tag,i)=>(
                      <span key={i} style={{background:"#EBF3FF",color:"#1A5DAB",fontSize:10,fontWeight:600,padding:"1px 7px",borderRadius:10}}>{tag.trim()}</span>
                    ))}
                  </div>
                )}
                {m.note&&!parseDeps(m.note).deps?.length&&<div style={{fontSize:12,color:"#7A7A7A",marginTop:4,fontStyle:"italic"}}>{m.note}</div>}
                {/* Suivi dépendances chantier */}
                {moduleType==="chantier"&&evalDeps(m).length>0&&(()=>{
                  const evDeps=evalDeps(m);
                  const toutPret=evDeps.every(d=>d.statut==="ok");
                  return(
                    <div style={{marginTop:8}}>
                      {toutPret
                        ? <div style={{display:"flex",alignItems:"center",gap:6,padding:"6px 10px",background:"#F0FFF0",borderRadius:6,border:"1px solid #2A7A2A"}}>
                            <span style={{fontSize:14}}>✓</span>
                            <span style={{fontSize:12,fontWeight:700,color:"#2A7A2A"}}>Toutes les dépendances sont prêtes</span>
                          </div>
                        : <>
                            <div style={{fontSize:11,color:"#7A7A7A",marginBottom:4,fontWeight:600}}>
                              {evDeps.filter(d=>d.statut==="ok").length}/{evDeps.length} dépendances prêtes
                            </div>
                            {evDeps.map((dep,i)=>{
                              const uc=urgColors[dep.urgence];
                              const icon=dep.type==="stock"?"📦":dep.type==="commande"?"🛒":"🔨";
                              return(
                                <div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"4px 8px",background:dep.statut==="ok"?"#F0FFF0":uc.bg,borderRadius:4,marginBottom:3,border:`0.5px solid ${dep.statut==="ok"?"#2A7A2A":uc.brd}`}}>
                                  <span style={{fontSize:11}}>{icon}</span>
                                  <span style={{flex:1,fontSize:11,color:dep.statut==="ok"?"#2A7A2A":uc.tx,fontWeight:500}}>{dep.label}</span>
                                  <span style={{fontSize:10,color:dep.statut==="ok"?"#2A7A2A":uc.tx}}>{dep.detail}</span>
                                  {dep.statut==="ok"?<span style={{fontSize:10,color:"#2A7A2A",fontWeight:700}}>✓</span>:<Badge label={uc.lbl} bg={uc.bg} color={uc.tx}/>}
                                </div>
                              );
                            })}
                          </>
                      }
                    </div>
                  );
                })()}
              </div>
              <Badge label={m.statut} bg={s.bg} color={s.tx}/>
            </div>
            <div style={{display:"flex",gap:6}}>
              <Btn small onClick={()=>openPanel(m)}>Modifier</Btn>
              {m.statut!=="terminé"&&<Btn small primary onClick={()=>terminer(m)}>Marquer terminé</Btn>}
              <Btn small danger onClick={()=>sheet.remove(m.id)}>Suppr.</Btn>
            </div>
          </Bd>
        );
      })}
      {fTerminees.length>0&&<>
        <div style={{fontSize:13,fontWeight:700,color:"#7A7A7A",borderLeft:"3px solid #DDDDDD",paddingLeft:8,margin:"16px 0 10px"}}>Historique — missions terminées ({fTerminees.length})</div>
        {(showAllTerminees?fTerminees:fTerminees.slice(0,5)).map(m=>(
          <Bd key={m.id} style={{marginBottom:6,opacity:.85}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <div style={{flex:1}}>
                <div style={{fontSize:13,color:"#3A3A3A",fontWeight:500}}>{m.description}</div>
                <div style={{fontSize:11,color:"#7A7A7A"}}>{m.projet}{getMembres(m).length>0&&` · ${getMembres(m).join(", ")}`}</div>
                {getMissionStockItems(m).length>0&&<div style={{fontSize:10,color:"#7A7A7A",marginTop:2}}>🔩 {getMissionStockItems(m).map(it=>`${it.ref} ×${it.qty}`).join(" · ")}</div>}
                {(m.dateDebut||m.dateFin)&&<div style={{fontSize:11,color:"#7A7A7A"}}>{m.dateDebut&&fmt(m.dateDebut)}{m.dateFin&&` → ${fmt(m.dateFin)}`}</div>}
              </div>
              <Badge label="Terminé" bg="#F0FFF0" color="#2A7A2A"/>
            </div>
            <div style={{display:"flex",gap:6}}>
              <Btn small onClick={()=>openPanel(m)}>Modifier</Btn>
              <Btn small onClick={()=>setStockModal({mission:m,dejaTermine:true,stockForm:{ref:m.description,qty:1,unit:"pcs",cat:moduleType==="atelier"?"Consommables atelier":"Autre",prix:0,loc:moduleType==="atelier"?"Atelier":"",origine:moduleType==="atelier"?"Fabriqué à l'atelier":"Fabriqué en chantier"}})}>📦 Stock</Btn>
              <Btn small danger onClick={()=>sheet.remove(m.id)}>Suppr.</Btn>
            </div>
          </Bd>
        ))}
        {!showAllTerminees&&fTerminees.length>5&&(
          <div onClick={()=>setShowAllTerminees(true)} style={{textAlign:"center",padding:"8px 0",fontSize:12,color:"#1A5DAB",cursor:"pointer",borderTop:"0.5px solid #EEEEEE",marginTop:4}}>
            ↓ Voir les {fTerminees.length-5} autres ({fTerminees.length} au total)
          </div>
        )}
        {showAllTerminees&&fTerminees.length>5&&(
          <div onClick={()=>setShowAllTerminees(false)} style={{textAlign:"center",padding:"8px 0",fontSize:12,color:"#7A7A7A",cursor:"pointer",borderTop:"0.5px solid #EEEEEE",marginTop:4}}>
            ↑ Réduire
          </div>
        )}
      </>}
    </>}

    {/* ══ VUE PLANNING ══ */}
    {vue==="planning"&&<>
      {!membresActifs.length&&(
        <Bd style={{textAlign:"center",padding:24,color:"#7A7A7A",fontSize:13}}>
          Aucun membre assigné aux missions actives. Assigne des membres depuis la vue Liste.
        </Bd>
      )}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {membresActifs.map(membre=>{
          const missionsPersonne=actives.filter(m=>getMembres(m).includes(membre.nom));
          const nTerminees=terminees.filter(m=>getMembres(m).includes(membre.nom)).length;
          const nTotal=missionsPersonne.length+nTerminees;
          const pct=nTotal>0?Math.round(nTerminees/nTotal*100):0;
          const enCours=missionsPersonne.filter(m=>m.statut==="en cours").length;
          const planifiees=missionsPersonne.filter(m=>m.statut==="planifié").length;

          return(
            <Bd key={membre.id}>
              {/* En-tête membre */}
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,paddingBottom:10,borderBottom:"1px solid #EEEEEE"}}>
                <div style={{width:36,height:36,borderRadius:"50%",background:"#CC2222",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <span style={{fontSize:13,fontWeight:700,color:"#fff"}}>{initials(membre.nom)}</span>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:700,color:"#1C1C1C"}}>{membre.nom}</div>
                  {membre.role&&<div style={{fontSize:11,color:"#7A7A7A"}}>{membre.role}</div>}
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:11,color:"#7A7A7A"}}>{missionsPersonne.length} mission{missionsPersonne.length>1?"s":""} active{missionsPersonne.length>1?"s":""}</div>
                  {enCours>0&&<div style={{fontSize:11,color:"#CC2222",fontWeight:600}}>{enCours} en cours</div>}
                </div>
              </div>

              {/* Barre de progression globale */}
              {nTotal>0&&<div style={{marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#7A7A7A",marginBottom:4}}>
                  <span>Avancement global</span>
                  <span style={{fontWeight:600,color:"#1C1C1C"}}>{pct}%</span>
                </div>
                <div style={{height:4,borderRadius:2,background:"#EEEEEE",overflow:"hidden"}}>
                  <div style={{height:"100%",width:pct+"%",background:pct===100?"#2A7A2A":"#CC2222",borderRadius:2,transition:"width .3s"}}/>
                </div>
                <div style={{display:"flex",gap:10,marginTop:5,fontSize:10,color:"#7A7A7A"}}>
                  {planifiees>0&&<span style={{color:"#7A7A7A"}}>● {planifiees} planifiée{planifiees>1?"s":""}</span>}
                  {enCours>0&&<span style={{color:"#CC2222"}}>● {enCours} en cours</span>}
                  {nTerminees>0&&<span style={{color:"#2A7A2A"}}>● {nTerminees} terminée{nTerminees>1?"s":""}</span>}
                </div>
              </div>}

              {/* Liste des missions */}
              {missionsPersonne.map(m=>{
                const s=sb(m.statut);
                const autresMembres=getMembres(m).filter(x=>x!==membre.nom);
                return(
                  <div key={m.id} style={{padding:"9px 0",borderBottom:"0.5px solid #EEEEEE"}}>
                    <div style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:4}}>
                      <div style={{width:3,background:barColor(m.statut),borderRadius:2,alignSelf:"stretch",flexShrink:0,minHeight:16}}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,fontWeight:600,color:"#1C1C1C",marginBottom:2}}>{m.description}</div>
                        {m.projet&&<div style={{fontSize:11,color:"#7A7A7A"}}>{m.projet}</div>}
                        {(m.dateDebut||m.dateFin)&&(
                          <div style={{fontSize:11,color:"#7A7A7A",marginTop:2}}>
                            {m.dateDebut&&fmt(m.dateDebut)}{m.dateFin&&` → ${fmt(m.dateFin)}`}
                          </div>
                        )}
                        {autresMembres.length>0&&(
                          <div style={{fontSize:10,color:"#AAAAAA",marginTop:3}}>
                            avec {autresMembres.join(", ")}
                          </div>
                        )}
                      </div>
                      <Badge label={m.statut} bg={s.bg} color={s.tx}/>
                    </div>
                    {/* Actions rapides */}
                    {m.statut!=="terminé"&&(
                      <div style={{display:"flex",gap:6,paddingLeft:11,marginTop:4}}>
                        <button onClick={()=>sheet.update(m.id,{...m,statut:"en cours",membres:getMembres(m).join(",")})}
                          style={{fontSize:10,padding:"2px 8px",borderRadius:4,border:"1px solid #DDDDDD",background:m.statut==="en cours"?"#FFF0F0":"#fff",color:m.statut==="en cours"?"#CC2222":"#3A3A3A",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
                          En cours
                        </button>
                        <button onClick={()=>terminer(m)}
                          style={{fontSize:10,padding:"2px 8px",borderRadius:4,border:"1px solid #2A7A2A",background:"#F0FFF0",color:"#2A7A2A",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
                          ✓ Terminé
                        </button>
                      </div>
                    )}
                    {m.statut==="terminé"&&(
                      <div style={{paddingLeft:11,marginTop:3,fontSize:10,color:"#2A7A2A",fontWeight:600}}>✓ Mission terminée</div>
                    )}
                  </div>
                );
              })}

              {/* Si toutes terminées pour cette personne */}
              {missionsPersonne.length===0&&(
                <div style={{fontSize:12,color:"#2A7A2A",fontWeight:500,padding:"8px 0"}}>✓ Toutes les missions sont terminées.</div>
              )}
            </Bd>
          );
        })}
      </div>

      {/* Membres sans mission active mais avec historique */}
      {team.rows.filter(t=>!membresActifs.find(m=>m.id===t.id)&&terminees.some(m=>getMembres(m).includes(t.nom))).length>0&&(
        <div style={{marginTop:16}}>
          <div style={{fontSize:13,fontWeight:700,color:"#7A7A7A",borderLeft:"3px solid #DDDDDD",paddingLeft:8,marginBottom:10}}>
            Membres sans mission active
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {team.rows.filter(t=>!membresActifs.find(m=>m.id===t.id)&&terminees.some(m=>getMembres(m).includes(t.nom))).map(t=>{
              const n=terminees.filter(m=>getMembres(m).includes(t.nom)).length;
              return(
                <div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:"#F9F9F9",borderRadius:8,border:"0.5px solid #EEEEEE"}}>
                  <div style={{width:28,height:28,borderRadius:"50%",background:"#DDDDDD",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <span style={{fontSize:11,fontWeight:700,color:"#7A7A7A"}}>{initials(t.nom)}</span>
                  </div>
                  <div>
                    <div style={{fontSize:12,fontWeight:600,color:"#3A3A3A"}}>{t.nom}</div>
                    <div style={{fontSize:11,color:"#7A7A7A"}}>{n} mission{n>1?"s":""} terminée{n>1?"s":""}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </>}
  </WithPanel>;
}
const ET={text:"",projet:"",due:""};
function Taches({sheet,projects}){
  const [open,setOpen]=useState(false);
  const [form,setForm]=useState(ET);
  const [editing,setEditing]=useState(null);
  const [filter,setFilter]=useState("pending");
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");
  const f=(k,v)=>setForm(x=>({...x,[k]:v}));
  const isDone=t=>t.done===true||t.done==="TRUE";

  async function save(){
    if(!form.text.trim()){setErr("Description obligatoire.");return;}
    setSaving(true);setErr("");
    try{
      const item={...form,done:editing?isDone(sheet.rows.find(t=>Number(t.id)===Number(editing))||{}):false};
      if(editing){await sheet.update(editing,item);}else{await sheet.add(item);}
      setOpen(false);
    }catch(e){setErr(e.message);}setSaving(false);
  }
  async function toggle(t){await sheet.update(t.id,{...t,done:!isDone(t)});}

  // Tri : En retard → Urgent → Normal → Faible → Terminées, puis par date
  const urgOrder={critique:0,high:1,med:2,low:3,done:4};
  const sorted=[...sheet.rows].sort((a,b)=>{
    const da=isDone(a), db=isDone(b);
    if(da!==db)return da?1:-1;
    const ua=autoUrgence(a.due,a.done), ub=autoUrgence(b.due,b.done);
    const oa=urgOrder[ua]??3, ob=urgOrder[ub]??3;
    if(oa!==ob)return oa-ob;
    return toISO(a.due).localeCompare(toISO(b.due));
  });
  const filtered=sorted.filter(t=>filter==="all"||(filter==="pending"&&!isDone(t))||(filter==="done"&&isDone(t)));

  const panel=open&&<SidePanel title={editing?"Modifier la tâche":"Nouvelle tâche"} onClose={()=>setOpen(false)}>
    <FG label="Description *"><Inp value={form.text} onChange={e=>f("text",e.target.value)} placeholder="Ex: Relance fournisseur profilés"/></FG>
    <FG label="Échéance"><Inp type="date" value={form.due} onChange={e=>f("due",e.target.value)}/></FG>
    <FG label="Projet"><Sel value={form.projet} onChange={e=>f("projet",e.target.value)}><option value="">— Aucun —</option>{projects.rows.map(p=><option key={p.id}>{p.name}</option>)}</Sel></FG>
    <div style={{background:"#F2F0ED",borderRadius:6,padding:"8px 10px",fontSize:12,color:"#7A7A7A",marginBottom:10}}>
      L'urgence est calculée automatiquement selon l'échéance :<br/>
      &gt;7j → Faible · ≤7j → Normal · ≤2j → Urgent · Dépassée → En retard
    </div>
    <ErrMsg msg={err}/><PanelBtns onCancel={()=>setOpen(false)} onSave={save} saving={saving} saveLabel={editing?"Mettre à jour":"Ajouter"}/>
  </SidePanel>;

  return <WithPanel panel={panel}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div style={{display:"flex",gap:4,alignItems:"center"}}>
        {[["pending","En cours"],["done","Terminées"],["all","Toutes"]].map(([v,l])=>(
          <button key={v} onClick={()=>setFilter(v)} style={{padding:"5px 12px",borderRadius:4,fontSize:12,cursor:"pointer",border:"1px solid #DDDDDD",background:filter===v?"#CC2222":"#fff",color:filter===v?"#fff":"#3A3A3A",fontFamily:"'DM Sans',sans-serif",fontWeight:filter===v?700:400}}>{l}</button>
        ))}
        <span style={{fontSize:11,color:"#7A7A7A",marginLeft:8,fontFamily:"'DM Mono',monospace"}}>{sheet.rows.length} tâches chargées</span>
      </div>
      <Btn primary onClick={()=>{setEditing(null);setForm(ET);setErr("");setOpen(true);}}>+ Nouvelle tâche</Btn>
    </div>
    <Bd>
      {!filtered.length&&<div style={{fontSize:13,color:"#7A7A7A",padding:"10px 0"}}>Aucune tâche.</div>}
      {filtered.map(t=>{
        const done=isDone(t);
        const urg=done?"done":autoUrgence(t.due,t.done);
        const u=UC[urg]||UC.low;
        const d=diffDays(t.due);
        const dueLbl=t.due?(d<0?`${Math.abs(d)}j de retard`:d===0?"Aujourd'hui":d===1?"Demain":`${fmt(t.due)}`):null;
        return(
          <div key={t.id} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"11px 0",borderBottom:"0.5px solid #EEEEEE"}}>
            <Check checked={done} onChange={()=>toggle(t)} color="#CC2222"/>
            <div style={{flex:1}}>
              <div style={{fontSize:13,textDecoration:done?"line-through":"none",color:done?"#7A7A7A":"#1C1C1C",fontWeight:done?400:500}}>{t.text}</div>
              <div style={{fontSize:11,color:"#7A7A7A",marginTop:2,display:"flex",gap:8}}>
                {t.projet&&<span>{t.projet}</span>}
                {dueLbl&&<span style={{color:urg==="critique"?"#CC2222":urg==="high"?"#CC2222":"#7A7A7A",fontWeight:urg==="critique"||urg==="high"?700:400}}>{dueLbl}</span>}
              </div>
            </div>
            <Badge label={u.lbl} bg={u.bg} color={u.tx}/>
            <button onClick={()=>{setEditing(t.id);setForm({text:t.text,projet:t.projet||"",due:toISO(t.due)||""});setErr("");setOpen(true);}} style={{background:"none",border:"1px solid #DDDDDD",borderRadius:4,cursor:"pointer",fontSize:11,padding:"2px 8px",color:"#3A3A3A",fontFamily:"'DM Sans',sans-serif"}}>Modifier</button>
            <button onClick={()=>sheet.remove(t.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#7A7A7A"}}>✕</button>
          </div>
        );
      })}
    </Bd>
  </WithPanel>;
}

// ══ CALENDRIER ══
function Calendrier({sheet,projects,atelierChantier}){
  const [year,setYear]=useState(()=>new Date().getFullYear());
  const [month,setMonth]=useState(()=>new Date().getMonth());
  const [view,setView]=useState("mois"); // mois | semaine | jour
  const [selectedDay,setSelectedDay]=useState(TODAY);
  const [open,setOpen]=useState(false);
  const [form,setForm]=useState({title:"",date:"",heure:"",type:"rdv",projet:"",note:"",dateFin:""});
  const [recurrence,setRecurrence]=useState({active:false,jusqu:""}); // récurrence hebdo
  const [editing,setEditing]=useState(null);
  const [saving,setSaving]=useState(false);
  const f=(k,v)=>setForm(x=>({...x,[k]:v}));
