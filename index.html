            ].filter(x=>x.val).map((x,i)=>(
              <div key={i} style={{display:"flex",gap:10,padding:"4px 0",borderBottom:"0.5px solid #EEEEEE"}}>
                <span style={{fontSize:11,color:"#7A7A7A",width:80,flexShrink:0}}>{x.lbl}</span>
                <span style={{fontSize:12,color:"#1C1C1C",fontWeight:500}}>{x.val}</span>
              </div>
            ))}
          </Bd>

          {/* Articles */}
          <Bd style={{marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:"#7A7A7A",marginBottom:6}}>ARTICLES</div>
            {aiPreview.lignes.map((l,i)=>(
              <div key={i} style={{padding:"6px 0",borderBottom:"0.5px solid #EEEEEE"}}>
                <div style={{fontSize:12,fontWeight:600,color:"#1C1C1C"}}>{l.article}</div>
                <div style={{fontSize:11,color:"#7A7A7A",display:"flex",gap:10,marginTop:2}}>
                  {l.qty&&<span>{l.qty} {l.unit}</span>}
                  {l.prix&&<span>{Number(l.prix).toLocaleString("fr-FR")} € /u</span>}
                  {l.qty&&l.prix&&<span style={{color:"#2A7A2A",fontWeight:600}}>= {(+l.prix*(+l.qty||1)).toLocaleString("fr-FR")} €</span>}
                  {l.cat&&<span style={{background:"#F2F0ED",padding:"0 5px",borderRadius:3}}>{l.cat}</span>}
                </div>
              </div>
            ))}
            <div style={{textAlign:"right",marginTop:6,fontSize:12,fontWeight:700,color:"#1C1C1C"}}>
              Total : {aiPreview.lignes.reduce((s,l)=>s+(+l.prix||0)*(+l.qty||0),0).toLocaleString("fr-FR")} €
            </div>
          </Bd>

          <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
            <button onClick={()=>{setAiPreview(null);setAiErr("");setNewFourn(false);}} style={{padding:"7px 16px",borderRadius:4,border:"1px solid #DDDDDD",background:"#fff",cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif",color:"#3A3A3A"}}>Corriger</button>
            <button onClick={applyAiPreview} style={{padding:"8px 20px",borderRadius:4,border:"none",background:"#2A7A2A",cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif",color:"#fff",fontWeight:700}}>Créer la commande →</button>
          </div>
        </>}
      </div>
    </div>}
    {/* Alerte livraisons en retard */}
    {livraisonsRetard.length>0&&<div style={{background:"#FFF0F0",border:"1px solid #FFCCCC",borderLeft:"4px solid #CC2222",borderRadius:8,padding:"10px 14px",marginBottom:14}}>
      <div style={{fontSize:13,fontWeight:700,color:"#CC2222",marginBottom:6}}>⚠ {livraisonsRetard.length} livraison{livraisonsRetard.length>1?"s":""} en retard — non reçue{livraisonsRetard.length>1?"s":""}</div>
      {livraisonsRetard.map(o=>(
        <div key={o.id} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0",borderBottom:"0.5px solid #FFCCCC"}}>
          <div style={{flex:1}}><span style={{fontSize:12,fontWeight:600,color:"#CC2222"}}>{o.article}</span><span style={{fontSize:11,color:"#7A7A7A",marginLeft:8}}>{o.fourn} · prévue le {fmt(o.dateLivraison)}</span></div>
          <Badge label={`${Math.abs(diffWorkDays(o.dateLivraison))}j de retard`} bg="#FFF0F0" color="#CC2222"/>
        </div>
      ))}
    </div>}
    {/* KPIs */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}}>
      {[
        {val:encours.length,lbl:"En cours"},
        {val:attenteFacture.length,lbl:"En attente de facture",alert:attenteFacture.length>0},
        {val:historique.length,lbl:"Archivées"},
      ].map((m,i)=>(
        <div key={i} style={{background:"#fff",border:"0.5px solid #DDDDDD",borderTop:m.alert?"3px solid #CC8800":"3px solid #F2F0ED",borderRadius:8,padding:"12px 14px"}}>
          <div style={{fontSize:18,fontWeight:700,color:m.alert?"#CC8800":"#1C1C1C"}}>{m.val}</div>
          <div style={{fontSize:12,color:"#7A7A7A",marginTop:2}}>{m.lbl}</div>
        </div>
      ))}
    </div>

    {attenteFacture.length>0&&<div style={{background:"#FFF8EC",border:"0.5px solid #CC8800",borderLeft:"3px solid #CC8800",borderRadius:6,padding:"8px 12px",marginBottom:12,fontSize:13,color:"#CC8800"}}>
      {attenteFacture.length} facture(s) en attente de transmission à la comptabilité
    </div>}

    {/* ── ZONE 1 : En cours ── */}
    <Bd style={{marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <SecTitle>Commandes en cours</SecTitle>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>{setAiPreview(null);setAiErr("");setAiOpen(true);}} style={{padding:"6px 12px",borderRadius:4,border:"1px solid #CC2222",background:"#FFF0F0",cursor:"pointer",fontSize:12,fontFamily:"'DM Sans',sans-serif",color:"#CC2222",fontWeight:600,display:"flex",alignItems:"center",gap:5}}>🤖 Import IA</button>
          <Btn primary onClick={()=>{setErr("");setEditing(null);setForm(EO);setOpen(true);}}>+ Nouvelle commande</Btn>
        </div>
      </div>
      {!encours.length&&<div style={{fontSize:13,color:"#7A7A7A"}}>Aucune commande en cours.</div>}
      {encours.map(o=>{
        const retard=o.dateLivraison&&toISO(o.dateLivraison)<TODAY;
        return(
        <div key={o.id} style={{padding:"12px 0",borderBottom:"0.5px solid #EEEEEE",borderLeft:retard?"3px solid #CC2222":"none",paddingLeft:retard?8:0}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <div>
              <span style={{fontSize:13,fontWeight:700,color:"#1C1C1C"}}>{getLignes(o).length>1?`${getLignes(o).length} articles — ${o.ref||o.fourn}`:getLignes(o)[0].article}</span>
              {o.ref&&getLignes(o).length<=1&&<span style={{fontSize:11,color:"#7A7A7A",marginLeft:8,fontFamily:"'DM Mono',monospace"}}>{o.ref}</span>}
              {retard&&<Badge label="Livraison en retard" bg="#FFF0F0" color="#CC2222" style={{marginLeft:8}}/>}
            </div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>{setEditing(o.id);setForm({...o,qty:String(o.qty),prix:String(o.prix),date:toISO(o.date)||o.date,dateLivraison:o.dateLivraison?toISO(o.dateLivraison):"",lieuLivraison:o.lieuLivraison||"La Rochelle"});setLignesForm(getLignes(o).map(l=>({...l,qty:String(l.qty),prix:String(l.prix)})));setErr("");setOpen(true);}} style={{background:"none",border:"1px solid #DDDDDD",borderRadius:4,cursor:"pointer",fontSize:11,padding:"2px 8px",color:"#3A3A3A",fontFamily:"'DM Sans',sans-serif"}}>Modifier</button>
              <button onClick={()=>sheet.remove(o.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#7A7A7A"}}>✕</button>
            </div>
          </div>
          <div style={{fontSize:12,color:"#7A7A7A",marginBottom:4,display:"flex",gap:8,flexWrap:"wrap"}}>
            <span>{o.fourn} · Commandé le {fmt(o.date)}</span>
            {o.dateLivraison&&<span style={{color:retard?"#CC2222":"#2A7A2A",fontWeight:500}}>
              Livraison : {fmt(o.dateLivraison)}{retard&&` (${Math.abs(diffWorkDays(o.dateLivraison))}j retard)`}
              {o.lieuLivraison&&<span style={{marginLeft:6,background:o.lieuLivraison==="Chantier"?"#EBF3FF":"#F2F0ED",color:o.lieuLivraison==="Chantier"?"#1A5DAB":"#3A3A3A",fontSize:10,padding:"1px 6px",borderRadius:3,fontWeight:600}}>{o.lieuLivraison==="Chantier"?"📍 Chantier":"🏭 La Rochelle"}</span>}
            </span>}
            {o.projet&&<span style={{background:"#EBF3FF",color:"#1A5DAB",fontSize:11,padding:"1px 6px",borderRadius:4,fontWeight:500}}>{o.projet}</span>}
            {(o.tags||"").split(",").filter(Boolean).map((t,i)=><span key={i} style={{background:"#EBF3FF",color:"#1A5DAB",fontSize:10,fontWeight:600,padding:"1px 6px",borderRadius:10}}>{t.trim()}</span>)}
          </div>
          {/* Lignes articles */}
          {getLignes(o).map((l,i)=>(
            <div key={i} style={{display:"flex",gap:8,padding:"3px 0",borderBottom:"0.5px solid #F5F5F5",alignItems:"center"}}>
              <span style={{fontSize:11,color:"#1C1C1C",flex:1}}>{l.article}</span>
              <span style={{fontSize:11,color:"#7A7A7A",whiteSpace:"nowrap"}}>{l.qty} {l.unit}</span>
              {l.prix>0&&<span style={{fontSize:11,color:"#3A3A3A",whiteSpace:"nowrap",fontFamily:"'DM Mono',monospace"}}>{(+l.prix*(+l.qty||1)).toLocaleString("fr-FR")} €</span>}
            </div>
          ))}
          {getLignes(o).length>1&&<div style={{textAlign:"right",fontSize:11,fontWeight:700,color:"#1C1C1C",marginTop:3}}>
            Total : {totalCommande(o).toLocaleString("fr-FR")} €
          </div>}
          <div style={{display:"flex",gap:16,flexWrap:"wrap",marginTop:6}}>
            <Check checked={isBool(o.recue)} onChange={()=>toggleRecue(o)} label="Reçue → ajout au stock" color="#2A7A2A"/>
            <Check checked={isBool(o.factureCompta)} onChange={()=>toggleFacture(o)} label="Facture reçue" color="#CC8800"/>
          </div>
        </div>
        );
      })}
    </Bd>

    {/* ── ZONE 2 : Reçues, facture en attente ── */}
    {attenteFacture.length>0&&<Bd style={{marginBottom:12,borderLeft:"3px solid #CC8800"}}>
      <SecTitle>Reçues — facture en attente ({attenteFacture.length})</SecTitle>
      {attenteFacture.map(o=>(
        <div key={o.id} style={{padding:"10px 0",borderBottom:"0.5px solid #EEEEEE"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
            <div>
              <span style={{fontSize:13,fontWeight:700,color:"#1C1C1C"}}>{o.article}</span>
              {o.ref&&<span style={{fontSize:11,color:"#7A7A7A",marginLeft:8,fontFamily:"'DM Mono',monospace"}}>{o.ref}</span>}
            </div>
            <Badge label="Reçue" bg="#F0FFF0" color="#2A7A2A"/>
          </div>
          <div style={{fontSize:12,color:"#7A7A7A",marginBottom:8,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            <span>{o.fourn} · {fmt(o.date)} · {totalCommande(o)>0?totalCommande(o).toLocaleString("fr-FR")+" €":""}</span>
            {o.projet&&<span style={{background:"#EBF3FF",color:"#1A5DAB",fontSize:11,padding:"1px 6px",borderRadius:4,fontWeight:500}}>{o.projet}</span>}
            {(o.tags||"").split(",").filter(Boolean).map((t,i)=><span key={i} style={{background:"#EBF3FF",color:"#1A5DAB",fontSize:10,fontWeight:600,padding:"1px 6px",borderRadius:10}}>{t.trim()}</span>)}
          </div>
          <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
            <Check checked={false} onChange={()=>toggleRecue(o)} label="Annuler réception (retour en cours)" color="#CC2222"/>
            <Check checked={isBool(o.factureCompta)} onChange={()=>toggleFacture(o)} label="Facture transmise → archiver" color="#CC2222"/>
          </div>
        </div>
      ))}
    </Bd>}

    {/* ── ZONE 3 : Historique archivé ── */}
    {historique.length>0&&<Bd>
      <SecTitle>Historique — archivées ({historique.length})</SecTitle>
      {(showAllHisto?historique:historique.slice(0,5)).map(o=>(
        <div key={o.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:"0.5px solid #EEEEEE"}}>
          <div style={{flex:1}}>
            <div style={{fontSize:13,color:"#7A7A7A",textDecoration:"line-through"}}>{getLignes(o).length>1?`${getLignes(o).length} articles`:o.article}</div>
            <div style={{fontSize:11,color:"#7A7A7A",display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
              <span style={{fontFamily:"'DM Mono',monospace"}}>{o.fourn} · {fmt(o.date)}{totalCommande(o)>0&&` · ${totalCommande(o).toLocaleString("fr-FR")} €`}</span>
              {o.projet&&<span style={{background:"#EBF3FF",color:"#1A5DAB",fontSize:11,padding:"1px 6px",borderRadius:4,fontWeight:500}}>{o.projet}</span>}
              {(o.tags||"").split(",").filter(Boolean).map((t,i)=><span key={i} style={{background:"#EBF3FF",color:"#1A5DAB",fontSize:10,fontWeight:600,padding:"1px 6px",borderRadius:10}}>{t.trim()}</span>)}
            </div>
          </div>
          <Badge label="Reçue" bg="#F0FFF0" color="#2A7A2A"/>
          <Badge label="Compta ✓" bg="#F0FFF0" color="#2A7A2A"/>
          <button onClick={()=>{setEditing(o.id);setForm({...o,qty:String(o.qty),prix:String(o.prix),date:toISO(o.date)||o.date,dateLivraison:o.dateLivraison?toISO(o.dateLivraison):"",lieuLivraison:o.lieuLivraison||"La Rochelle"});setLignesForm(getLignes(o).map(l=>({...l,qty:String(l.qty),prix:String(l.prix)})));setErr("");setOpen(true);}} style={{background:"none",border:"1px solid #DDDDDD",borderRadius:4,cursor:"pointer",fontSize:11,padding:"2px 8px",color:"#3A3A3A",fontFamily:"'DM Sans',sans-serif",flexShrink:0}}>Modifier</button>
          <button onClick={async()=>{
            if(!confirm(`Supprimer "${o.article||getLignes(o)[0]?.article}" de l'historique ?\n\nLes quantités seront retirées du stock.`))return;
            const lignes=getLignes(o);
            for(const l of lignes){
              if(!l.article)continue;
              const sx=stocks.rows.find(x=>normRef(x.ref)===normRef(l.article));
              if(sx){await stocks.update(sx.id,{...sx,qty:Math.max(0,Number(sx.qty)-(+l.qty||0))});}
            }
            if(o.dateLivraison&&events){const evLivr=events.rows.find(e=>e.type==="livraison"&&(e.title||"").includes(o.article||getLignes(o)[0]?.article||"")&&toISO(e.date)===toISO(o.dateLivraison));if(evLivr)await events.remove(evLivr.id);}
            await sheet.remove(o.id);
          }} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#CC2222",flexShrink:0}}>✕</button>
        </div>
      ))}
      {!showAllHisto&&historique.length>5&&(
        <div onClick={()=>setShowAllHisto(true)} style={{textAlign:"center",padding:"8px 0",fontSize:12,color:"#1A5DAB",cursor:"pointer",borderTop:"0.5px solid #EEEEEE",marginTop:4}}>
          ↓ Voir les {historique.length-5} autres ({historique.length} au total)
        </div>
      )}
      {showAllHisto&&historique.length>5&&(
        <div onClick={()=>setShowAllHisto(false)} style={{textAlign:"center",padding:"8px 0",fontSize:12,color:"#7A7A7A",cursor:"pointer",borderTop:"0.5px solid #EEEEEE",marginTop:4}}>
          ↑ Réduire
        </div>
      )}
    </Bd>}
    </>}
  </WithPanel>;
}

// ══ APP ROOT ══
const PANELS=[
  {id:"dashboard",label:"Tableau de bord"},
  {id:"projets",label:"Projets"},
  {id:"taches",label:"Tâches"},
  {id:"calendrier",label:"Calendrier"},
  {id:"equipes",label:"Équipe"},
  {id:"atelier",label:"Atelier"},
  {id:"chantier",label:"Chantier"},
  {id:"prestataires",label:"Prestataires"},
  {id:"fournisseurs",label:"Fournisseurs"},
  {id:"stocks",label:"Stocks"},
  {id:"commandes",label:"Commandes"},
];

function App(){
  const [panel,setPanel]=useState("dashboard");
  const [initializing,setInitializing]=useState(true);
  const [initErr,setInitErr]=useState(null);
  const projects=useSheet("projects");
  const tasks=useSheet("tasks");
  const events=useSheet("events");
  const team=useSheet("team");
  const journal=useSheet("journal");
  const fournisseurs=useSheet("fournisseurs");
  const stocks=useSheet("stocks");
  const orders=useSheet("orders");
  const devis=useSheet("Devis");
  const notes=useSheet("notes");
  const prestataires=useSheet("prestataires");
  const prestMissions=useSheet("prestMissions");
  const atelierChantier=useSheet("atelierChantier");
  const sheets={projects,tasks,events,team,journal,fournisseurs,stocks,orders,notes,prestataires,prestMissions,atelierChantier};

  useEffect(()=>{
    const onUnhandled=(event)=>{
      const msg=event.reason&&event.reason.message?event.reason.message:String(event.reason||"Erreur inattendue");
      console.error("Unhandled rejection",event.reason);
      setInitErr(msg);event.preventDefault();
    };
    window.addEventListener("unhandledrejection",onUnhandled);
    gasInit().then(()=>setInitializing(false)).catch(e=>{setInitErr(e.message||"Erreur de connexion");setInitializing(false);});
    return()=>window.removeEventListener("unhandledrejection",onUnhandled);
  },[]);

  const alerts=[...projects.rows.filter(p=>p.statut==="retard"),...stocks.rows.filter(s=>Number(s.qty)<Number(s.min)),...orders.rows.filter(o=>(o.recue===true||o.recue==="TRUE")&&!o.factureCompta&&o.factureCompta!=="TRUE")];

  if(initializing)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:16,background:"#F2F0ED"}}>
      <HPLogo/>
      <div style={{fontSize:13,color:"#7A7A7A"}}>Connexion à Google Sheets...</div>
      <div className="spin" style={{fontSize:20,color:"#CC2222"}}>⟳</div>
    </div>
  );

  if(initErr)return(
    <div style={{padding:24,maxWidth:500,margin:"80px auto"}}>
      <div style={{background:"#fff",border:"0.5px solid #DDDDDD",borderTop:"3px solid #CC2222",borderRadius:10,padding:20}}>
        <HPLogo/>
        <div style={{fontSize:14,fontWeight:700,color:"#CC2222",margin:"12px 0 6px"}}>Erreur de connexion</div>
        <div style={{fontSize:13,color:"#3A3A3A",marginBottom:14}}>{initErr}</div>
        <Btn primary onClick={()=>window.location.reload()}>Recharger la page</Btn>
      </div>
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",minHeight:"100vh",background:"#F2F0ED"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",padding:"10px 20px",borderBottom:"1.5px solid #CC2222",background:"#fff",flexWrap:"wrap",gap:4,position:"sticky",top:0,zIndex:10}}>
        <HPLogo/>
        <div style={{width:1,height:24,background:"#DDDDDD",margin:"0 12px"}}/>
        {PANELS.map(p=>(
          <button key={p.id} onClick={()=>setPanel(p.id)} style={{
            background:"none",border:"none",cursor:"pointer",
            padding:"6px 12px",borderRadius:4,fontSize:12,
            fontWeight:panel===p.id?700:400,
            color:panel===p.id?"#CC2222":"#3A3A3A",
            borderBottom:panel===p.id?"2px solid #CC2222":"2px solid transparent",
            fontFamily:"'DM Sans',sans-serif",transition:"all .15s"
          }}>{p.label}</button>
        ))}
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
          {alerts.length>0&&<span style={{background:"#CC2222",color:"#fff",fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:4}}>{alerts.length} alerte{alerts.length>1?"s":""}</span>}
          <span style={{fontSize:10,color:"#7A7A7A",fontFamily:"'DM Mono',monospace",border:"0.5px solid #DDDDDD",borderRadius:4,padding:"2px 6px"}}>{VERSION}</span>
        </div>
      </div>
      {/* Content */}
      <div style={{flex:1,padding:20}}>
        {panel==="dashboard"      &&<Dashboard sheets={sheets}/>}
        {panel==="projets"        &&<Projets sheet={projects} notes={notes} tasks={tasks} orders={orders} stocks={stocks} events={events} prestMissions={prestMissions} atelierChantier={atelierChantier} team={team}/>}
        {panel==="taches"         &&<Taches sheet={tasks} projects={projects}/>}
        {panel==="calendrier"     &&<Calendrier sheet={events} projects={projects} atelierChantier={atelierChantier}/>}
        {panel==="equipes"        &&<Equipes sheet={team} journal={journal}/>}
        {panel==="atelier"        &&<MissionModule moduleType="atelier" sheet={atelierChantier} projects={projects} team={team} stocks={stocks} events={events} fournisseurs={fournisseurs}/>}
        {panel==="chantier"       &&<MissionModule moduleType="chantier" sheet={atelierChantier} projects={projects} team={team} stocks={stocks} events={events} orders={orders} fournisseurs={fournisseurs}/>}
        {panel==="prestataires"   &&<Prestataires sheet={prestataires} missions={prestMissions} projects={projects} stocks={stocks} events={events} fournisseurs={fournisseurs}/>}
        {panel==="fournisseurs"   &&<Fournisseurs sheet={fournisseurs}/>}
        {panel==="stocks"         &&<Stocks sheet={stocks} fournisseurs={fournisseurs} projects={projects} orders={orders} atelierChantier={atelierChantier} prestMissions={prestMissions}/>}
        {panel==="commandes"      &&<Commandes sheet={orders} stocks={stocks} fournisseurs={fournisseurs} projects={projects} events={events} devis={devis}/>}
      </div>
      {/* Footer */}
      <div style={{textAlign:"center",padding:"10px 20px",fontSize:10,color:"#7A7A7A",borderTop:"0.5px solid #DDDDDD",background:"#fff",fontFamily:"'DM Sans',sans-serif"}}>
        HIGH POINT — 17 rue Robert Geffré — 17000 La Rochelle — FRANCE — SARL au capital de 32 000 € — SIRET : 53454409300030
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>
</body>
</html>
