                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:11,color:"#7A7A7A"}}>{missionsPersonne.length} mission{missionsPersonne.length>1?"s":""} active{missionsPersonne.length>1?"s":""}</div>
                  {enCours>0&&<div style={{fontSize:11,color:"#CC2222",fontWeight:600}}>{enCours} en cours</div>}
                </div>
              </div>

              {/* Barre de progression globale */}
              {nTotal>0&&<div style={{marginBottom:12}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#7A7A7A",marginBottom:4}}>
                  <span>Avancement global</span>
                  <span style={{fontWeight:600,color:"#1C1C1C"}}>{pct}%</span>
                </div>
                <div style={{height:4,borderRadius:2,background:"#EEEEEE",overflow:"hidden"}}>
                  <div style={{height:"100%",width:pct+"%",background:pct===100?"#2A7A2A":"#CC2222",borderRadius:2,transition:"width .3s"}}/>
                </div>
                <div style={{display:"flex",gap:10,marginTop:5,fontSize:10,color:"#7A7A7A"}}>
                  {planifiees>0&&<span style={{color:"#7A7A7A"}}>● {planifiees} planifiée{planifiees>1?"s":""}</span>}
                  {enCours>0&&<span style={{color:"#CC2222"}}>● {enCours} en cours</span>}
                  {nTerminees>0&&<span style={{color:"#2A7A2A"}}>● {nTerminees} terminée{nTerminees>1?"s":""}</span>}
                </div>
              </div>}

              {/* Liste des missions */}
              {missionsPersonne.map(m=>{
                const s=sb(m.statut);
                const autresMembres=getMembres(m).filter(x=>x!==membre.nom);
                return(
                  <div key={m.id} style={{padding:"9px 0",borderBottom:"0.5px solid #EEEEEE"}}>
                    <div style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:4}}>
                      <div style={{width:3,background:barColor(m.statut),borderRadius:2,alignSelf:"stretch",flexShrink:0,minHeight:16}}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,fontWeight:600,color:"#1C1C1C",marginBottom:2}}>{m.description}</div>
                        {m.projet&&<div style={{fontSize:11,color:"#7A7A7A"}}>{m.projet}</div>}
                        {(m.dateDebut||m.dateFin)&&(
                          <div style={{fontSize:11,color:"#7A7A7A",marginTop:2}}>
                            {m.dateDebut&&fmt(m.dateDebut)}{m.dateFin&&` → ${fmt(m.dateFin)}`}
                          </div>
                        )}
                        {autresMembres.length>0&&(
                          <div style={{fontSize:10,color:"#AAAAAA",marginTop:3}}>
                            avec {autresMembres.join(", ")}
                          </div>
                        )}
                      </div>
                      <Badge label={m.statut} bg={s.bg} color={s.tx}/>
                    </div>
                    {/* Actions rapides */}
                    {m.statut!=="terminé"&&(
                      <div style={{display:"flex",gap:6,paddingLeft:11,marginTop:4}}>
                        <button onClick={()=>sheet.update(m.id,{...m,statut:"en cours",membres:getMembres(m).join(",")})}
                          style={{fontSize:10,padding:"2px 8px",borderRadius:4,border:"1px solid #DDDDDD",background:m.statut==="en cours"?"#FFF0F0":"#fff",color:m.statut==="en cours"?"#CC2222":"#3A3A3A",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
                          En cours
                        </button>
                        <button onClick={()=>terminer(m)}
                          style={{fontSize:10,padding:"2px 8px",borderRadius:4,border:"1px solid #2A7A2A",background:"#F0FFF0",color:"#2A7A2A",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>
                          ✓ Terminé
                        </button>
                      </div>
                    )}
                    {m.statut==="terminé"&&(
                      <div style={{paddingLeft:11,marginTop:3,fontSize:10,color:"#2A7A2A",fontWeight:600}}>✓ Mission terminée</div>
                    )}
                  </div>
                );
              })}

              {/* Si toutes terminées pour cette personne */}
              {missionsPersonne.length===0&&(
                <div style={{fontSize:12,color:"#2A7A2A",fontWeight:500,padding:"8px 0"}}>✓ Toutes les missions sont terminées.</div>
              )}
            </Bd>
          );
        })}
      </div>

      {/* Membres sans mission active mais avec historique */}
      {team.rows.filter(t=>!membresActifs.find(m=>m.id===t.id)&&terminees.some(m=>getMembres(m).includes(t.nom))).length>0&&(
        <div style={{marginTop:16}}>
          <div style={{fontSize:13,fontWeight:700,color:"#7A7A7A",borderLeft:"3px solid #DDDDDD",paddingLeft:8,marginBottom:10}}>
            Membres sans mission active
          </div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {team.rows.filter(t=>!membresActifs.find(m=>m.id===t.id)&&terminees.some(m=>getMembres(m).includes(t.nom))).map(t=>{
              const n=terminees.filter(m=>getMembres(m).includes(t.nom)).length;
              return(
                <div key={t.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:"#F9F9F9",borderRadius:8,border:"0.5px solid #EEEEEE"}}>
                  <div style={{width:28,height:28,borderRadius:"50%",background:"#DDDDDD",display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <span style={{fontSize:11,fontWeight:700,color:"#7A7A7A"}}>{initials(t.nom)}</span>
                  </div>
                  <div>
                    <div style={{fontSize:12,fontWeight:600,color:"#3A3A3A"}}>{t.nom}</div>
                    <div style={{fontSize:11,color:"#7A7A7A"}}>{n} mission{n>1?"s":""} terminée{n>1?"s":""}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </>}
  </WithPanel>;
}
const ET={text:"",projet:"",due:""};
function Taches({sheet,projects}){
  const [open,setOpen]=useState(false);
  const [form,setForm]=useState(ET);
  const [editing,setEditing]=useState(null);
  const [filter,setFilter]=useState("pending");
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");
  const f=(k,v)=>setForm(x=>({...x,[k]:v}));
  const isDone=t=>t.done===true||t.done==="TRUE";

  async function save(){
    if(!form.text.trim()){setErr("Description obligatoire.");return;}
    setSaving(true);setErr("");
    try{
      const item={...form,done:editing?isDone(sheet.rows.find(t=>Number(t.id)===Number(editing))||{}):false};
      if(editing){await sheet.update(editing,item);}else{await sheet.add(item);}
      setOpen(false);
    }catch(e){setErr(e.message);}setSaving(false);
  }
  async function toggle(t){await sheet.update(t.id,{...t,done:!isDone(t)});}

  // Tri : en retard → urgent → normal → faible → terminées, puis par date
  const sorted=[...sheet.rows].sort((a,b)=>{
    const order={critique:0,high:1,med:2,low:3};
    const ua=autoUrgence(a.due,a.done), ub=autoUrgence(b.due,b.done);
    if(isDone(a)!==isDone(b))return isDone(a)?1:-1;
    if(ua!==ub)return(order[ua]||2)-(order[ub]||2);
    return toISO(a.due).localeCompare(toISO(b.due));
  });
  const filtered=sorted.filter(t=>filter==="all"||(filter==="pending"&&!isDone(t))||(filter==="done"&&isDone(t)));

  const panel=open&&<SidePanel title={editing?"Modifier la tâche":"Nouvelle tâche"} onClose={()=>setOpen(false)}>
    <FG label="Description *"><Inp value={form.text} onChange={e=>f("text",e.target.value)} placeholder="Ex: Relance fournisseur profilés"/></FG>
    <FG label="Échéance"><Inp type="date" value={form.due} onChange={e=>f("due",e.target.value)}/></FG>
    <FG label="Projet"><Sel value={form.projet} onChange={e=>f("projet",e.target.value)}><option value="">— Aucun —</option>{projects.rows.map(p=><option key={p.id}>{p.name}</option>)}</Sel></FG>
    <div style={{background:"#F2F0ED",borderRadius:6,padding:"8px 10px",fontSize:12,color:"#7A7A7A",marginBottom:10}}>
      L'urgence est calculée automatiquement selon l'échéance :<br/>
      &gt;7j → Faible · ≤7j → Normal · ≤2j → Urgent · Dépassée → En retard
    </div>
    <ErrMsg msg={err}/><PanelBtns onCancel={()=>setOpen(false)} onSave={save} saving={saving} saveLabel={editing?"Mettre à jour":"Ajouter"}/>
  </SidePanel>;

  return <WithPanel panel={panel}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div style={{display:"flex",gap:4,alignItems:"center"}}>
        {[["pending","En cours"],["done","Terminées"],["all","Toutes"]].map(([v,l])=>(
          <button key={v} onClick={()=>setFilter(v)} style={{padding:"5px 12px",borderRadius:4,fontSize:12,cursor:"pointer",border:"1px solid #DDDDDD",background:filter===v?"#CC2222":"#fff",color:filter===v?"#fff":"#3A3A3A",fontFamily:"'DM Sans',sans-serif",fontWeight:filter===v?700:400}}>{l}</button>
        ))}
        <span style={{fontSize:11,color:"#7A7A7A",marginLeft:8,fontFamily:"'DM Mono',monospace"}}>{sheet.rows.length} tâches chargées</span>
      </div>
      <Btn primary onClick={()=>{setEditing(null);setForm(ET);setErr("");setOpen(true);}}>+ Nouvelle tâche</Btn>
    </div>
    <Bd>
      {!filtered.length&&<div style={{fontSize:13,color:"#7A7A7A",padding:"10px 0"}}>Aucune tâche.</div>}
      {filtered.map(t=>{
        const done=isDone(t);
        const urg=autoUrgence(t.due,t.done);
        const u=UC[urg]||UC.med;
        const d=diffDays(t.due);
        const dueLbl=t.due?(d<0?`${Math.abs(d)}j de retard`:d===0?"Aujourd'hui":d===1?"Demain":`${fmt(t.due)}`):null;
        return(
          <div key={t.id} style={{display:"flex",alignItems:"flex-start",gap:10,padding:"11px 0",borderBottom:"0.5px solid #EEEEEE"}}>
            <Check checked={done} onChange={()=>toggle(t)} color="#CC2222"/>
            <div style={{flex:1}}>
              <div style={{fontSize:13,textDecoration:done?"line-through":"none",color:done?"#7A7A7A":"#1C1C1C",fontWeight:done?400:500}}>{t.text}</div>
              <div style={{fontSize:11,color:"#7A7A7A",marginTop:2,display:"flex",gap:8}}>
                {t.projet&&<span>{t.projet}</span>}
                {dueLbl&&<span style={{color:urg==="critique"?"#CC2222":urg==="high"?"#CC2222":"#7A7A7A",fontWeight:urg==="critique"||urg==="high"?700:400}}>{dueLbl}</span>}
              </div>
            </div>
            <Badge label={u.lbl} bg={u.bg} color={u.tx}/>
            <button onClick={()=>{setEditing(t.id);setForm({text:t.text,projet:t.projet||"",due:toISO(t.due)||""});setErr("");setOpen(true);}} style={{background:"none",border:"1px solid #DDDDDD",borderRadius:4,cursor:"pointer",fontSize:11,padding:"2px 8px",color:"#3A3A3A",fontFamily:"'DM Sans',sans-serif"}}>Modifier</button>
            <button onClick={()=>sheet.remove(t.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#7A7A7A"}}>✕</button>
          </div>
        );
      })}
    </Bd>
  </WithPanel>;
}

// ══ CALENDRIER ══
function Calendrier({sheet,projects}){
  const [year,setYear]=useState(()=>new Date().getFullYear());
  const [month,setMonth]=useState(()=>new Date().getMonth());
  const [view,setView]=useState("mois"); // mois | semaine | jour
  const [selectedDay,setSelectedDay]=useState(TODAY);
  const [open,setOpen]=useState(false);
  const [form,setForm]=useState({title:"",date:"",heure:"",type:"rdv",projet:"",note:""});
  const [editing,setEditing]=useState(null);
  const [saving,setSaving]=useState(false);
  const f=(k,v)=>setForm(x=>({...x,[k]:v}));

  const prevM=()=>{if(month===0){setMonth(11);setYear(y=>y-1);}else setMonth(m=>m-1);};
  const nextM=()=>{if(month===11){setMonth(0);setYear(y=>y+1);}else setMonth(m=>m+1);};

  // Navigation semaine
  const [weekStart,setWeekStart]=useState(()=>{
    const d=new Date(TODAY+"T00:00:00");
    const dow=d.getDay()===0?6:d.getDay()-1;
    d.setDate(d.getDate()-dow);
    return d.toISOString().split("T")[0];
  });
  const weekDays=Array.from({length:7},(_,i)=>{
    const d=new Date(weekStart+"T00:00:00");
    d.setDate(d.getDate()+i);
    return d.toISOString().split("T")[0];
  });
  const prevW=()=>{const d=new Date(weekStart+"T00:00:00");d.setDate(d.getDate()-7);setWeekStart(d.toISOString().split("T")[0]);};
  const nextW=()=>{const d=new Date(weekStart+"T00:00:00");d.setDate(d.getDate()+7);setWeekStart(d.toISOString().split("T")[0]);};

  const prevD=()=>{const d=new Date(selectedDay+"T00:00:00");d.setDate(d.getDate()-1);setSelectedDay(d.toISOString().split("T")[0]);};
  const nextD=()=>{const d=new Date(selectedDay+"T00:00:00");d.setDate(d.getDate()+1);setSelectedDay(d.toISOString().split("T")[0]);};

  async function save(){
    if(!form.title||!form.date)return;
    setSaving(true);
    try{if(editing){await sheet.update(editing,form);}else{await sheet.add(form);}setOpen(false);}
    catch(e){}setSaving(false);
  }

  function openNew(date=""){
    setEditing(null);
    setForm({title:"",date:date||TODAY,heure:"",type:"rdv",projet:"",note:""});
    setOpen(true);
  }

  // DEBUG temporaire — à supprimer une fois le problème résolu
  const [showDebug,setShowDebug]=useState(false);

  // Événements d'un jour donné — comparaison robuste multi-format
  const eventsForDay=(day)=>sheet.rows.filter(e=>{
    if(e.date===undefined||e.date===null||e.date==="")return false;
    return toISO(e.date)===day;
  }).sort((a,b)=>(a.heure||"").localeCompare(b.heure||""));

  // ── Vue MOIS ──
  const firstDow=(()=>{let d=new Date(year,month,1).getDay();return d===0?6:d-1;})();
  const dim=new Date(year,month+1,0).getDate();
  const prevDim=new Date(year,month,0).getDate();
  function ds(d){return year+"-"+String(month+1).padStart(2,"0")+"-"+String(d).padStart(2,"0");}
  const cells=[];
  for(let i=firstDow-1;i>=0;i--)cells.push({day:prevDim-i,cur:false});
  for(let d=1;d<=dim;d++)cells.push({day:d,cur:true});
  while(cells.length%7!==0)cells.push({day:cells.length-firstDow-dim+1,cur:false});

  const panel=open&&<SidePanel title={editing?"Modifier l'événement":"Nouvel événement"} onClose={()=>setOpen(false)}>
    <FG label="Titre *"><Inp value={form.title} onChange={e=>f("title",e.target.value)} placeholder="Ex: RDV maître d'ouvrage"/></FG>
    <FG label="Date *"><Inp type="date" value={form.date} onChange={e=>f("date",e.target.value)}/></FG>
    <FG label="Heure"><Inp type="time" value={form.heure||""} onChange={e=>f("heure",e.target.value)}/></FG>
    <FG label="Type"><Sel value={form.type} onChange={e=>f("type",e.target.value)}>
      <option value="rdv">Rendez-vous</option>
      <option value="deadline">Deadline</option>
      <option value="chantier">Démarrage chantier</option>
      <option value="livraison">Livraison</option>
      <option value="reunion">Réunion</option>
    </Sel></FG>
    <FG label="Projet"><Sel value={form.projet} onChange={e=>f("projet",e.target.value)}>
      <option value="">— Aucun —</option>
      {projects.rows.map(p=><option key={p.id}>{p.name}</option>)}
    </Sel></FG>
    <FG label="Note"><Inp value={form.note} onChange={e=>f("note",e.target.value)} placeholder="Optionnel"/></FG>
    <PanelBtns onCancel={()=>setOpen(false)} onSave={save} saving={saving} saveLabel={editing?"Mettre à jour":"Enregistrer"}/>
  </SidePanel>;

  // Barre de navigation commune
  const NavBar=()=>(
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
      <div style={{display:"flex",gap:4}}>
        {["mois","semaine","jour"].map(v=>(
          <button key={v} onClick={()=>setView(v)} style={{padding:"5px 12px",borderRadius:4,fontSize:12,cursor:"pointer",border:"1px solid #DDDDDD",background:view===v?"#CC2222":"#fff",color:view===v?"#fff":"#3A3A3A",fontFamily:"'DM Sans',sans-serif",fontWeight:view===v?700:400,textTransform:"capitalize"}}>{v}</button>
        ))}
      </div>
      <Btn primary onClick={()=>openNew()}>+ Ajouter</Btn>
    </div>
  );

  // Composant événement inline
  const EvChip=({ev})=>(
    <div onClick={()=>{setEditing(ev.id);setForm({title:ev.title,date:toISO(ev.date),heure:ev.heure||"",type:ev.type,projet:ev.projet||"",note:ev.note||""});setOpen(true);}}
      style={{background:EV_COLORS[ev.type]||"#7A7A7A",color:"#fff",borderRadius:3,padding:"2px 5px",fontSize:11,marginBottom:2,cursor:"pointer",overflow:"hidden",whiteSpace:"nowrap",textOverflow:"ellipsis"}}>
      {ev.heure&&<span style={{opacity:.8,marginRight:4}}>{ev.heure}</span>}{ev.title}
    </div>
  );

  return <WithPanel panel={panel}>
    <NavBar/>
    {/* DEBUG TEMPORAIRE */}
    <div style={{marginBottom:10}}>
      <button onClick={()=>setShowDebug(d=>!d)} style={{fontSize:11,color:"#7A7A7A",background:"none",border:"1px solid #DDDDDD",borderRadius:4,padding:"2px 8px",cursor:"pointer",fontFamily:"'DM Mono',monospace"}}>🔍 Debug données ({sheet.rows.length} événements)</button>
      {showDebug&&<div style={{marginTop:8,padding:"10px 12px",background:"#1C1C1C",borderRadius:6,fontSize:11,color:"#F0F0F0",fontFamily:"'DM Mono',monospace",maxHeight:200,overflowY:"auto",whiteSpace:"pre-wrap"}}>
        {sheet.rows.length===0?"⚠ Aucune ligne reçue de Google Sheets":sheet.rows.slice(0,5).map(e=>`id:${e.id} | date:"${e.date}" | type:${typeof e.date} | toISO:"${toISO(e.date)}" | title:"${e.title}"`).join("\n")}
      </div>}
    </div>

    {/* ── VUE MOIS ── */}
    {view==="mois"&&<>
      <Bd style={{marginBottom:12}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,paddingBottom:10,borderBottom:"0.5px solid #EEEEEE"}}>
          <button onClick={prevM} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#7A7A7A",padding:"0 8px"}}>‹</button>
          <span style={{fontSize:14,fontWeight:700,color:"#1C1C1C"}}>{MONTHS[month]} {year}</span>
          <button onClick={nextM} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#7A7A7A",padding:"0 8px"}}>›</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
          {["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"].map((d,i)=><div key={i} style={{textAlign:"center",fontSize:11,fontWeight:700,color:"#7A7A7A",padding:"4px 0"}}>{d}</div>)}
          {cells.map((c,i)=>{
            const dStr=c.cur?ds(c.day):null;
            const evs=dStr?eventsForDay(dStr):[];
            const isT=dStr===TODAY;
            return(
              <div key={i} onClick={()=>{if(c.cur){setSelectedDay(dStr);setView("jour");}}}
                style={{minHeight:72,borderRadius:6,padding:"4px 5px",fontSize:12,color:c.cur?"#1C1C1C":"#CCCCCC",background:isT?"#FFF0F0":"#fff",border:isT?"1px solid #CC2222":"1px solid #EEEEEE",cursor:c.cur?"pointer":"default",transition:"background .1s"}}>
                <div style={{fontWeight:isT?700:500,color:isT?"#CC2222":"#1C1C1C",marginBottom:2}}>{c.day}</div>
                {evs.slice(0,2).map(ev=><EvChip key={ev.id} ev={ev}/>)}
                {evs.length>2&&<div style={{fontSize:10,color:"#7A7A7A"}}>+{evs.length-2} autres</div>}
              </div>
            );
          })}
        </div>
      </Bd>
    </>}

    {/* ── VUE SEMAINE ── */}
    {view==="semaine"&&<Bd>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,paddingBottom:10,borderBottom:"0.5px solid #EEEEEE"}}>
        <button onClick={prevW} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#7A7A7A",padding:"0 8px"}}>‹</button>
        <span style={{fontSize:14,fontWeight:700,color:"#1C1C1C"}}>{fmt(weekDays[0])} — {fmt(weekDays[6])}</span>
        <button onClick={nextW} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#7A7A7A",padding:"0 8px"}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:6}}>
        {weekDays.map((day,i)=>{
          const evs=eventsForDay(day);
          const isT=day===TODAY;
          const d=new Date(day+"T00:00:00");
          const dayNames=["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"];
          return(
            <div key={i} style={{minHeight:120,borderRadius:6,border:isT?"1px solid #CC2222":"1px solid #EEEEEE",background:isT?"#FFF0F0":"#fff",padding:6}}>
              <div style={{fontSize:11,fontWeight:700,color:isT?"#CC2222":"#7A7A7A",marginBottom:4,textAlign:"center"}}>{dayNames[i]}<br/><span style={{fontSize:13,color:isT?"#CC2222":"#1C1C1C"}}>{d.getDate()}</span></div>
              {evs.map(ev=><EvChip key={ev.id} ev={ev}/>)}
              <div onClick={()=>{setSelectedDay(day);openNew(day);}} style={{fontSize:10,color:"#CC2222",cursor:"pointer",marginTop:4,textAlign:"center"}}>+ Ajouter</div>
            </div>
          );
        })}
      </div>
    </Bd>}

    {/* ── VUE JOUR ── */}
    {view==="jour"&&<Bd>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,paddingBottom:10,borderBottom:"0.5px solid #EEEEEE"}}>
        <button onClick={prevD} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#7A7A7A",padding:"0 8px"}}>‹</button>
        <span style={{fontSize:14,fontWeight:700,color:selectedDay===TODAY?"#CC2222":"#1C1C1C"}}>
          {selectedDay===TODAY?"Aujourd'hui — ":""}{fmt(selectedDay)}
        </span>
        <button onClick={nextD} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#7A7A7A",padding:"0 8px"}}>›</button>
      </div>
      {eventsForDay(selectedDay).length===0&&<div style={{fontSize:13,color:"#7A7A7A",padding:"10px 0"}}>Aucun événement ce jour.</div>}
      {eventsForDay(selectedDay).map(ev=>(
        <div key={ev.id} style={{display:"flex",gap:10,padding:"10px 12px",borderRadius:6,background:"#F9F9F9",marginBottom:8,border:"0.5px solid #EEEEEE",borderLeft:`3px solid ${EV_COLORS[ev.type]||"#7A7A7A"}`}}>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
              {ev.heure&&<span style={{fontSize:12,fontWeight:700,color:"#CC2222",fontFamily:"'DM Mono',monospace"}}>{ev.heure}</span>}
              <span style={{fontSize:13,fontWeight:700,color:"#1C1C1C"}}>{ev.title}</span>
              <Badge label={EV_LABELS[ev.type]||ev.type} bg="#F2F0ED" color="#3A3A3A"/>
            </div>
            {ev.projet&&<div style={{fontSize:12,color:"#7A7A7A"}}>{ev.projet}</div>}
            {ev.note&&<div style={{fontSize:12,color:"#7A7A7A",fontStyle:"italic",marginTop:3}}>{ev.note}</div>}
          </div>
          <div style={{display:"flex",gap:4,alignSelf:"flex-start"}}>
            <button onClick={()=>{setEditing(ev.id);setForm({title:ev.title,date:toISO(ev.date),heure:ev.heure||"",type:ev.type,projet:ev.projet||"",note:ev.note||""});setOpen(true);}} style={{background:"none",border:"1px solid #DDDDDD",borderRadius:4,cursor:"pointer",fontSize:11,padding:"2px 8px",color:"#3A3A3A",fontFamily:"'DM Sans',sans-serif"}}>Modifier</button>
            <button onClick={()=>sheet.remove(ev.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#7A7A7A"}}>✕</button>
          </div>
        </div>
      ))}
      <div onClick={()=>openNew(selectedDay)} style={{fontSize:13,color:"#CC2222",cursor:"pointer",marginTop:8,display:"flex",alignItems:"center",gap:4,fontWeight:500}}>+ Ajouter un événement ce jour</div>
    </Bd>}
  </WithPanel>;
}

// ══ ÉQUIPE ══
const EM={nom:"",role:"",statut:"chantier",loc:"",tel:"",email:"",note:""};
const AVATARS_BG=["#F2F0ED:#CC2222","#FFF0F0:#CC2222","#F0FFF0:#2A7A2A","#F2F0ED:#3A3A3A","#FFF0F0:#CC2222","#F0FFF0:#2A7A2A"];
function initials(n){return n.split(" ").map(x=>x[0]||"").join("").slice(0,2).toUpperCase();}
function Equipes({sheet,journal}){
  const [open,setOpen]=useState(false);
  const [form,setForm]=useState(EM);
  const [editing,setEditing]=useState(null);
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");
  const [jtext,setJtext]=useState("");
  const f=(k,v)=>setForm(x=>({...x,[k]:v}));
  async function save(){if(!form.nom.trim()){setErr("Nom obligatoire.");return;}setSaving(true);setErr("");try{if(editing){await sheet.update(editing,form);}else{await sheet.add(form);}setOpen(false);}catch(e){setErr(e.message);}setSaving(false);}
  async function saveJ(){if(!jtext.trim())return;await journal.add({date:TODAY,texte:jtext});setJtext("");}
  const sb=(s)=>({chantier:{bg:"#FFF0F0",tx:"#CC2222"},atelier:{bg:"#F2F0ED",tx:"#3A3A3A"},bureau:{bg:"#F2F0ED",tx:"#7A7A7A"},congé:{bg:"#F2F0ED",tx:"#7A7A7A"},déplacement:{bg:"#F0FFF0",tx:"#2A7A2A"}}[s]||{bg:"#F2F0ED",tx:"#3A3A3A"});
  const panel=open&&<SidePanel title={editing?"Modifier le membre":"Nouveau membre"} onClose={()=>setOpen(false)}>
    <FG label="Nom complet *"><Inp value={form.nom} onChange={e=>f("nom",e.target.value)} placeholder="Ex: Marc Dupont"/></FG>
    <FG label="Rôle / poste"><Inp value={form.role} onChange={e=>f("role",e.target.value)} placeholder="Ex: Chef d'équipe chantier"/></FG>
    <FG label="Statut"><Sel value={form.statut} onChange={e=>f("statut",e.target.value)}>{STATUTS_TEAM.map(s=><option key={s}>{s}</option>)}</Sel></FG>
    <FG label="Localisation"><Inp value={form.loc} onChange={e=>f("loc",e.target.value)} placeholder="Ex: Chantier Bordeaux"/></FG>
    <FG label="Téléphone"><Inp value={form.tel||""} onChange={e=>f("tel",e.target.value)} placeholder="06 12 34 56 78"/></FG>
    <FG label="Email"><Inp value={form.email||""} onChange={e=>f("email",e.target.value)} placeholder="m.dupont@highpoint-structures.com"/></FG>
    <FG label="Note"><Inp value={form.note||""} onChange={e=>f("note",e.target.value)} placeholder="Optionnel"/></FG>
    <ErrMsg msg={err}/><PanelBtns onCancel={()=>setOpen(false)} onSave={save} saving={saving} saveLabel={editing?"Mettre à jour":"Ajouter"}/>
  </SidePanel>;
  return <WithPanel panel={panel}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div style={{fontSize:15,fontWeight:700,color:"#1C1C1C",borderLeft:"3px solid #CC2222",paddingLeft:8}}>Équipe ({sheet.rows.length})</div>
      <Btn primary onClick={()=>{setEditing(null);setForm(EM);setErr("");setOpen(true);}}>+ Ajouter</Btn>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
      {sheet.rows.map((m,i)=>{const [bg,tx]=AVATARS_BG[i%6].split(":");const s=sb(m.statut);return(
        <Bd key={m.id} style={{padding:12}}>
          <div style={{display:"flex",gap:10}}>
            <div style={{width:36,height:36,borderRadius:"50%",background:bg,border:`2px solid ${tx}`,color:tx,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,flexShrink:0}}>{initials(m.nom)}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <div style={{fontSize:13,fontWeight:700,color:"#1C1C1C",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.nom}</div>
                <div style={{display:"flex",gap:4}}>
                  <button onClick={()=>{setEditing(m.id);setForm({...m});setErr("");setOpen(true);}} style={{background:"none",border:"1px solid #DDDDDD",borderRadius:4,cursor:"pointer",fontSize:11,padding:"1px 6px",color:"#3A3A3A",fontFamily:"'DM Sans',sans-serif"}}>Modifier</button>
                  <button onClick={()=>sheet.remove(m.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#7A7A7A"}}>✕</button>
                </div>
              </div>
              <div style={{fontSize:12,color:"#7A7A7A"}}>{m.role}</div>
              <div style={{marginTop:4,display:"flex",gap:6,flexWrap:"wrap"}}><Badge label={m.statut} bg={s.bg} color={s.tx}/>{m.loc&&<span style={{fontSize:11,color:"#7A7A7A"}}>{m.loc}</span>}</div>
              {m.tel&&<div style={{fontSize:11,color:"#7A7A7A",marginTop:2,fontFamily:"'DM Mono',monospace"}}>{m.tel}</div>}
            </div>
          </div>
        </Bd>
      );})}
    </div>
    <Bd>
      <SecTitle>Journal de chantier</SecTitle>
      <Inp value={jtext} onChange={e=>setJtext(e.target.value)} rows={3} placeholder={`Compte-rendu du ${fmt(TODAY)} — observations, conditions météo, incidents...`}/>
      <div style={{display:"flex",justifyContent:"flex-end",marginTop:10}}><Btn primary onClick={saveJ}>Enregistrer</Btn></div>
      {journal.rows.slice(0,5).map(j=>(
        <div key={j.id} style={{marginTop:10,padding:"10px 12px",background:"#F9F9F9",borderRadius:6,border:"0.5px solid #DDDDDD",display:"flex",gap:8}}>
          <div style={{flex:1}}>
            <div style={{fontSize:11,color:"#7A7A7A",marginBottom:3,fontFamily:"'DM Mono',monospace"}}>{fmt(j.date)}</div>
            <div style={{fontSize:13,color:"#1C1C1C",lineHeight:1.6}}>{j.texte}</div>
          </div>
          <button onClick={()=>journal.remove(j.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#7A7A7A",alignSelf:"flex-start"}}>✕</button>
        </div>
      ))}
    </Bd>
  </WithPanel>;
}

// ══ FOURNISSEURS ══
const EF={nom:"",specialite:"",note:3,contact:"",delai:"",tel:"",adresse:""};

    <FG label={`Évaluation : ${"★".repeat(+form.note||0)+"☆".repeat(5-(+form.note||0))}`}><input type="range" min="1" max="5" value={form.note} onChange={e=>f("note",e.target.value)} style={{width:"100%",accentColor:"#CC2222"}}/></FG>
    <ErrMsg msg={err}/><PanelBtns onCancel={()=>setOpen(false)} onSave={save} saving={saving} saveLabel={editing?"Mettre à jour":"Ajouter"}/>

      <Btn primary onClick={()=>{setEditing(null);setForm(EF);setErr("");setOpen(true);}}>+ Ajouter</Btn>
    </div>
    {!sheet.rows.length&&<Bd style={{textAlign:"center",padding:24,color:"#7A7A7A",fontSize:13}}>Aucun fournisseur enregistré.</Bd>}

          <div style={{display:"flex",justifyContent:"space-between"}}>

              <div style={{fontSize:13,fontWeight:700,color:"#1C1C1C"}}>{x.nom}</div>
              {x.specialite&&<div style={{fontSize:12,color:"#7A7A7A"}}>{x.specialite}</div>}
              <div style={{fontSize:12,color:"#CC2222",marginTop:3,letterSpacing:"0.05em"}}>{"★".repeat(x.note)}<span style={{color:"#DDDDDD"}}>{"★".repeat(5-x.note)}</span></div>
              {x.delai&&<div style={{fontSize:12,color:"#7A7A7A"}}>Délai : {x.delai}</div>}
              {x.contact&&<div style={{fontSize:12,color:"#7A7A7A"}}>{x.contact}</div>}
              {x.tel&&<div style={{fontSize:12,color:"#7A7A7A",fontFamily:"'DM Mono',monospace"}}>{x.tel}</div>}
            </div>
            <div style={{display:"flex",gap:4,flexDirection:"column",alignItems:"flex-end"}}>
              <button onClick={()=>{setEditing(x.id);setForm({...x});setErr("");setOpen(true);}} style={{background:"none",border:"1px solid #DDDDDD",borderRadius:4,cursor:"pointer",fontSize:11,padding:"2px 8px",color:"#3A3A3A",fontFamily:"'DM Sans',sans-serif"}}>Modifier</button>
              <button onClick={()=>sheet.remove(x.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#7A7A7A"}}>✕</button>
            </div>
          </div>
        </Bd>
      ))}
    </div>
  </WithPanel>;

// ══ STOCKS ══
const ES={ref:"",cat:"",fourn:"",qty:"",min:"",unit:"pcs",prix:"",loc:"",note:""};
function Stocks({sheet,fournisseurs}){
  const [open,setOpen]=useState(false);
  const [form,setForm]=useState(ES);
  const [editing,setEditing]=useState(null);
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");
  const f=(k,v)=>setForm(x=>({...x,[k]:v}));
  async function save(){if(!form.ref.trim()){setErr("Désignation obligatoire.");return;}if(form.qty===""||form.min===""){setErr("Quantité et seuil obligatoires.");return;}setSaving(true);setErr("");try{const item={...form,qty:+form.qty||0,min:+form.min||0,prix:+form.prix||0};if(editing){await sheet.update(editing,item);}else{await sheet.add(item);}setOpen(false);}catch(e){setErr(e.message);}setSaving(false);}
  const alerts=sheet.rows.filter(s=>Number(s.qty)<Number(s.min));
  const valeur=sheet.rows.reduce((s,i)=>s+Number(i.qty)*(Number(i.prix)||0),0);
  const panel=open&&<SidePanel title={editing?"Modifier l'article":"Nouvel article"} onClose={()=>setOpen(false)}>
    <FG label="Désignation *"><Inp value={form.ref} onChange={e=>f("ref",e.target.value)} placeholder="Ex: Visserie ETFE M12 inox"/></FG>
    <FG label="Catégorie"><Sel value={form.cat} onChange={e=>f("cat",e.target.value)}><option value="">— Choisir —</option>{CATS.map(c=><option key={c}>{c}</option>)}</Sel></FG>
    <FG label="Fournisseur"><Sel value={form.fourn} onChange={e=>f("fourn",e.target.value)}><option value="">— Choisir —</option>{fournisseurs.rows.map(x=><option key={x.id}>{x.nom}</option>)}<option>Autre</option></Sel></FG>
    <FG label="Quantité actuelle *"><Inp type="number" value={form.qty} onChange={e=>f("qty",e.target.value)} placeholder="0"/></FG>
    <FG label="Seuil d'alerte *"><Inp type="number" value={form.min} onChange={e=>f("min",e.target.value)} placeholder="0"/></FG>
    <FG label="Unité"><Sel value={form.unit} onChange={e=>f("unit",e.target.value)}>{UNITS.map(u=><option key={u}>{u}</option>)}</Sel></FG>
    <FG label="Prix unitaire (€)"><Inp type="number" value={form.prix} onChange={e=>f("prix",e.target.value)} placeholder="0.00"/></FG>
    <FG label="Emplacement"><Inp value={form.loc} onChange={e=>f("loc",e.target.value)} placeholder="Ex: Étagère A3"/></FG>
    <ErrMsg msg={err}/><PanelBtns onCancel={()=>setOpen(false)} onSave={save} saving={saving} saveLabel={editing?"Mettre à jour":"Enregistrer"}/>
  </SidePanel>;
  return <WithPanel panel={panel}>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}}>
      {[{val:sheet.rows.length,lbl:"Références"},{val:alerts.length,lbl:"Sous seuil d'alerte",alert:alerts.length>0},{val:valeur.toLocaleString("fr-FR")+" €",lbl:"Valeur totale estimée"}].map((m,i)=>(
        <div key={i} style={{background:"#fff",border:"0.5px solid #DDDDDD",borderTop:m.alert?"3px solid #CC2222":"3px solid #F2F0ED",borderRadius:8,padding:"12px 14px"}}>
          <div style={{fontSize:18,fontWeight:700,color:m.alert?"#CC2222":"#1C1C1C"}}>{m.val}</div>
          <div style={{fontSize:12,color:"#7A7A7A",marginTop:2}}>{m.lbl}</div>
        </div>
      ))}
    </div>
    {alerts.length>0&&<div style={{background:"#FFF0F0",border:"0.5px solid #CC2222",borderLeft:"3px solid #CC2222",borderRadius:6,padding:"8px 12px",marginBottom:12,fontSize:13,color:"#CC2222"}}>Références sous seuil : {alerts.map(s=>s.ref).join(", ")}</div>}
    <Bd>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <SecTitle>Inventaire</SecTitle>
        <Btn primary onClick={()=>{setEditing(null);setForm(ES);setErr("");setOpen(true);}}>+ Nouvel article</Btn>
      </div>
      {!sheet.rows.length&&<div style={{fontSize:13,color:"#7A7A7A",padding:"10px 0"}}>Aucun article en inventaire.</div>}
      <div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 80px 80px",gap:8,padding:"6px 0",borderBottom:"0.5px solid #DDDDDD",marginBottom:4}}>
        {["Référence","Qté / Seuil","Emplacement","État",""].map((h,i)=><span key={i} style={{fontSize:11,fontWeight:700,color:"#7A7A7A"}}>{h}</span>)}
      </div>
      {sheet.rows.map(s=>{const r=Number(s.qty)/Math.max(Number(s.min),0.001);const sb=r<0.7?{bg:"#FFF0F0",tx:"#CC2222",lbl:"Critique"}:r<1?{bg:"#FFF8EC",tx:"#CC8800",lbl:"Bas"}:{bg:"#F0FFF0",tx:"#2A7A2A",lbl:"OK"};return(
        <div key={s.id} style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr 80px 80px",gap:8,alignItems:"center",padding:"9px 0",borderBottom:"0.5px solid #EEEEEE"}}>
          <div><div style={{fontSize:13,fontWeight:500,color:"#1C1C1C"}}>{s.ref}</div><div style={{fontSize:11,color:"#7A7A7A"}}>{s.cat}</div></div>
          <span style={{fontSize:12,color:"#3A3A3A",fontFamily:"'DM Mono',monospace"}}>{s.qty}/{s.min} {s.unit}</span>
          <span style={{fontSize:12,color:"#7A7A7A"}}>{s.loc||"—"}</span>
          <Badge label={sb.lbl} bg={sb.bg} color={sb.tx}/>
          <div style={{display:"flex",gap:4}}>
            <button onClick={()=>{setEditing(s.id);setForm({...s,qty:String(s.qty),min:String(s.min),prix:String(s.prix)});setErr("");setOpen(true);}} style={{background:"none",border:"1px solid #DDDDDD",borderRadius:4,cursor:"pointer",fontSize:11,padding:"2px 6px",color:"#3A3A3A",fontFamily:"'DM Sans',sans-serif"}}>Mod.</button>
            <button onClick={()=>sheet.remove(s.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#7A7A7A"}}>✕</button>
          </div>
        </div>
      );})}
    </Bd>
  </WithPanel>;
}

// ══ COMMANDES ══
const EO={ref:"",fourn:"",article:"",qty:"",unit:"pcs",prix:"",cat:"",loc:"",date:TODAY,projet:""};
function Commandes({sheet,stocks,fournisseurs,projects}){
  const [open,setOpen]=useState(false);
  const [form,setForm]=useState(EO);
  const [editing,setEditing]=useState(null);
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState("");
  const f=(k,v)=>setForm(x=>({...x,[k]:v}));
  const isBool=v=>v===true||v==="TRUE";

  // Marquer comme reçue
  async function toggleRecue(o){
    const wasRecue=isBool(o.recue);
    const next={...o,recue:!wasRecue};
    if(!wasRecue){
      await addToStock(o);
    } else {
      if(!isBool(o.factureCompta)){
        const idx=stocks.rows.findIndex(s=>s.ref.toLowerCase()===o.article.toLowerCase());
        if(idx>=0){const s=stocks.rows[idx];await stocks.update(s.id,{...s,qty:Math.max(0,Number(s.qty)-(+o.qty||0))});}
      }
      next.factureCompta=false;
    }
    await sheet.update(o.id,next);
  }

  async function toggleFacture(o){
    await sheet.update(o.id,{...o,factureCompta:!isBool(o.factureCompta)});
  }

  async function addToStock(ord){
    const idx=stocks.rows.findIndex(s=>s.ref.toLowerCase()===ord.article.toLowerCase());
    if(idx>=0){const s=stocks.rows[idx];await stocks.update(s.id,{...s,qty:Number(s.qty)+(+ord.qty||0)});}
    else{await stocks.add({ref:ord.article,cat:ord.cat||"",qty:+ord.qty||0,min:0,unit:ord.unit||"pcs",prix:+ord.prix||0,loc:ord.loc||"",fourn:ord.fourn||""});}
  }

  async function save(){
    if(!form.article.trim()){setErr("Article obligatoire.");return;}
    if(!form.fourn.trim()){setErr("Fournisseur obligatoire.");return;}
    setSaving(true);setErr("");
    try{
      if(editing){
        await sheet.update(editing,{...form,qty:+form.qty||0,prix:+form.prix||0});
      } else {
        await sheet.add({...form,qty:+form.qty||0,prix:+form.prix||0,recue:false,factureCompta:false});
      }
      setOpen(false);setEditing(null);setForm(EO);
    }catch(e){setErr(e.message);}setSaving(false);
  }

  const encours=sheet.rows.filter(o=>!isBool(o.recue));
  const attenteFacture=sheet.rows.filter(o=>isBool(o.recue)&&!isBool(o.factureCompta));
  const historique=sheet.rows.filter(o=>isBool(o.recue)&&isBool(o.factureCompta));

  const panel=open&&<SidePanel title={editing?"Modifier la commande":"Nouvelle commande"} onClose={()=>{setOpen(false);setEditing(null);setForm(EO);}}>
    <FG label="Référence commande"><Inp value={form.ref} onChange={e=>f("ref",e.target.value)} placeholder="CMD-001"/></FG>
    <FG label="Date"><Inp type="date" value={form.date} onChange={e=>f("date",e.target.value)}/></FG>
    <FG label="Article / désignation *"><Inp value={form.article} onChange={e=>f("article",e.target.value)} placeholder="Ex: Profilés keder 2m"/></FG>
    <FG label="Fournisseur *"><Sel value={form.fourn} onChange={e=>f("fourn",e.target.value)}><option value="">— Choisir —</option>{fournisseurs.rows.map(x=><option key={x.id}>{x.nom}</option>)}<option value="Autre">Autre</option></Sel></FG>
    <FG label="Quantité"><Inp type="number" value={form.qty} onChange={e=>f("qty",e.target.value)} placeholder="0"/></FG>
    <FG label="Unité"><Sel value={form.unit} onChange={e=>f("unit",e.target.value)}>{UNITS.map(u=><option key={u}>{u}</option>)}</Sel></FG>
    <FG label="Prix unitaire (€)"><Inp type="number" value={form.prix} onChange={e=>f("prix",e.target.value)} placeholder="0.00"/></FG>
    <FG label="Catégorie stock"><Sel value={form.cat} onChange={e=>f("cat",e.target.value)}><option value="">— Choisir —</option>{CATS.map(c=><option key={c}>{c}</option>)}</Sel></FG>
    <FG label="Projet lié"><Sel value={form.projet||""} onChange={e=>f("projet",e.target.value)}>
      <option value="">— Aucun —</option>
      {(projects?.rows||[]).map(p=><option key={p.id} value={p.name}>{p.name}</option>)}
    </Sel></FG>
    <FG label="Emplacement"><Inp value={form.loc} onChange={e=>f("loc",e.target.value)} placeholder="Ex: Rack B2"/></FG>
    <ErrMsg msg={err}/><PanelBtns onCancel={()=>{setOpen(false);setEditing(null);setForm(EO);}} onSave={save} saving={saving} saveLabel={editing?"Mettre à jour":"Créer la commande"}/>
  </SidePanel>;

  return <WithPanel panel={panel}>
    {/* KPIs */}
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:14}}>
      {[
        {val:encours.length,lbl:"En cours"},
        {val:attenteFacture.length,lbl:"En attente de facture",alert:attenteFacture.length>0},
        {val:historique.length,lbl:"Archivées"},
      ].map((m,i)=>(
        <div key={i} style={{background:"#fff",border:"0.5px solid #DDDDDD",borderTop:m.alert?"3px solid #CC8800":"3px solid #F2F0ED",borderRadius:8,padding:"12px 14px"}}>
          <div style={{fontSize:18,fontWeight:700,color:m.alert?"#CC8800":"#1C1C1C"}}>{m.val}</div>
          <div style={{fontSize:12,color:"#7A7A7A",marginTop:2}}>{m.lbl}</div>
        </div>
      ))}
    </div>

    {attenteFacture.length>0&&<div style={{background:"#FFF8EC",border:"0.5px solid #CC8800",borderLeft:"3px solid #CC8800",borderRadius:6,padding:"8px 12px",marginBottom:12,fontSize:13,color:"#CC8800"}}>
      {attenteFacture.length} facture(s) en attente de transmission à la comptabilité
    </div>}

    {/* ── ZONE 1 : En cours ── */}
    <Bd style={{marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <SecTitle>Commandes en cours</SecTitle>
        <Btn primary onClick={()=>{setErr("");setEditing(null);setForm(EO);setOpen(true);}}>+ Nouvelle commande</Btn>
      </div>
      {!encours.length&&<div style={{fontSize:13,color:"#7A7A7A"}}>Aucune commande en cours.</div>}
      {encours.map(o=>(
        <div key={o.id} style={{padding:"12px 0",borderBottom:"0.5px solid #EEEEEE"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <div>
              <span style={{fontSize:13,fontWeight:700,color:"#1C1C1C"}}>{o.article}</span>
              {o.ref&&<span style={{fontSize:11,color:"#7A7A7A",marginLeft:8,fontFamily:"'DM Mono',monospace"}}>{o.ref}</span>}
            </div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>{setEditing(o.id);setForm({...o,qty:String(o.qty),prix:String(o.prix),date:toISO(o.date)||o.date});setErr("");setOpen(true);}} style={{background:"none",border:"1px solid #DDDDDD",borderRadius:4,cursor:"pointer",fontSize:11,padding:"2px 8px",color:"#3A3A3A",fontFamily:"'DM Sans',sans-serif"}}>Modifier</button>
              <button onClick={()=>sheet.remove(o.id)} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#7A7A7A"}}>✕</button>
            </div>
          </div>
          <div style={{fontSize:12,color:"#7A7A7A",marginBottom:8,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            <span>{o.fourn} · {o.qty} {o.unit}{o.prix>0&&` · ${(+o.prix*(+o.qty||1)).toLocaleString("fr-FR")} €`} · {fmt(o.date)}</span>
            {o.projet&&<span style={{background:"#EBF3FF",color:"#1A5DAB",fontSize:11,padding:"1px 6px",borderRadius:4,fontWeight:500}}>{o.projet}</span>}
          </div>
          <Check checked={isBool(o.recue)} onChange={()=>toggleRecue(o)} label="Marquer comme reçue → ajout au stock" color="#2A7A2A"/>
        </div>
      ))}
    </Bd>

    {/* ── ZONE 2 : Reçues, facture en attente ── */}
    {attenteFacture.length>0&&<Bd style={{marginBottom:12,borderLeft:"3px solid #CC8800"}}>
      <SecTitle>Reçues — facture en attente ({attenteFacture.length})</SecTitle>
      {attenteFacture.map(o=>(
        <div key={o.id} style={{padding:"10px 0",borderBottom:"0.5px solid #EEEEEE"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
            <div>
              <span style={{fontSize:13,fontWeight:700,color:"#1C1C1C"}}>{o.article}</span>
              {o.ref&&<span style={{fontSize:11,color:"#7A7A7A",marginLeft:8,fontFamily:"'DM Mono',monospace"}}>{o.ref}</span>}
            </div>
            <Badge label="Reçue" bg="#F0FFF0" color="#2A7A2A"/>
          </div>
          <div style={{fontSize:12,color:"#7A7A7A",marginBottom:8,display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            <span>{o.fourn} · {o.qty} {o.unit}{o.prix>0&&` · ${(+o.prix*(+o.qty||1)).toLocaleString("fr-FR")} €`} · {fmt(o.date)}</span>
            {o.projet&&<span style={{background:"#EBF3FF",color:"#1A5DAB",fontSize:11,padding:"1px 6px",borderRadius:4,fontWeight:500}}>{o.projet}</span>}
          </div>
          <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
            <Check checked={false} onChange={()=>toggleRecue(o)} label="Annuler réception (retour en cours)" color="#CC2222"/>
            <Check checked={isBool(o.factureCompta)} onChange={()=>toggleFacture(o)} label="Facture transmise → archiver" color="#CC2222"/>
          </div>
        </div>
      ))}
    </Bd>}

    {/* ── ZONE 3 : Historique archivé ── */}
    {historique.length>0&&<Bd>
      <SecTitle>Historique — archivées ({historique.length})</SecTitle>
      {historique.map(o=>(
        <div key={o.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:"0.5px solid #EEEEEE"}}>
          <div style={{flex:1}}>
            <div style={{fontSize:13,color:"#7A7A7A",textDecoration:"line-through"}}>{o.article}</div>
            <div style={{fontSize:11,color:"#7A7A7A",fontFamily:"'DM Mono',monospace",display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
              <span>{o.fourn} · {fmt(o.date)}{o.prix>0&&` · ${(+o.prix*(+o.qty||1)).toLocaleString("fr-FR")} €`}</span>
              {o.projet&&<span style={{background:"#EBF3FF",color:"#1A5DAB",fontSize:11,padding:"1px 6px",borderRadius:4,fontWeight:500,fontFamily:"'DM Sans',sans-serif"}}>{o.projet}</span>}
            </div>
          </div>
          <Badge label="Reçue" bg="#F0FFF0" color="#2A7A2A"/>
          <Badge label="Compta ✓" bg="#F0FFF0" color="#2A7A2A"/>
        </div>
      ))}
    </Bd>}
  </WithPanel>;
}

// ══ APP ROOT ══
const PANELS=[
  {id:"dashboard",label:"Tableau de bord"},
  {id:"projets",label:"Projets"},
  {id:"taches",label:"Tâches"},
  {id:"calendrier",label:"Calendrier"},
  {id:"equipes",label:"Équipe"},
  {id:"atelier",label:"Atelier"},
  {id:"chantier",label:"Chantier"},
  {id:"prestataires",label:"Prestataires"},
  {id:"fournisseurs",label:"Fournisseurs"},
  {id:"stocks",label:"Stocks"},
  {id:"commandes",label:"Commandes"},
];

function App(){
  const [panel,setPanel]=useState("dashboard");
  const [initializing,setInitializing]=useState(true);
  const [initErr,setInitErr]=useState(null);
  const projects=useSheet("projects");
  const tasks=useSheet("tasks");
  const events=useSheet("events");
  const team=useSheet("team");
  const journal=useSheet("journal");
  const fournisseurs=useSheet("fournisseurs");
  const stocks=useSheet("stocks");
  const orders=useSheet("orders");
  const notes=useSheet("notes");
  const prestataires=useSheet("prestataires");
  const prestMissions=useSheet("prestMissions");
  const atelierChantier=useSheet("atelierChantier");
  const sheets={projects,tasks,events,team,journal,fournisseurs,stocks,orders,notes,prestataires,prestMissions,atelierChantier};

  useEffect(()=>{
    const onUnhandled=(event)=>{
      const msg=event.reason&&event.reason.message?event.reason.message:String(event.reason||"Erreur inattendue");
      console.error("Unhandled rejection",event.reason);
      setInitErr(msg);event.preventDefault();
    };
    window.addEventListener("unhandledrejection",onUnhandled);
    gasInit().then(()=>setInitializing(false)).catch(e=>{setInitErr(e.message||"Erreur de connexion");setInitializing(false);});
    return()=>window.removeEventListener("unhandledrejection",onUnhandled);
  },[]);

  const alerts=[...projects.rows.filter(p=>p.statut==="retard"),...stocks.rows.filter(s=>Number(s.qty)<Number(s.min)),...orders.rows.filter(o=>(o.recue===true||o.recue==="TRUE")&&!o.factureCompta&&o.factureCompta!=="TRUE")];

  if(initializing)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",gap:16,background:"#F2F0ED"}}>
      <HPLogo/>
      <div style={{fontSize:13,color:"#7A7A7A"}}>Connexion à Google Sheets...</div>
      <div className="spin" style={{fontSize:20,color:"#CC2222"}}>⟳</div>
    </div>
  );

  if(initErr)return(
    <div style={{padding:24,maxWidth:500,margin:"80px auto"}}>
      <div style={{background:"#fff",border:"0.5px solid #DDDDDD",borderTop:"3px solid #CC2222",borderRadius:10,padding:20}}>
        <HPLogo/>
        <div style={{fontSize:14,fontWeight:700,color:"#CC2222",margin:"12px 0 6px"}}>Erreur de connexion</div>
        <div style={{fontSize:13,color:"#3A3A3A",marginBottom:14}}>{initErr}</div>
        <Btn primary onClick={()=>window.location.reload()}>Recharger la page</Btn>
      </div>
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",minHeight:"100vh",background:"#F2F0ED"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",padding:"10px 20px",borderBottom:"1.5px solid #CC2222",background:"#fff",flexWrap:"wrap",gap:4,position:"sticky",top:0,zIndex:10}}>
        <HPLogo/>
        <div style={{width:1,height:24,background:"#DDDDDD",margin:"0 12px"}}/>
        {PANELS.map(p=>(
          <button key={p.id} onClick={()=>setPanel(p.id)} style={{
            background:"none",border:"none",cursor:"pointer",
            padding:"6px 12px",borderRadius:4,fontSize:12,
            fontWeight:panel===p.id?700:400,
            color:panel===p.id?"#CC2222":"#3A3A3A",
            borderBottom:panel===p.id?"2px solid #CC2222":"2px solid transparent",
            fontFamily:"'DM Sans',sans-serif",transition:"all .15s"
          }}>{p.label}</button>
        ))}
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
          {alerts.length>0&&<span style={{background:"#CC2222",color:"#fff",fontSize:11,fontWeight:700,padding:"2px 8px",borderRadius:4}}>{alerts.length} alerte{alerts.length>1?"s":""}</span>}
          <span style={{fontSize:10,color:"#7A7A7A",fontFamily:"'DM Mono',monospace",border:"0.5px solid #DDDDDD",borderRadius:4,padding:"2px 6px"}}>{VERSION}</span>
        </div>
      </div>
      {/* Content */}
      <div style={{flex:1,padding:20}}>
        {panel==="dashboard"      &&<Dashboard sheets={sheets}/>}
        {panel==="projets"        &&<Projets sheet={projects} notes={notes} tasks={tasks} orders={orders} stocks={stocks} events={events} prestMissions={prestMissions} atelierChantier={atelierChantier}/>}
        {panel==="taches"         &&<Taches sheet={tasks} projects={projects}/>}
        {panel==="calendrier"     &&<Calendrier sheet={events} projects={projects}/>}
        {panel==="equipes"        &&<Equipes sheet={team} journal={journal}/>}
        {panel==="atelier"        &&<MissionModule moduleType="atelier" sheet={atelierChantier} projects={projects} team={team} stocks={stocks}/>}
        {panel==="chantier"       &&<MissionModule moduleType="chantier" sheet={atelierChantier} projects={projects} team={team} stocks={stocks}/>}
        {panel==="prestataires"   &&<Prestataires sheet={prestataires} missions={prestMissions} projects={projects} stocks={stocks}/>}
        {panel==="fournisseurs"   &&<Fournisseurs sheet={fournisseurs}/>}
        {panel==="stocks"         &&<Stocks sheet={stocks} fournisseurs={fournisseurs}/>}
        {panel==="commandes"      &&<Commandes sheet={orders} stocks={stocks} fournisseurs={fournisseurs} projects={projects}/>}
      </div>
      {/* Footer */}
      <div style={{textAlign:"center",padding:"10px 20px",fontSize:10,color:"#7A7A7A",borderTop:"0.5px solid #DDDDDD",background:"#fff",fontFamily:"'DM Sans',sans-serif"}}>
        HIGH POINT — 17 rue Robert Geffré — 17000 La Rochelle — FRANCE — SARL au capital de 32 000 € — SIRET : 53454409300030
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  <ErrorBoundary><App/></ErrorBoundary>
);
</script>
</body>
</html>
